<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta
    name="description"
    content="A practical gold investing guide for UAE, Saudi Arabia, and Egypt. Build a live budget plan, compare bullion vs jewelry vs ETFs, and buy gold more rationally."
  />
  <meta name="theme-color" content="#0d0d0d" />
  <title>Gold Investing Guide | Rational Gold Plan for UAE, Saudi & Egypt</title>

  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="home.css" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="canonical" href="https://vctb12.github.io/Gold-Prices/invest.html" />
  <link rel="manifest" href="manifest.json" />
  <meta property="og:type" content="article" />
  <meta property="og:url" content="https://vctb12.github.io/Gold-Prices/invest.html" />
  <meta property="og:title" content="Gold Investing Guide | Rational Gold Plan for UAE, Saudi & Egypt" />
  <meta property="og:description" content="A practical gold investing guide for UAE, Saudi Arabia, and Egypt. Build a live budget plan, compare bullion vs jewelry vs ETFs, and buy gold more rationally." />
  <meta property="og:image" content="https://vctb12.github.io/Gold-Prices/assets/og-image.svg" />

  <style>
    :root {
      --invest-bg: #0d0d0d;
      --invest-surface: #141414;
      --invest-surface-2: #1b1b1b;
      --invest-card: #ffffff;
      --invest-card-soft: #fff8eb;
      --invest-text: #f2ead7;
      --invest-muted: rgba(242, 234, 215, 0.72);
      --invest-dark: #101010;
      --invest-gold: #c9a84c;
      --invest-gold-2: #f0c040;
      --invest-border: rgba(201, 168, 76, 0.18);
      --invest-shadow: 0 18px 45px rgba(0, 0, 0, 0.28);
      --invest-shadow-soft: 0 10px 24px rgba(0, 0, 0, 0.16);
      --invest-radius-xl: 28px;
      --invest-radius-lg: 22px;
      --invest-radius-md: 16px;
      --invest-radius-sm: 12px;
      --invest-radius-pill: 999px;
      --invest-max: 1220px;
      --invest-transition: 220ms ease;
    }

    html {
      scroll-behavior: smooth;
    }

    body.invest-page {
      background:
        radial-gradient(circle at top left, rgba(201, 168, 76, 0.18), transparent 28%),
        radial-gradient(circle at top right, rgba(240, 192, 64, 0.10), transparent 32%),
        var(--invest-bg);
      color: var(--invest-text);
    }

    .invest-main {
      padding-top: calc(var(--nav-height, 64px) + 1rem);
      padding-bottom: 5.5rem;
    }

    .invest-shell {
      width: min(var(--invest-max), calc(100% - 2rem));
      margin-inline: auto;
    }

    .invest-hero {
      padding: 2rem 0 1.25rem;
    }

    .invest-hero-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.3fr) minmax(340px, 0.7fr);
      gap: 1.4rem;
      align-items: stretch;
    }

    .invest-hero-copy,
    .invest-live-panel {
      border: 1px solid var(--invest-border);
      border-radius: var(--invest-radius-xl);
      box-shadow: var(--invest-shadow);
      overflow: hidden;
    }

    .invest-hero-copy {
      position: relative;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01)),
        linear-gradient(160deg, #111111 0%, #161616 55%, #1c1912 100%);
      padding: 2.2rem;
      min-height: 100%;
    }

    .invest-hero-copy::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 10% 15%, rgba(240, 192, 64, 0.22), transparent 24%),
        radial-gradient(circle at 80% 20%, rgba(201, 168, 76, 0.12), transparent 25%);
      pointer-events: none;
    }

    .invest-hero-copy > * {
      position: relative;
      z-index: 1;
    }

    .invest-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      padding: 0.5rem 0.9rem;
      border-radius: var(--invest-radius-pill);
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: var(--invest-muted);
      font-size: 0.86rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      margin-bottom: 1rem;
    }

    .invest-badge-dot {
      width: 0.55rem;
      height: 0.55rem;
      border-radius: 50%;
      background: linear-gradient(180deg, var(--invest-gold-2), var(--invest-gold));
      box-shadow: 0 0 0 6px rgba(201, 168, 76, 0.12);
    }

    .invest-hero-title {
      font-size: clamp(2.1rem, 4.3vw, 3.6rem);
      line-height: 1.04;
      letter-spacing: -0.03em;
      margin: 0 0 1rem;
      color: #fff7e0;
      max-width: 11ch;
    }

    .invest-hero-lead {
      max-width: 62ch;
      font-size: 1.08rem;
      line-height: 1.8;
      color: var(--invest-muted);
      margin: 0;
    }

    .invest-hero-points {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 0.8rem;
      margin: 1.5rem 0 1.6rem;
    }

    .invest-point {
      border-radius: var(--invest-radius-md);
      padding: 0.9rem 1rem;
      background: rgba(255, 255, 255, 0.055);
      border: 1px solid rgba(255, 255, 255, 0.07);
    }

    .invest-point strong {
      display: block;
      color: #fff2cc;
      font-size: 1rem;
      margin-bottom: 0.25rem;
    }

    .invest-point span {
      color: var(--invest-muted);
      font-size: 0.92rem;
      line-height: 1.45;
    }

    .invest-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
      margin-top: 1rem;
    }

    .invest-live-panel {
      display: flex;
      flex-direction: column;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.035), rgba(255,255,255,0.01)),
        #111111;
      padding: 1.2rem;
    }

    .invest-panel-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .invest-panel-eyebrow {
      margin: 0 0 0.3rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 0.76rem;
      color: var(--invest-muted);
    }

    .invest-panel-title {
      margin: 0;
      font-size: 1.3rem;
      color: #fff7e0;
    }

    .invest-market-chip {
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      min-height: 2.5rem;
      padding: 0.55rem 0.85rem;
      border-radius: var(--invest-radius-pill);
      font-weight: 700;
      font-size: 0.86rem;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.06);
      color: var(--invest-muted);
    }

    .invest-market-chip.is-open {
      background: rgba(50, 160, 90, 0.14);
      color: #cef5d8;
      border-color: rgba(67, 186, 111, 0.28);
    }

    .invest-market-chip.is-closed {
      background: rgba(201, 168, 76, 0.14);
      color: #f5ddb0;
      border-color: rgba(201, 168, 76, 0.25);
    }

    .invest-panel-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.85rem;
    }

    .invest-stat {
      background: rgba(255,255,255,0.055);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: var(--invest-radius-lg);
      padding: 1rem;
      min-height: 122px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .invest-stat-label {
      font-size: 0.82rem;
      color: var(--invest-muted);
      line-height: 1.4;
    }

    .invest-stat-value {
      font-size: 1.55rem;
      line-height: 1.1;
      font-weight: 800;
      color: #fff4d2;
      margin: 0.4rem 0 0.25rem;
      word-break: break-word;
    }

    .invest-stat-note {
      font-size: 0.84rem;
      color: var(--invest-muted);
    }

    .invest-panel-foot {
      margin-top: 1rem;
      padding-top: 0.95rem;
      border-top: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
      font-size: 0.88rem;
      color: var(--invest-muted);
    }

    .invest-inline-link {
      color: var(--invest-gold-2);
      text-decoration: none;
      font-weight: 700;
    }

    .invest-inline-link:hover {
      opacity: 0.86;
    }

    .invest-jumpbar-wrap {
      padding: 0.5rem 0 1rem;
    }

    .invest-jumpbar {
      display: flex;
      gap: 0.7rem;
      overflow-x: auto;
      padding-bottom: 0.2rem;
      scrollbar-width: none;
    }

    .invest-jumpbar::-webkit-scrollbar {
      display: none;
    }

    .invest-jumpbar a {
      text-decoration: none;
      white-space: nowrap;
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.7rem 1rem;
      border-radius: var(--invest-radius-pill);
      border: 1px solid rgba(255,255,255,0.09);
      background: rgba(255,255,255,0.05);
      color: var(--invest-text);
      font-weight: 700;
      transition: transform var(--invest-transition), border-color var(--invest-transition), background var(--invest-transition);
    }

    .invest-jumpbar a:hover {
      transform: translateY(-1px);
      border-color: rgba(201, 168, 76, 0.32);
      background: rgba(201, 168, 76, 0.1);
    }

    .invest-section {
      padding: 1.4rem 0;
    }

    .invest-section--alt {
      background: transparent;
    }

    .invest-section-header {
      margin-bottom: 1.1rem;
    }

    .invest-section-header.center {
      text-align: center;
    }

    .invest-kicker {
      display: inline-block;
      font-size: 0.82rem;
      color: var(--invest-gold-2);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 0.55rem;
      font-weight: 800;
    }

    .invest-section-title {
      margin: 0;
      font-size: clamp(1.45rem, 3vw, 2.2rem);
      line-height: 1.15;
      color: #fff4d2;
    }

    .invest-section-sub {
      margin: 0.65rem 0 0;
      max-width: 66ch;
      color: var(--invest-muted);
      line-height: 1.7;
      font-size: 1rem;
    }

    .invest-card-grid {
      display: grid;
      gap: 1rem;
    }

    .invest-card-grid.three {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .invest-card-grid.four {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .invest-goal-card,
    .invest-compare-card,
    .invest-mistake-card,
    .invest-result-card,
    .invest-guide-card,
    .invest-cta-card {
      border-radius: var(--invest-radius-lg);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: var(--invest-shadow-soft);
    }

    .invest-goal-card {
      text-align: left;
      background: linear-gradient(180deg, rgba(255,255,255,0.035), rgba(255,255,255,0.015));
      color: var(--invest-text);
      padding: 1.1rem;
      cursor: pointer;
      transition: transform var(--invest-transition), border-color var(--invest-transition), background var(--invest-transition);
    }

    .invest-goal-card:hover {
      transform: translateY(-2px);
      border-color: rgba(201, 168, 76, 0.28);
      background: rgba(201, 168, 76, 0.1);
    }

    .invest-goal-card.is-active {
      border-color: rgba(201, 168, 76, 0.55);
      background: linear-gradient(180deg, rgba(201, 168, 76, 0.18), rgba(201, 168, 76, 0.08));
      box-shadow: 0 14px 34px rgba(0, 0, 0, 0.24), 0 0 0 1px rgba(201, 168, 76, 0.15) inset;
    }

    .invest-goal-icon {
      font-size: 1.9rem;
      margin-bottom: 0.75rem;
      display: inline-block;
    }

    .invest-goal-title {
      font-size: 1.12rem;
      font-weight: 800;
      color: #fff4d2;
      margin-bottom: 0.35rem;
    }

    .invest-goal-sub {
      color: var(--invest-muted);
      line-height: 1.55;
      font-size: 0.94rem;
    }

    .invest-advice-box {
      margin-top: 1rem;
      padding: 1.3rem;
      border-radius: var(--invest-radius-lg);
      background: linear-gradient(180deg, rgba(255,255,255,0.045), rgba(255,255,255,0.015));
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: var(--invest-shadow-soft);
    }

    .invest-advice-title {
      font-size: 1.18rem;
      font-weight: 800;
      color: #fff4d2;
      margin: 0 0 0.55rem;
    }

    .invest-advice-body {
      color: var(--invest-muted);
      line-height: 1.7;
      margin: 0 0 0.8rem;
    }

    .invest-bullets {
      margin: 0;
      padding-inline-start: 1.1rem;
      color: #f3ead4;
      display: grid;
      gap: 0.42rem;
      line-height: 1.6;
    }

    .invest-planner {
      display: grid;
      grid-template-columns: minmax(0, 0.9fr) minmax(0, 1.1fr);
      gap: 1rem;
      align-items: stretch;
    }

    .invest-planner-panel,
    .invest-planner-results {
      border-radius: var(--invest-radius-xl);
      box-shadow: var(--invest-shadow-soft);
      overflow: hidden;
    }

    .invest-planner-panel {
      background: var(--invest-card);
      color: var(--invest-dark);
      border: 1px solid rgba(201, 168, 76, 0.16);
      padding: 1.3rem;
    }

    .invest-planner-results {
      background:
        linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.012)),
        var(--invest-surface);
      border: 1px solid rgba(255,255,255,0.07);
      padding: 1.3rem;
    }

    .invest-field {
      display: grid;
      gap: 0.55rem;
      margin-bottom: 1rem;
    }

    .invest-label {
      font-size: 0.92rem;
      font-weight: 800;
      color: #2a2010;
    }

    .invest-input-row {
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }

    .invest-number {
      flex: 1;
      min-height: 52px;
      border-radius: var(--invest-radius-md);
      border: 1px solid rgba(0,0,0,0.12);
      padding: 0.85rem 1rem;
      font: inherit;
      font-size: 1.15rem;
      font-weight: 800;
      background: #fff;
      color: #1a1a1a;
      outline: none;
    }

    .invest-number:focus {
      border-color: rgba(201, 168, 76, 0.55);
      box-shadow: 0 0 0 4px rgba(201, 168, 76, 0.16);
    }

    .invest-range {
      width: 100%;
      accent-color: var(--invest-gold);
    }

    .invest-chip-group {
      display: flex;
      flex-wrap: wrap;
      gap: 0.65rem;
    }

    .invest-chip {
      min-height: 44px;
      padding: 0.72rem 0.95rem;
      border-radius: var(--invest-radius-pill);
      border: 1px solid rgba(0,0,0,0.12);
      background: #fff;
      color: #1b1b1b;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: border-color var(--invest-transition), transform var(--invest-transition), background var(--invest-transition);
    }

    .invest-chip:hover {
      transform: translateY(-1px);
      border-color: rgba(201, 168, 76, 0.42);
    }

    .invest-chip.is-active {
      background: linear-gradient(180deg, #f8e5a3, #f0c040);
      border-color: rgba(201, 168, 76, 0.65);
      color: #2b1c00;
      box-shadow: 0 8px 18px rgba(201, 168, 76, 0.18);
    }

    .invest-results-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.9rem;
      margin-top: 1rem;
    }

    .invest-result-card {
      background: rgba(255,255,255,0.045);
      padding: 1rem;
    }

    .invest-result-label {
      font-size: 0.84rem;
      color: var(--invest-muted);
      line-height: 1.45;
    }

    .invest-result-value {
      margin-top: 0.35rem;
      font-size: clamp(1.25rem, 2vw, 1.7rem);
      line-height: 1.15;
      font-weight: 800;
      color: #fff4d2;
    }

    .invest-result-note {
      margin-top: 0.25rem;
      color: var(--invest-muted);
      font-size: 0.86rem;
      line-height: 1.5;
    }

    .invest-planner-summary {
      margin-top: 1rem;
      padding: 1rem;
      border-radius: var(--invest-radius-lg);
      background: rgba(201, 168, 76, 0.12);
      border: 1px solid rgba(201, 168, 76, 0.18);
      color: #fff0cf;
      line-height: 1.7;
    }

    .invest-planner-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.55rem;
      margin-top: 0.9rem;
    }

    .invest-mini-chip {
      display: inline-flex;
      align-items: center;
      min-height: 38px;
      padding: 0.45rem 0.8rem;
      border-radius: var(--invest-radius-pill);
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--invest-muted);
      font-size: 0.84rem;
      font-weight: 700;
    }

    .invest-compare-card {
      background: var(--invest-card);
      color: var(--invest-dark);
      padding: 1.2rem;
    }

    .invest-compare-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 0.85rem;
    }

    .invest-compare-title {
      margin: 0;
      font-size: 1.12rem;
      font-weight: 800;
      color: #1d1608;
    }

    .invest-compare-tag {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 0.35rem 0.75rem;
      border-radius: var(--invest-radius-pill);
      background: #fff4d2;
      color: #7b5904;
      font-size: 0.8rem;
      font-weight: 800;
      border: 1px solid rgba(201, 168, 76, 0.28);
    }

    .invest-compare-copy {
      color: #44341b;
      line-height: 1.65;
      margin: 0 0 0.8rem;
    }

    .invest-compare-list {
      margin: 0;
      padding-inline-start: 1rem;
      display: grid;
      gap: 0.42rem;
      line-height: 1.58;
      color: #4b3b22;
    }

    .invest-tab-row {
      display: flex;
      gap: 0.7rem;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }

    .invest-tab {
      min-height: 44px;
      padding: 0.7rem 1rem;
      border-radius: var(--invest-radius-pill);
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      color: var(--invest-text);
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      transition: transform var(--invest-transition), background var(--invest-transition), border-color var(--invest-transition);
    }

    .invest-tab:hover {
      transform: translateY(-1px);
      border-color: rgba(201, 168, 76, 0.24);
    }

    .invest-tab.is-active {
      background: linear-gradient(180deg, rgba(201, 168, 76, 0.28), rgba(201, 168, 76, 0.15));
      border-color: rgba(201, 168, 76, 0.5);
      color: #fff3cc;
    }

    .invest-guide-card {
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.015)), var(--invest-surface);
      padding: 1.3rem;
      color: var(--invest-text);
    }

    .invest-guide-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 0.85rem;
    }

    .invest-guide-title {
      margin: 0;
      font-size: 1.22rem;
      color: #fff4d2;
    }

    .invest-guide-pill {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 0.35rem 0.75rem;
      border-radius: var(--invest-radius-pill);
      background: rgba(201, 168, 76, 0.13);
      border: 1px solid rgba(201, 168, 76, 0.22);
      color: #f0d491;
      font-size: 0.82rem;
      font-weight: 700;
    }

    .invest-guide-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 1rem;
      margin-top: 0.9rem;
    }

    .invest-guide-block {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--invest-radius-md);
      padding: 1rem;
    }

    .invest-guide-block h4 {
      margin: 0 0 0.55rem;
      font-size: 0.98rem;
      color: #fff2cc;
    }

    .invest-guide-block p,
    .invest-guide-block li {
      color: var(--invest-muted);
      line-height: 1.65;
      margin: 0;
    }

    .invest-guide-block ul {
      margin: 0;
      padding-inline-start: 1rem;
      display: grid;
      gap: 0.4rem;
    }

    .invest-mistake-card {
      padding: 1rem;
      background: rgba(255,255,255,0.04);
      color: var(--invest-text);
    }

    .invest-mistake-index {
      width: 2.25rem;
      height: 2.25rem;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(201, 168, 76, 0.16);
      color: #fff0c3;
      font-weight: 800;
      margin-bottom: 0.75rem;
      border: 1px solid rgba(201, 168, 76, 0.24);
    }

    .invest-mistake-title {
      margin: 0 0 0.35rem;
      color: #fff4d2;
      font-size: 1.04rem;
      font-weight: 800;
    }

    .invest-mistake-copy {
      margin: 0;
      color: var(--invest-muted);
      line-height: 1.6;
    }

    .invest-faq {
      display: grid;
      gap: 0.85rem;

    function getMarketStatus() {
      const now = new Date();
      const utcDay = now.getUTCDay();
      const utcTime = now.getUTCHours() * 60 + now.getUTCMinutes();
      const OPEN_SUN = 22 * 60;
      const CLOSE_FRI = 21 * 60;

      let isOpen = false;
      if (utcDay === 6) isOpen = false;
      else if (utcDay === 5) isOpen = utcTime < CLOSE_FRI;
      else if (utcDay === 0) isOpen = utcTime >= OPEN_SUN;
      else isOpen = true;

      return isOpen ? 'open' : 'closed';
    }

      return KARATS.find(k => k.code === code);
    }

    function getLocalRate(marketCode) {
      if (marketCode === 'AE') return CONSTANTS.AED_PEG;
      return state.rates[MARKET_META[marketCode].currency] ?? null;
    }

    function getLocalPricePerGram(type, marketCode) {
      if (!state.goldPriceUsdPerOz) return null;
      const rate = getLocalRate(marketCode);
      if (!rate) return null;
      if (type === 'ETF') return calc.usdPerGram(state.goldPriceUsdPerOz, karat('24').purity) * rate;

      const purity = karat(type).purity;
      return calc.usdPerGram(state.goldPriceUsdPerOz, purity) * rate;
    }

      if (value == null || Number.isNaN(value)) return '—';
      return `${value.toFixed(2)} g`;

      if (value == null || Number.isNaN(value)) return '—';
      return `${value.toFixed(3)} oz`;

      document.getElementById('purpose-output').innerHTML = `
        <h3 class="invest-advice-title">${active.adviceTitle}</h3>
        <p class="invest-advice-body">${active.body}</p>
        <ul class="invest-bullets">
          ${active.bullets.map(item => `<li>${item}</li>`).join('')}
        </ul>
      `;
    }

    function renderMarketChips() {
      const root = document.getElementById('market-chips');
      root.innerHTML = Object.entries(MARKET_META).map(([code, meta]) => `
        <button class="invest-chip${state.market === code ? ' is-active' : ''}" type="button" data-market="${code}">
          ${meta.name[state.lang]}
        </button>
      `).join('');

      root.querySelectorAll('[data-market]').forEach(btn => {
        btn.addEventListener('click', () => {
          state.market = btn.dataset.market;
          renderMarketChips();
          renderMarketGuide();
          renderPlanner();
          renderStaticText();
        });
      });
    }

    function renderTypeChips() {
      const map = {
        '24': tx('type24'),
        '22': tx('type22'),
        ETF: tx('typeETF'),
      };

      const root = document.getElementById('type-chips');
      root.innerHTML = Object.entries(map).map(([code, label]) => `
        <button class="invest-chip${state.type === code ? ' is-active' : ''}" type="button" data-type="${code}">
          ${label}
        </button>
      `).join('');

      root.querySelectorAll('[data-type]').forEach(btn => {
        btn.addEventListener('click', () => {
          state.type = btn.dataset.type;
          renderTypeChips();
          renderPlanner();
        });
      });
    }

    function renderFrequencyChips() {
      const map = {
        'one-time': tx('oneTime'),
        monthly: tx('monthly'),
      };

      const root = document.getElementById('frequency-chips');
      root.innerHTML = Object.entries(map).map(([code, label]) => `
        <button class="invest-chip${state.frequency === code ? ' is-active' : ''}" type="button" data-frequency="${code}">
          ${label}
        </button>
      `).join('');

      root.querySelectorAll('[data-frequency]').forEach(btn => {
        btn.addEventListener('click', () => {
          state.frequency = btn.dataset.frequency;
          renderFrequencyChips();
          renderPlanner();
        });
      });
    }

    function getPlannerSummary(pricePerGram) {
      const marketName = MARKET_META[state.market].name[state.lang];
      const currency = MARKET_META[state.market].currency;
      const purposeMap = PURPOSES[state.lang][state.purpose];

      const adviceByType = {
        '24': state.lang === 'ar'
          ? `إذا كنت تريد تعرضاً أنظف للمعدن في ${marketName}، فابدأ بسبائك 24K فقط عندما تكون العلاوة واضحة ومنخفضة.`
          : `If you want the cleanest metal exposure in ${marketName}, start with 24K bars only when the premium is clear and reasonably low.`,
        '22': state.lang === 'ar'
          ? `إذا كان الهدف استخداماً ثقافياً أو هدية في ${marketName}، فاستخدم 22K ولكن عامل أجر الصنعة كتكلفة استخدام لا كعائد.`
          : `If the goal is gifting or cultural use in ${marketName}, 22K can work — just treat making charges as a use-cost, not as investment return.`,
        ETF: state.lang === 'ar'
          ? `إذا كان الهدف سهولة التنفيذ دون تخزين، فصندوق الذهب قد يكون أنظف من شراء مشغولات بعلاوة مرتفعة.`
          : `If ease and no-storage matter most, a gold ETF can be cleaner than overpaying for physical products with high premiums.`,
      };

      const premiumMap = {
        '24': state.lang === 'ar' ? 'تقريباً 0%–2% فوق الفوري' : 'roughly 0%–2% over spot',
        '22': state.lang === 'ar' ? 'تقريباً 8%–20% حسب الصنعة' : 'roughly 8%–20% depending on making charge',
        ETF: state.lang === 'ar' ? 'رسوم إدارة/تنفيذ منخفضة عادة' : 'usually low management / execution cost',
      };

      return {
        summary:
          state.lang === 'ar'
            ? `${purposeMap.title}: بميزانية ${formatCurrency(state.budget, currency, MARKET_META[state.market].decimals)} في ${marketName}، هذا تقدير فوري لما يمكن أن تبنيه الآن. ${adviceByType[state.type]}`
            : `${purposeMap.title}: with ${formatCurrency(state.budget, currency, MARKET_META[state.market].decimals)} in ${marketName}, this is a live estimate of what you could build right now. ${adviceByType[state.type]}`,
        meta: [
          tx('metaLive'),
          tx('metaSpot'),
          state.market === 'AE' ? tx('metaAed') : premiumMap[state.type],
          tx('metaVerify'),
        ],
      };
    }

    function renderPlanner() {
      const pricePerGram = getLocalPricePerGram(state.type, state.market);
      const currency = MARKET_META[state.market].currency;
      const decimals = MARKET_META[state.market].decimals;
      const grams = pricePerGram ? state.budget / pricePerGram : null;
      const ounces = grams ? grams / CONSTANTS.GRAMS_PER_TROY_OUNCE : null;
      const annual = grams ? (state.frequency === 'monthly' ? grams * 12 : grams) : null;

      document.getElementById('result-budget').textContent = formatCurrency(state.budget, currency, decimals);
      document.getElementById('result-budget-note').textContent = tx('planBudgetNote');

      document.getElementById('result-grams').textContent = formatWeightGrams(grams);
      document.getElementById('result-grams-note').textContent =
        pricePerGram ? `${formatCurrency(pricePerGram, currency, decimals)} / g` : tx('fetching');

      document.getElementById('result-ounces').textContent = formatWeightOz(ounces);
      document.getElementById('result-ounces-note').textContent = tx('planOuncesNote');

      const fourthLabel = document.getElementById('result-fourth-label');
      const fourthValue = document.getElementById('result-fourth');
      const fourthNote = document.getElementById('result-fourth-note');

      if (state.frequency === 'monthly') {
        fourthLabel.textContent = tx('resultAnnual');
        fourthValue.textContent = formatWeightGrams(annual);
        fourthNote.textContent = state.lang === 'ar'
          ? 'إذا حافظت على الوتيرة نفسها 12 شهراً'
          : 'if you keep the same pace for 12 months';
      } else {
        fourthLabel.textContent = tx('resultPremium');
        fourthValue.textContent = state.type === '24'
          ? (state.lang === 'ar' ? '0%–2%' : '0%–2%')
          : state.type === '22'
            ? (state.lang === 'ar' ? '8%–20%' : '8%–20%')
            : (state.lang === 'ar' ? 'منخفض' : 'Low');
        fourthNote.textContent = state.type === 'ETF' ? tx('planEtfNote') : (
          state.lang === 'ar'
            ? 'يختلف حسب التاجر والمنتج'
            : 'varies by dealer and product'
        );
      }

      const planner = getPlannerSummary(pricePerGram);
      document.getElementById('planner-summary').textContent = planner.summary;
      document.getElementById('planner-meta').innerHTML = planner.meta
        .map(item => `<span class="invest-mini-chip">${item}</span>`)
        .join('');
    }

    function renderCompare() {
      const root = document.getElementById('compare-grid');
      root.innerHTML = COMPARE[state.lang].map(item => `
        <article class="invest-compare-card">
          <div class="invest-compare-top">
            <h3 class="invest-compare-title">${item.title}</h3>
            <span class="invest-compare-tag">${item.tag}</span>
          </div>
          <p class="invest-compare-copy">${item.copy}</p>
          <ul class="invest-compare-list">
            ${item.bullets.map(b => `<li>${b}</li>`).join('')}
          </ul>
        </article>
      `).join('');
    }

    function renderMarketTabs() {
      const root = document.getElementById('market-tabs');
      root.innerHTML = Object.entries(MARKET_META).map(([code, meta]) => `
        <button class="invest-tab${state.market === code ? ' is-active' : ''}" type="button" data-market-tab="${code}">
          ${meta.name[state.lang]}
        </button>
      `).join('');

      root.querySelectorAll('[data-market-tab]').forEach(btn => {
        btn.addEventListener('click', () => {
          state.market = btn.dataset.marketTab;
          renderMarketTabs();
          renderMarketChips();
          renderMarketGuide();
          renderPlanner();
          renderStaticText();
        });
      });
    }

    function renderMarketGuide() {
      const guide = MARKET_GUIDES[state.lang][state.market];
      document.getElementById('market-guide').innerHTML = `
        <div class="invest-guide-head">
          <h3 class="invest-guide-title">${guide.title}</h3>
          <span class="invest-guide-pill">${guide.pill}</span>
        </div>
        <div class="invest-guide-grid">
          ${guide.blocks.map(block => `
            <div class="invest-guide-block">
              <h4>${block.title}</h4>
              ${
                block.list
                  ? `<ul>${block.list.map(item => `<li>${item}</li>`).join('')}</ul>`
                  : `<p>${block.body}</p>`
              }
            </div>
          `).join('')}
        </div>
      `;
    }

    function renderMistakes() {
      document.getElementById('mistakes-grid').innerHTML = MISTAKES[state.lang].map((item, index) => `
        <article class="invest-mistake-card">
          <span class="invest-mistake-index">${index + 1}</span>
          <h3 class="invest-mistake-title">${item.title}</h3>
          <p class="invest-mistake-copy">${item.copy}</p>
        </article>
      `).join('');
    }

    function renderFaq() {
      document.getElementById('faq-list').innerHTML = FAQ[state.lang].map(item => `
        <details class="invest-faq-item">
          <summary>${item.q}</summary>
          <div class="invest-faq-answer">${item.a}</div>
        </details>
      `).join('');
    }

    function renderLiveCard() {
      const panel = document.getElementById('invest-live-panel');
      const status = getMarketStatus();
      const spot = state.goldPriceUsdPerOz;
      const p24 = getLocalPricePerGram('24', 'AE');
      const p22 = getLocalPricePerGram('22', 'AE');
      const p21 = getLocalPricePerGram('21', 'AE');

      const statusEl = document.getElementById('invest-market-status');
      statusEl.textContent = status === 'open' ? tx('marketOpen') : tx('marketClosed');
      statusEl.className = `invest-market-chip ${status === 'open' ? 'is-open' : 'is-closed'}`;

      document.getElementById('stat-spot').textContent = formatCurrency(spot, 'USD', 2);
      document.getElementById('stat-24').textContent = formatCurrency(p24, 'AED', 2);
      document.getElementById('stat-22').textContent = formatCurrency(p22, 'AED', 2);
      document.getElementById('stat-21').textContent = formatCurrency(p21, 'AED', 2);

      document.getElementById('invest-updated').textContent = state.goldPriceUsdPerOz
        ? `${tx('updated')}: ${fmt.formatTimestampShort(new Date().toISOString(), state.lang)}`
        : tx('fetching');

      panel.removeAttribute('aria-busy');

      if (spot) {
        const p18 = getLocalPricePerGram('18', 'AE');
        updateTicker({
          xauUsd: spot,
          uae24k: p24,
          uae22k: p22,
          uae21k: p21,
          uae18k: p18,
        });
      }
    }

    function applyLang() {
      renderStaticText();
      renderPurposeCards();
      renderMarketChips();
      renderTypeChips();
      renderFrequencyChips();
      renderCompare();
      renderMarketTabs();
      renderMarketGuide();
      renderMistakes();
      renderFaq();
      renderPlanner();
      renderLiveCard();
      updateNavLang(state.lang);
      updateTickerLang(state.lang);
    }

    async function fetchLiveData() {
      if (!navigator.onLine) return;

      const [goldRes, fxRes] = await Promise.allSettled([
        api.fetchGold(),
        api.fetchFX(),
      ]);

      if (goldRes.status === 'fulfilled') {
        state.goldPriceUsdPerOz = goldRes.value.price;
        cache.saveGoldPrice(goldRes.value.price, goldRes.value.updatedAt);
      }

      if (fxRes.status === 'fulfilled') {
        state.rates = fxRes.value.rates ?? {};
        cache.saveFXRates(state.rates, {
          lastUpdateUtc: fxRes.value.time_last_update_utc,
          nextUpdateUtc: fxRes.value.time_next_update_utc,
        });
      }

      renderLiveCard();
      renderPlanner();
    }

    function bindBudgetInputs() {
      const input = document.getElementById('budget-input');
      const range = document.getElementById('budget-range');

      const sync = nextValue => {
        const value = Math.max(250, Number(nextValue) || 250);
        state.budget = value;
        input.value = value;
        range.value = Math.min(Number(range.max), value);
        renderPlanner();
      };

      input.addEventListener('input', e => sync(e.target.value));
      range.addEventListener('input', e => sync(e.target.value));
    }

    async function init() {
      state.lang = getLang();

      const navCtrl = injectNav(state.lang, 0);
      injectBreadcrumbs('invest');
      navCtrl.getLangToggleButtons().forEach(btn => {
        btn.addEventListener('click', () => {
          state.lang = state.lang === 'en' ? 'ar' : 'en';
          saveLang(state.lang);
          applyLang();
        });
      });

      injectFooter(state.lang, 0);
      injectTicker(state.lang, 0);

      const stub = {
        lang: state.lang,
        goldPriceUsdPerOz: null,
        rates: {},
        fxMeta: { nextUpdateUtc: 0 },
        status: {},
        freshness: {},
        favorites: [],
        history: [],
        selectedKaratSpotlight: '24',
        selectedKaratCountries: '24',
        selectedUnitTable: 'gram',
        sortOrder: 'high-low',
        searchQuery: '',
        activeTab: 'gcc',
        prevGoldPriceUsdPerOz: null,
        dayOpenGoldPriceUsdPerOz: null,
        isOnline: navigator.onLine,
        volatility7d: null,
        cacheHealthScore: 0,
      };

      cache.loadState(stub);
      if (stub.goldPriceUsdPerOz) {
        state.goldPriceUsdPerOz = stub.goldPriceUsdPerOz;
        state.dayOpenUsdPerOz = stub.dayOpenGoldPriceUsdPerOz;
        state.rates = stub.rates || {};
      }

      bindBudgetInputs();
      applyLang();
      await fetchLiveData();

      if (state.timer) clearInterval(state.timer);
      state.timer = setInterval(fetchLiveData, CONSTANTS.GOLD_REFRESH_MS);
    }

    document.addEventListener('DOMContentLoaded', init);

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/Gold-Prices/sw.js').catch(() => {});
    }
  </script>
</body>
</html>
