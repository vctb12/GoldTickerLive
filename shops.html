<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gold Shops & Markets Directory by Region | GoldPrices</title>
  <meta name="description" content="Explore listed gold shops and known gold markets by region, country, city, and specialty across GCC, Levant, Africa, and India. Find trusted dealers, compare locations, and discover market clusters." />
  <link rel="canonical" href="https://vctb12.github.io/Gold-Prices/shops.html" />
  <link rel="alternate" hreflang="x-default" href="https://vctb12.github.io/Gold-Prices/shops.html" />
  <link rel="alternate" hreflang="en" href="https://vctb12.github.io/Gold-Prices/shops.html" />
  <link rel="alternate" hreflang="ar" href="https://vctb12.github.io/Gold-Prices/shops.html?lang=ar" />
  <link rel="manifest" href="manifest.json" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://vctb12.github.io/Gold-Prices/shops.html" />
  <meta property="og:title" content="Gold Shops & Markets Directory by Region | GoldPrices" />
  <meta property="og:description" content="Explore listed gold shops and known gold markets by region, country, city, and specialty across GCC, Levant, Africa, and India." />
  <meta property="og:image" content="https://vctb12.github.io/Gold-Prices/assets/og-image.png" />
  <meta name="theme-color" content="#d4a017" />
  <link rel="stylesheet" href="./style.css" />
  <link rel="stylesheet" href="./shops.css" />
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png" />

  <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png" />
<!-- Structured data for directory -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "ItemList",
    "name": "Gold Shops Directory",
    "description": "Directory of gold shops and markets across GCC, Levant, Africa, and India",
    "url": "https://vctb12.github.io/Gold-Prices/shops.html"
  }
  </script>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "BreadcrumbList",
    "itemListElement": [
      {"@type":"ListItem","position":1,"name":"Home","item":"https://vctb12.github.io/Gold-Prices/"},
      {"@type":"ListItem","position":2,"name":"Gold Shops & Markets","item":"https://vctb12.github.io/Gold-Prices/shops.html"}
    ]
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>
  <!-- Nav + Breadcrumbs (injected by shops.js) -->
  <div class="page-breadcrumbs"></div>

  <main id="main-content">
    <section class="shops-hero" aria-labelledby="shops-title">
      <div class="shops-hero-inner">
        <p class="shops-kicker" id="shops-kicker">Shops by region</p>
        <h1 id="shops-title">Explore Gold Shops & Known Gold Markets</h1>
        <p class="shops-lead" id="shops-lead">Browse directory listings across countries covered on GoldPrices. Use filters to narrow by region, country, city, and specialty. Shop information is for reference, and business details are shown where available.</p>

        <div class="shops-trust-banner" aria-label="Data freshness">
          <span class="shops-trust-icon" aria-hidden="true">◈</span>
          <span class="shops-trust-text"><span id="shops-trust-label">Reference listings</span> · <span id="shops-last-updated">Loading...</span></span>
        </div>
        <p class="shops-results-disclaimer" id="shops-freshness-semantics">Freshness semantics: Live / Delayed / Cached-Fallback / Estimated / Historical baseline (used consistently across GoldPrices). Directory source: editorial review timestamp.</p>
        <p class="shops-results-disclaimer" id="shops-price-disclaimer">Listings support discovery only. Spot-linked reference prices are separate from final retail jewelry quotes.</p>

        <div class="shops-hero-stats" aria-label="Directory overview">
          <div class="shops-stat">
            <span class="shops-stat-value" id="shops-stat-listings">0</span>
            <span class="shops-stat-label" id="shops-stat-listings-label">Listed markets</span>
          </div>
          <div class="shops-stat">
            <span class="shops-stat-value" id="shops-stat-countries">0</span>
            <span class="shops-stat-label" id="shops-stat-countries-label">Countries</span>
          </div>
          <div class="shops-stat">
            <span class="shops-stat-value" id="shops-stat-regions">0</span>
            <span class="shops-stat-label" id="shops-stat-regions-label">Regions</span>
          </div>
        </div>

        <div class="shops-market-guides" aria-label="Market guide pages">
          <a href="countries/uae/markets/dubai-gold-souk.html" class="shops-guide-chip">
            <span aria-hidden="true">📍</span> Dubai Gold Souk Guide
          </a>
          <a href="countries/egypt/markets/khan-el-khalili-cairo.html" class="shops-guide-chip">
            <span aria-hidden="true">📍</span> Khan el-Khalili Guide
          </a>
        </div>

        <div class="shops-popular" aria-label="Popular markets">
          <span class="shops-popular-label" id="shops-popular-label">Popular markets</span>
          <div class="shops-popular-chips" id="shops-popular-chips"></div>
        </div>

        <div class="shops-quick-actions">
          <a href="calculator.html" class="shops-quick-action-btn">
            <span class="shops-quick-action-icon">🧮</span>
            <span class="shops-quick-action-text" id="shops-qa-calc">Calculate Value</span>
          </a>
          <a href="tracker.html" class="shops-quick-action-btn">
            <span class="shops-quick-action-icon">📈</span>
            <span class="shops-quick-action-text" id="shops-qa-rates">Live Rates</span>
          </a>
          <a href="countries/uae.html" class="shops-quick-action-btn">
            <span class="shops-quick-action-icon">🇦🇪</span>
            <span class="shops-quick-action-text" id="shops-qa-uae">UAE Market</span>
          </a>
        </div>
      </div>
    </section>

    <section class="shops-controls" aria-label="Shop filters">
      <div class="shops-controls-inner">
        <button class="shops-filter-toggle" id="shops-filter-toggle" aria-expanded="false" aria-controls="shops-filter-panel">
          <span id="shops-filter-toggle-label">Filter &amp; Sort</span>
          <span class="shops-filter-badge" id="shops-filter-badge" hidden>0</span>
          <span class="shops-filter-toggle-icon" aria-hidden="true">▾</span>
        </button>
        <div class="shops-filter-panel" id="shops-filter-panel">
        <label class="shops-control shops-control--wide" for="shops-search">
          <span id="shops-search-label">Search by shop, city, country, market, or specialty</span>
          <input id="shops-search" type="search" placeholder="e.g. Dubai Gold Souk, Riyadh, bullion" />
        </label>

        <label class="shops-control" for="shops-region-filter">
          <span id="shops-region-label">Region</span>
          <select id="shops-region-filter"></select>
        </label>

        <label class="shops-control" for="shops-country-filter">
          <span id="shops-country-label">Country</span>
          <select id="shops-country-filter"></select>
        </label>

        <label class="shops-control" for="shops-city-filter">
          <span id="shops-city-label">City</span>
          <select id="shops-city-filter"></select>
        </label>

        <label class="shops-control" for="shops-specialty-filter">
          <span id="shops-specialty-label">Specialty</span>
          <select id="shops-specialty-filter"></select>
        </label>
        <label class="shops-control shops-control--wide shops-control--checkbox" for="shops-verified-only">
          <span id="shops-verified-label">Verified details</span>
          <input id="shops-verified-only" type="checkbox" />
          <span id="shops-verified-help" class="shops-control-help">Show listings with phone or website details only</span>
        </label>
        </div><!-- /.shops-filter-panel -->
      </div>
    </section>

    <!-- Shortlist bar (shown when items saved) -->
    <section id="shops-shortlist-bar" class="shops-shortlist-bar" hidden aria-label="Saved shops shortlist">
      <div class="shops-shortlist-bar-inner">
        <div class="shops-shortlist-head">
          <span class="shops-shortlist-icon" aria-hidden="true">📋</span>
          <strong id="shops-shortlist-count">0 saved</strong>
          <span id="shops-shortlist-label" class="shops-shortlist-label">Quick comparison list</span>
        </div>
        <div class="shops-shortlist-actions">
          <button id="shops-shortlist-clear" type="button" class="shops-shortlist-clear-btn">Clear all</button>
          <a id="shops-shortlist-compare" href="#shops-grid" class="shops-shortlist-compare-btn">Review saved</a>
        </div>
      </div>
    </section>

    <section id="shops-featured" class="shops-featured" aria-labelledby="shops-featured-title" hidden>
      <div class="shops-results-inner">
        <h2 id="shops-featured-title" class="shops-featured-title">Featured Markets</h2>
        <div id="shops-featured-grid" class="shops-featured-grid"></div>
      </div>
    </section>

    <section class="shops-results" aria-labelledby="shops-results-title">
      <div class="shops-results-inner">
        <div class="shops-results-head">
          <div class="shops-results-head-left">
            <h2 id="shops-results-title">Listings</h2>
            <div id="shops-filter-pills" class="shops-filter-pills"></div>
            <p id="shops-active-filters" class="shops-active-filters"></p>
            <p id="shops-results-legend" class="shops-results-legend">Legend: Store profile = direct business listing; Market-area listing = cluster/area reference. Details confidence reflects currently available contact details.</p>
            <p id="shops-results-disclaimer" class="shops-results-disclaimer">Listings may represent market areas or dealer clusters unless direct contact details are shown.</p>
          </div>
          <p id="shops-count" aria-live="polite"></p>
        </div>

        <div id="shops-grid" class="shops-grid"></div>

        <div id="shops-empty" class="shops-empty" hidden>
          <span class="ses-icon" aria-hidden="true">🔍</span>
          <h3 id="shops-empty-title">No shops found for this filter</h3>
          <p id="shops-empty-text">Try broadening your search or <a href="mailto:info@goldprices.com?subject=Shop%20Suggestion" class="ses-link">suggest a shop</a>.</p>
          <button id="shops-clear-filters" type="button" class="shops-clear-btn">Clear filters</button>
        </div>
      </div>
    </section>

    <section class="shops-info" aria-labelledby="shops-info-title">
      <div class="shops-info-inner">
        <h2 id="shops-info-title">How to use this directory</h2>
        <div class="shops-info-grid">
          <article class="shops-info-card">
            <h3 id="shops-info-1-title">Compare by market area</h3>
            <p id="shops-info-1-body">Start with a country or city filter, then compare listed markets and specialties side by side.</p>
          </article>
          <article class="shops-info-card">
            <h3 id="shops-info-2-title">Check available details</h3>
            <p id="shops-info-2-body">Cards indicate whether business details are limited or partially available so you know what to expect.</p>
          </article>
          <article class="shops-info-card">
            <h3 id="shops-info-3-title">Use as a shortlist</h3>
            <p id="shops-info-3-body">This page is for reference and discovery. Always confirm current prices, charges, and product details directly with shops.</p>
          </article>
        </div>
      </div>
    </section>

    <!-- Near Me Map Section (uses Geolocation API + OpenStreetMap/Nominatim) -->
    <section class="shops-nearme" id="shops-nearme" aria-labelledby="shops-nearme-title">
      <div class="shops-nearme-inner">
        <h2 id="shops-nearme-title">📍 Find Gold Souqs Near You</h2>
        <p class="shops-nearme-lead">Allow location access to discover which gold markets and souqs are closest to your current position. No account required.</p>
        <button class="btn btn-primary shops-nearme-btn" id="shops-nearme-btn" type="button">
          <span class="shops-nearme-btn-icon" aria-hidden="true">📍</span>
          Find shops near me
        </button>
        <div class="shops-nearme-status" id="shops-nearme-status" hidden aria-live="polite"></div>
        <div class="shops-nearme-results" id="shops-nearme-results" hidden></div>
      </div>
    </section>
  </main>

  <div id="shops-modal" class="shops-modal" hidden aria-labelledby="shops-modal-title" role="dialog" aria-modal="true">
    <div class="shops-modal-overlay"></div>
    <div class="shops-modal-content">
      <button class="shops-modal-close" type="button" aria-label="Close modal">×</button>
      <div id="shops-modal-body"></div>
    </div>
  </div>

  <script type="module" src="./shops.js"></script>
</body>
</html>
