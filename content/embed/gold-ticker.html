<!doctype html>
<html lang="en">
  <head>

         crossorigin="anonymous"></script>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Gold Price Widget — GoldPrices</title>
    <meta
      name="description"
      content="Embeddable live gold price widget. Iframe this on any site to show real-time 24K, 22K, 21K, 18K gold prices in AED or your currency."
    />
    <link rel="canonical" href="https://goldtickerlive.com/embed/gold-ticker.html" />
    <meta property="og:image" content="https://goldtickerlive.com/assets/og-image.png" />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --gold: #d4a017;
        --gold-dark: #b8860b;
        --bg: #0f172a;
        --card-bg: #1e293b;
        --border: #334155;
        --text: #f8fafc;
        --muted: #94a3b8;
        --green: #10b981;
        --red: #ef4444;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      body {
        background: var(--bg);
        font-family:
          system-ui,
          -apple-system,
          'Segoe UI',
          sans-serif;
        color: var(--text);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .widget {
        width: 100%;
        max-width: 340px;
        background: var(--card-bg);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 1rem 1.1rem;
        position: relative;
      }

      .widget-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 0.65rem;
      }

      .widget-brand {
        display: flex;
        align-items: center;
        gap: 0.4rem;
        font-size: 0.75rem;
        font-weight: 700;
        color: var(--gold);
        text-decoration: none;
      }
      .widget-brand::before {
        content: '◈';
        font-size: 1rem;
      }

      .freshness-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--muted);
        display: inline-block;
        transition: background 0.3s;
      }
      .freshness-dot.live {
        background: var(--green);
        animation: pulse 2s infinite;
      }
      .freshness-dot.stale {
        background: #f59e0b;
      }
      .freshness-dot.error {
        background: var(--red);
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }

      .spot-row {
        display: flex;
        align-items: baseline;
        gap: 0.5rem;
        margin-bottom: 0.5rem;
      }
      .spot-value {
        font-size: 1.5rem;
        font-weight: 800;
        color: var(--gold);
        font-variant-numeric: tabular-nums;
      }
      .spot-unit {
        font-size: 0.8rem;
        color: var(--muted);
      }
      .change-badge {
        font-size: 0.75rem;
        font-weight: 700;
        padding: 0.15rem 0.5rem;
        border-radius: 5px;
      }
      .change-badge.up {
        background: rgba(16, 185, 129, 0.15);
        color: var(--green);
      }
      .change-badge.down {
        background: rgba(239, 68, 68, 0.15);
        color: var(--red);
      }
      .change-badge.flat {
        background: rgba(148, 163, 184, 0.1);
        color: var(--muted);
      }

      .karat-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 0.4rem;
        margin-top: 0.5rem;
      }
      .karat-cell {
        background: #0f172a;
        border-radius: 7px;
        padding: 0.4rem 0.3rem;
        text-align: center;
      }
      .karat-label {
        font-size: 0.65rem;
        color: var(--muted);
        font-weight: 600;
      }
      .karat-price {
        font-size: 0.78rem;
        font-weight: 700;
        color: var(--text);
        margin-top: 0.15rem;
        font-variant-numeric: tabular-nums;
      }
      .karat-unit {
        font-size: 0.6rem;
        color: var(--muted);
      }

      .widget-footer {
        margin-top: 0.75rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 0.68rem;
        color: var(--muted);
      }
      .widget-footer a {
        color: var(--gold);
        text-decoration: none;
        font-weight: 600;
      }
      .widget-footer a:hover {
        text-decoration: underline;
      }

      .skeleton {
        background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%);
        background-size: 200% 100%;
        animation: shimmer 1.4s infinite;
        border-radius: 4px;
      }
      @keyframes shimmer {
        0% {
          background-position: 200% 0;
        }
        100% {
          background-position: -200% 0;
        }
      }
      .skel-spot {
        height: 1.8rem;
        width: 8rem;
      }
      .skel-karat {
        height: 2.8rem;
      }
    </style>
  </head>
  <body>
    <div class="widget" role="region" aria-label="Live gold prices">
      <div class="widget-header">
        <a
          class="widget-brand"
          href="https://goldtickerlive.com/"
          target="_blank"
          rel="noopener noreferrer"
        >
          GoldPrices
        </a>
        <span class="freshness-dot" id="dot" title="Fetching prices…"></span>
      </div>

      <div class="spot-row">
        <span class="spot-value" id="spot-val"><span class="skeleton skel-spot">&nbsp;</span></span>
        <span class="spot-unit">USD/oz</span>
        <span class="change-badge flat" id="change-badge" style="display: none"></span>
      </div>

      <div class="karat-grid" id="karat-grid">
        <div class="karat-cell">
          <div class="karat-label">24K</div>
          <div class="skeleton skel-karat"></div>
        </div>
        <div class="karat-cell">
          <div class="karat-label">22K</div>
          <div class="skeleton skel-karat"></div>
        </div>
        <div class="karat-cell">
          <div class="karat-label">21K</div>
          <div class="skeleton skel-karat"></div>
        </div>
        <div class="karat-cell">
          <div class="karat-label">18K</div>
          <div class="skeleton skel-karat"></div>
        </div>
      </div>

      <div class="widget-footer">
        <span id="ts-label">Loading…</span>
        <a href="https://goldtickerlive.com/" target="_blank" rel="noopener noreferrer"
          >Full tracker →</a
        >
      </div>
    </div>

    <script>
      const AED_PEG = 3.6725;
      const TROY = 31.1035;
      const KARATS = [
        { code: '24', purity: 1 },
        { code: '22', purity: 22 / 24 },
        { code: '21', purity: 21 / 24 },
        { code: '18', purity: 18 / 24 },
      ];

      // Read currency preference from query string: ?cur=AED (default AED)
      const qs = new URLSearchParams(location.search);
      const ALLOWED_CURRENCIES = new Set([
        'AED',
        'SAR',
        'USD',
        'KWD',
        'QAR',
        'BHD',
        'OMR',
        'EGP',
        'JOD',
        'MAD',
        'DZD',
        'TND',
        'LBP',
        'INR',
        'GBP',
        'EUR',
      ]);
      const rawCur = (qs.get('cur') || 'AED').toUpperCase().replace(/[^A-Z]/g, '');
      const currency = ALLOWED_CURRENCIES.has(rawCur) ? rawCur : 'AED';
      const lang = (qs.get('lang') || 'en').toLowerCase();
      const isAr = lang === 'ar'; // only 'ar' triggers RTL; all other values default to LTR

      function fmt(n, d = 2) {
        return n.toLocaleString('en-US', { minimumFractionDigits: d, maximumFractionDigits: d });
      }

      async function fetchSpot() {
        const r = await fetch('https://api.gold-api.com/price/XAU');
        if (!r.ok) throw new Error('API ' + r.status);
        return r.json();
      }

      async function fetchFX() {
        if (currency === 'USD') return 1;
        if (currency === 'AED') return AED_PEG;
        const r = await fetch(`https://open.er-api.com/v6/latest/USD`);
        if (!r.ok) throw new Error('FX ' + r.status);
        const d = await r.json();
        return d.rates?.[currency] ?? null;
      }

      function render(spot, fxRate, updatedAt, prev) {
        // Spot value
        document.getElementById('spot-val').textContent = '$' + fmt(spot);

        // Change badge
        if (prev && prev > 0) {
          const delta = spot - prev;
          const pct = (delta / prev) * 100;
          const badge = document.getElementById('change-badge');
          const sign = delta >= 0 ? '+' : '';
          badge.textContent = sign + fmt(pct, 2) + '%';
          badge.className = 'change-badge ' + (delta > 0 ? 'up' : delta < 0 ? 'down' : 'flat');
          badge.style.display = '';
        }

        // Karat grid
        const grid = document.getElementById('karat-grid');
        grid.innerHTML = '';
        for (const k of KARATS) {
          const pricePerGram = (spot / TROY) * k.purity * fxRate;
          const cell = document.createElement('div');
          cell.className = 'karat-cell';
          const lbl = document.createElement('div');
          lbl.className = 'karat-label';
          lbl.textContent = k.code + 'K';
          const price = document.createElement('div');
          price.className = 'karat-price';
          price.textContent = fmt(pricePerGram);
          const unit = document.createElement('div');
          unit.className = 'karat-unit';
          unit.textContent = currency + '/g';
          cell.append(lbl, price, unit);
          grid.appendChild(cell);
        }

        // Freshness
        const dot = document.getElementById('dot');
        const now = Date.now();
        const age = updatedAt ? now - new Date(updatedAt).getTime() : Infinity;
        dot.className =
          'freshness-dot ' + (age < 120000 ? 'live' : age < 600000 ? 'stale' : 'error');
        dot.title = updatedAt
          ? 'Updated ' + new Date(updatedAt).toLocaleTimeString()
          : 'Unknown freshness';

        const ts = document.getElementById('ts-label');
        ts.textContent = updatedAt
          ? new Date(updatedAt).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
          : '';
      }

      let prevSpot = null;

      async function update() {
        try {
          const [data, fxRate] = await Promise.all([fetchSpot(), fetchFX()]);
          const spot = data.price;
          render(spot, fxRate || 1, data.updatedAt, prevSpot);
          prevSpot = spot;

          // Cache in localStorage for offline use
          try {
            localStorage.setItem(
              'gp_gold_price',
              JSON.stringify({ price: spot, updatedAt: data.updatedAt })
            );
          } catch {}
        } catch (e) {
          // Try cache fallback
          try {
            const cached = JSON.parse(localStorage.getItem('gp_gold_price') || 'null');
            if (cached) render(cached.price, AED_PEG, cached.updatedAt, null);
          } catch {}
          document.getElementById('dot').className = 'freshness-dot error';
          document.getElementById('dot').title = 'Error: ' + e.message;
        }
      }

      update();
      setInterval(update, 90000); // Refresh every 90 seconds
    </script>
  </body>
</html>
