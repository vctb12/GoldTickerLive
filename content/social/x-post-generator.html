  <body>
    <div id="nav-root"></div>

    <div style="max-width: 700px; margin: 0 auto; padding: 1.5rem 1rem">
      <div class="page-header">
        <h1>𝕏 Gold Post Generator</h1>
      </div>

      <!-- Controls -->
      <div class="card">
        <h2>Generate Post</h2>
        <hr class="section-divider" />

        <div style="margin-bottom: 1rem">
          <label for="template-select">Template</label>
          <select id="template-select">
            <option value="daily">
              Daily Price Update — Full karat breakdown with AED prices and day change
            </option>
            <option value="alert">
              Price Alert (Big Move) — Urgent post for significant price movements
            </option>
            <option value="weekly">
              Weekly Summary — Week-in-review with high/low and overall change
            </option>
            <option value="ath">
              New All-Time High Alert — Milestone announcement when gold hits ATH
            </option>
            <option value="friday">
              Friday Market Close — End-of-week wrap-up with week performance
            </option>
            <option value="ramadan">
              Ramadan Market Brief — Seasonal market note for Ramadan period
            </option>
          </select>
        </div>

        <button class="btn btn-primary" id="generate-btn" onclick="generatePost()">
          ✨ Generate Post
        </button>
        <span id="error-msg" class="error-msg"></span>
      </div>

      <!-- Preview -->
      <div class="card">
        <h2>Preview</h2>
        <hr class="section-divider" />
        <div class="preview-box" id="preview-box">
          <span class="preview-empty">Post preview will appear here…</span>
        </div>
        <div class="char-counter" id="char-counter"></div>
        <div class="freshness" id="freshness-label"></div>
        <div class="btn-group">
          <button class="btn btn-secondary" onclick="copyPost()">📋 Copy to Clipboard</button>
          <button class="btn btn-dark" onclick="openOnX()">𝕏 Open on X</button>
        </div>
      </div>

      <!-- History -->
      <div class="card" id="history-card">
        <h2>Post History</h2>
        <hr class="section-divider" />
        <div id="history-list">
          <p style="color: #94a3b8; font-size: 0.85rem">No posts generated yet.</p>
        </div>
        <button class="btn btn-secondary" onclick="clearHistory()" style="margin-top: 0.5rem">
          🗑 Clear History
        </button>
      </div>

      <script>
        // ─── Template logic (inlined from social/postTemplates.js) ───────────────────

        const SITE_URL = 'https://goldtickerlive.com/';
        const X_URL_LENGTH = 23;
        const AED_PEG = 3.6725;
        const TROY_OZ_GRAMS = 31.1035;

        function fmt(n, decimals) {
          decimals = decimals == null ? 2 : decimals;
          if (n == null || isNaN(n)) return '—';
          return n.toLocaleString('en-US', {
            minimumFractionDigits: decimals,
            maximumFractionDigits: decimals,
          });
        }

        function fmtChange(change, pct) {
          if (change == null || isNaN(change)) return '—';
          const sign = change >= 0 ? '+' : '';
          return sign + fmt(change) + ' (' + sign + fmt(pct) + '%)';
        }

        function trendEmoji(pct) {
          if (pct == null || isNaN(pct)) return '➡️';
          if (pct > 1) return '🚀';
          if (pct > 0) return '📈';
          if (pct < -1) return '📉';
          if (pct < 0) return '🔻';
          return '➡️';
        }

        function trendText(pct) {
          if (pct == null || isNaN(pct)) return 'Steady';
          if (pct > 1) return 'Surging';
          if (pct > 0) return 'Rising';
          if (pct < -1) return 'Falling';
          if (pct < 0) return 'Slipping';
          return 'Steady';
        }

        function calcKarat(spotUsdPerOz, purity) {
          const usdPerGram = (spotUsdPerOz / TROY_OZ_GRAMS) * purity;
          const aedPerGram = usdPerGram * AED_PEG;
          return { usdPerGram, aedPerGram };
        }

        function generateDaily(spotUsdPerOz, dayOpenUsdPerOz, generatedAt) {
          var k24 = calcKarat(spotUsdPerOz, 1.0);
          var k22 = calcKarat(spotUsdPerOz, 22 / 24);
          var k21 = calcKarat(spotUsdPerOz, 21 / 24);
          var k18 = calcKarat(spotUsdPerOz, 18 / 24);
          var change = dayOpenUsdPerOz ? spotUsdPerOz - dayOpenUsdPerOz : null;
          var pct = change != null && dayOpenUsdPerOz ? (change / dayOpenUsdPerOz) * 100 : null;
          var emoji = trendEmoji(pct);
          var dateStr = new Date(generatedAt).toLocaleDateString('en-US', {
            weekday: 'short',
            month: 'short',
            day: 'numeric',
          });

          var lines = [
            emoji + ' Gold Price Update — ' + dateStr,
            'Spot: $' +
              fmt(spotUsdPerOz) +
              '/oz' +
              (change != null ? '  ' + fmtChange(change, pct) : ''),
            '',
            '24K  AED ' + fmt(k24.aedPerGram) + '/g',
            '22K  AED ' + fmt(k22.aedPerGram) + '/g',
            '21K  AED ' + fmt(k21.aedPerGram) + '/g',
            '18K  AED ' + fmt(k18.aedPerGram) + '/g',
            '',
            '🔗 ' + SITE_URL,
            '#GoldPrice #Gold #UAE',
          ];
          return lines.join('\n');
        }

        function generateAlert(spotUsdPerOz, dayOpenUsdPerOz, generatedAt) {
          var k24 = calcKarat(spotUsdPerOz, 1.0);
          var change = dayOpenUsdPerOz ? spotUsdPerOz - dayOpenUsdPerOz : null;
          var pct = change != null && dayOpenUsdPerOz ? (change / dayOpenUsdPerOz) * 100 : null;
          var emoji = trendEmoji(pct);
          var trend = trendText(pct);
          var sign = change != null && change >= 0 ? '+' : '';
          var timeStr = new Date(generatedAt).toLocaleTimeString('en-US', {
            hour: '2-digit',
            minute: '2-digit',
            timeZone: 'Asia/Dubai',
          });

          var lines = [
            '🚨 GOLD PRICE ALERT — ' + timeStr + ' GST',
            '',
            emoji + ' Gold is ' + trend + '!',
            'Spot: $' + fmt(spotUsdPerOz) + '/oz',
            change != null
              ? 'Move: ' + sign + '$' + fmt(Math.abs(change)) + ' (' + sign + fmt(pct) + '%)'
              : null,
            '24K: AED ' + fmt(k24.aedPerGram) + '/g',
            '',
            'Track live → ' + SITE_URL,
            '#GoldAlert #GoldPrice #XAU',
          ].filter(Boolean);
          return lines.join('\n');
        }

        function generateWeekly(spotUsdPerOz, generatedAt) {
          var now = new Date(generatedAt);
          var monday = new Date(now);
          monday.setDate(now.getDate() - ((now.getDay() + 6) % 7));
          var friday = new Date(monday);
          friday.setDate(monday.getDate() + 4);
          var monLabel = monday.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
          var friLabel = friday.toLocaleDateString('en-US', { day: 'numeric' });
          var weekRange = monLabel + '–' + friLabel;

          var lines = [
            '📊 Gold Week in Review (' + weekRange + ')',
            'Current: $' + fmt(spotUsdPerOz) + '/oz',
            '',
            '24K AED ' + fmt(calcKarat(spotUsdPerOz, 1.0).aedPerGram) + '/g',
            '22K AED ' + fmt(calcKarat(spotUsdPerOz, 22 / 24).aedPerGram) + '/g',
            '',
            '📈 Charts & history → ' + SITE_URL,
            '#GoldPrice #WeeklyUpdate',
          ];
          return lines.join('\n');
        }

        function generateATH(spotUsdPerOz, generatedAt) {
          var k24 = calcKarat(spotUsdPerOz, 1.0);
          var dateStr = new Date(generatedAt).toLocaleDateString('en-US', {
            weekday: 'long',
            month: 'long',
            day: 'numeric',
            year: 'numeric',
          });
          var lines = [
            '🏆 NEW ALL-TIME HIGH — ' + dateStr,
            '',
            '🥇 Gold just hit a NEW record: $' + fmt(spotUsdPerOz) + '/oz',
            '24K in AED: ' + fmt(k24.aedPerGram) + '/g',
            '',
            'A historic milestone for gold investors.',
            '',
            '📈 Track live prices → ' + SITE_URL,
            '#GoldATH #GoldRecord #XAU #Gold',
          ];
          return lines.join('\n');
        }

        function generateFriday(spotUsdPerOz, dayOpenUsdPerOz, generatedAt) {
          var k24 = calcKarat(spotUsdPerOz, 1.0);
          var change = dayOpenUsdPerOz ? spotUsdPerOz - dayOpenUsdPerOz : null;
          var pct = change != null && dayOpenUsdPerOz ? (change / dayOpenUsdPerOz) * 100 : null;
          var emoji = trendEmoji(pct);
          var now = new Date(generatedAt);
          var dateStr = now.toLocaleDateString('en-US', {
            month: 'long',
            day: 'numeric',
            year: 'numeric',
          });

          var lines = [
            emoji + ' Friday Gold Market Close — ' + dateStr,
            '',
            'Spot: $' + fmt(spotUsdPerOz) + '/oz',
            change != null ? 'Day: ' + fmtChange(change, pct) : null,
            '',
            '24K AED ' + fmt(k24.aedPerGram) + '/g',
            '',
            'Have a great weekend! 🌙',
            '→ ' + SITE_URL,
            '#GoldMarket #FridayClose #GoldPrice',
          ].filter(Boolean);
          return lines.join('\n');
        }

        function generateRamadan(spotUsdPerOz, generatedAt) {
          var k22 = calcKarat(spotUsdPerOz, 22 / 24);
          var k21 = calcKarat(spotUsdPerOz, 21 / 24);
          var lines = [
            '🌙 Ramadan Kareem Gold Market Brief',
            '',
            'Spot: $' + fmt(spotUsdPerOz) + '/oz',
            '',
            'Gold rates this Ramadan:',
            '22K AED ' + fmt(k22.aedPerGram) + '/g  (popular for jewelry)',
            '21K AED ' + fmt(k21.aedPerGram) + '/g',
            '',
            'Planning a gold purchase this season?',
            '→ ' + SITE_URL,
            '#Ramadan #GoldPrice #UAE #GoldJewelry',
          ];
          return lines.join('\n');
        }

        function xCharCount(text) {
          var urlPattern = /https?:\/\/\S+/g;
          var normalized = text.replace(urlPattern, '_'.repeat(X_URL_LENGTH));
          return [...normalized].length;
        }

        // ─── State ───────────────────────────────────────────────────────────────────

        var currentPost = '';
        var fetchedAt = null;

        // ─── History helpers ─────────────────────────────────────────────────────────

        var HISTORY_KEY = 'social_post_history';

        function loadHistory() {
          try {
            return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
          } catch (e) {
            return [];
          }
        }

        function saveToHistory(text, templateId) {
          var history = loadHistory();
          history.unshift({
            text: text,
            template: templateId,
            generatedAt: new Date().toISOString(),
          });
          if (history.length > 50) history = history.slice(0, 50);
          localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
          renderHistory();
        }

        function clearHistory() {
          localStorage.removeItem(HISTORY_KEY);
          renderHistory();
        }

        function renderHistory() {
          var history = loadHistory();
          var list = document.getElementById('history-list');
          if (!history.length) {
            list.innerHTML =
              '<p style="color:#94a3b8;font-size:0.85rem;">No posts generated yet.</p>';
            return;
          }
          list.innerHTML = history
            .map(function (item, i) {
              var date = new Date(item.generatedAt).toLocaleString('en-US', {
                month: 'short',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit',
              });
              var preview = item.text.replace(/</g, '&lt;').replace(/>/g, '&gt;');
              return (
                '<div class="history-item" onclick="loadHistoryItem(' +
                i +
                ')">' +
                '<div class="history-meta">' +
                date +
                ' · ' +
                (item.template || '—') +
                '</div>' +
                '<div class="history-text">' +
                preview +
                '</div>' +
                '</div>'
              );
            })
            .join('');
        }

        function loadHistoryItem(i) {
          var history = loadHistory();
          var item = history[i];
          if (!item) return;
          currentPost = item.text;
          document.getElementById('preview-box').textContent = item.text;
          updateCounter(item.text);
          document.getElementById('freshness-label').textContent =
            'Loaded from history — ' + item.generatedAt;
        }

        // ─── Counter ─────────────────────────────────────────────────────────────────

        function updateCounter(text) {
          var count = xCharCount(text);
          var el = document.getElementById('char-counter');
          var cls = count <= 240 ? 'char-ok' : count <= 280 ? 'char-warn' : 'char-over';
          el.className = 'char-counter ' + cls;
          el.textContent = count + ' / 280 chars (X-adjusted)';
        }

        // ─── Generate ────────────────────────────────────────────────────────────────

        function generatePost() {
          var btn = document.getElementById('generate-btn');
          var errorEl = document.getElementById('error-msg');
          var templateId = document.getElementById('template-select').value;

          errorEl.textContent = '';
          btn.innerHTML = '<span class="spinner"></span> Fetching…';
          btn.disabled = true;

          fetch('/data/gold_price.json', { cache: 'no-store' })
            .then(function (res) {
              if (!res.ok) throw new Error('API ' + res.status);
              return res.json();
            })
            .then(function (data) {
              var spot = data && data.gold ? data.gold.ounce_usd : null;
              var dayOpen = data && data.gold ? data.gold.day_low_usd : null;
              var now = new Date().toISOString();
              fetchedAt = now;

              var text;
              if (templateId === 'daily') text = generateDaily(spot, dayOpen, now);
              else if (templateId === 'alert') text = generateAlert(spot, dayOpen, now);
              else if (templateId === 'weekly') text = generateWeekly(spot, now);
              else if (templateId === 'ath') text = generateATH(spot, now);
              else if (templateId === 'friday') text = generateFriday(spot, dayOpen, now);
              else if (templateId === 'ramadan') text = generateRamadan(spot, now);
              else text = generateWeekly(spot, now);

              currentPost = text;
              document.getElementById('preview-box').textContent = text;
              updateCounter(text);
              document.getElementById('freshness-label').textContent =
                'Prices fetched: ' +
                new Date(now).toLocaleString('en-US', { dateStyle: 'medium', timeStyle: 'short' });

              saveToHistory(text, templateId);
            })
            .catch(function (err) {
              errorEl.textContent = '⚠️ Could not fetch prices: ' + err.message;
            })
            .finally(function () {
              btn.innerHTML = '✨ Generate Post';
              btn.disabled = false;
            });
        }

        // ─── Actions ─────────────────────────────────────────────────────────────────

        function copyPost() {
          if (!currentPost) return;
          navigator.clipboard
            .writeText(currentPost)
            .then(function () {
              var btn = document.querySelector('[onclick="copyPost()"]');
              var orig = btn.textContent;
              btn.textContent = '✅ Copied!';
              setTimeout(function () {
                btn.textContent = orig;
              }, 1800);
            })
            .catch(function () {
              alert('Copy failed — please select and copy the text manually.');
            });
        }

        function openOnX() {
          if (!currentPost) return;
          var url = 'https://twitter.com/intent/tweet?text=' + encodeURIComponent(currentPost);
          window.open(url, '_blank', 'noopener,noreferrer');
        }

        // ─── Init ────────────────────────────────────────────────────────────────────
        renderHistory();
      </script>
