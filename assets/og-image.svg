<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#1a1610"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#2a2218" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#2a2218" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#2a2218" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="#2a2218" stroke-width="1"/>

  <!-- Gold accent bar top -->
  <rect x="0" y="0" width="1200" height="6" fill="#c49a44"/>

  <!-- Gold accent bar bottom -->
  <rect x="0" y="624" width="1200" height="6" fill="#c49a44"/>

  <!-- Left accent line -->
  <rect x="80" y="140" width="3" height="350" fill="#c49a44" opacity="0.6"/>

  <!-- Unified coin + geometric-G brand mark -->
  <g transform="translate(555,168) scale(2.8)" fill="none" stroke="#d4b05a">
    <circle cx="16" cy="16" r="11" stroke-width="1.5"/>
    <circle cx="16" cy="16" r="8.7" fill="#d4b05a" opacity="0.10" stroke="none"/>
    <path d="M21.08 12.44 A6.2 6.2 0 1 0 21.08 19.56 L21.08 16.1 L16.7 16.1" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="9.5" y="25.4" width="13" height="1.25" rx="0.62" fill="#d4b05a" opacity="0.65" stroke="none"/>
  </g>

  <!-- Site name -->
  <text x="600" y="320" font-family="-apple-system, 'Source Sans 3', Arial, sans-serif" font-size="58" font-weight="700" fill="#d4b05a" text-anchor="middle" letter-spacing="-1">Gold Ticker Live</text>

  <!-- Tagline -->
  <text x="600" y="372" font-family="-apple-system, Arial, sans-serif" font-size="22" fill="#9d8c72" text-anchor="middle" letter-spacing="2">REFERENCE PRICES · GCC &amp; ARAB MARKETS</text>

  <!-- Divider -->
  <rect x="480" y="398" width="240" height="1" fill="#3a3020"/>

  <!-- Sub-label -->
  <text x="600" y="432" font-family="-apple-system, Arial, sans-serif" font-size="18" fill="#6b5f4a" text-anchor="middle">goldtickerlive.com</text>

  <!-- Corner decoration - top right -->
  <text x="1100" y="60" font-family="-apple-system, 'Source Sans 3', Arial, sans-serif" font-size="48" fill="#c49a44" opacity="0.15" text-anchor="middle">Au</text>

  <!-- NOTE: The production social card is the photoreal raster at assets/og-image.png -->
  <!-- (1200x630), referenced by all page <meta og:image>. This SVG is a lightweight -->
  <!-- vector fallback/sketch only and is not referenced by any page. -->
</svg>
