<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <!-- gtl-theme-preinit: set theme before first paint to avoid a flash (mirrors src/components/nav.js) -->
    <script>
      (function () {
        try {
          var p = JSON.parse(localStorage.getItem('user_prefs') || '{}');
          var mode = p.theme === 'light' || p.theme === 'dark' || p.theme === 'auto' ? p.theme : 'auto';
          var resolved =
            mode === 'light' || mode === 'dark'
              ? mode
              : window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light';
          var el = document.documentElement;
          el.setAttribute('data-theme', resolved);
          el.setAttribute('data-theme-mode', mode);
        } catch (e) {}
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex,follow" />
    <meta http-equiv="refresh" content="0;url=/learn.html#insights" />
    <title>Market Insights (Moved) | Gold Ticker Live</title>
    <meta name="description" content="Market insights now live inside the Learn knowledge hub." />
    <link rel="canonical" href="https://goldtickerlive.com/learn.html#insights" />
    <meta property="og:url" content="https://goldtickerlive.com/learn.html#insights" />
    <meta property="og:title" content="Market Insights (Moved) | Gold Ticker Live" />
    <meta property="og:description" content="Market insights now live inside the Learn knowledge hub." />
  </head>

        <a href="/learn.html#insights">the Learn hub insights feed</a>.</p>
    </main>
  </body>
</html>
