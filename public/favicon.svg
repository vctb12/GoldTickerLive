<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" role="img" aria-label="Gold Ticker Live">
  <defs>
    <linearGradient id="gtl-gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0ca5c"/>
      <stop offset="45%" stop-color="#d8aa3e"/>
      <stop offset="100%" stop-color="#b07d1f"/>
    </linearGradient>
    <linearGradient id="gtl-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c140f"/>
      <stop offset="100%" stop-color="#0d0906"/>
    </linearGradient>
    <style>
      /* SVG favicon adapts to the browser-chrome theme */
      .tile-edge { stroke: #caa24a; stroke-opacity: 0.28; }
      @media (prefers-color-scheme: dark) {
        .tile-edge { stroke-opacity: 0.45; }
      }
    </style>
  </defs>
  <!-- App tile so the mark holds contrast on any browser chrome -->
  <rect class="tile-edge" x="0.6" y="0.6" width="30.8" height="30.8" rx="7.4" fill="url(#gtl-bg)" stroke-width="0.8"/>
  <!-- Ticker uptrend line — routed clear of the diamond emblem -->
  <path d="M2.2 28.6 L6.4 23 L9 25 L14 19 L18 22 L23 20 L24.5 15 L27 7"
        fill="none" stroke="url(#gtl-gold)" stroke-width="1.35"
        stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M23.3 6.6 L27.4 6.8 L27.7 11" fill="none" stroke="url(#gtl-gold)"
        stroke-width="1.35" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Diamond emblem (double outline, hollow) -->
  <path d="M16 8 L22 14 L16 20 L10 14 Z" fill="none" stroke="url(#gtl-gold)" stroke-width="1.15"/>
  <path d="M16 10.8 L19.2 14 L16 17.2 L12.8 14 Z" fill="none" stroke="url(#gtl-gold)" stroke-width="0.95"/>
  <!-- Gold bar row -->
  <path d="M3 25 L11 25 L11.6 29 L2.4 29 Z" fill="url(#gtl-gold)"/>
  <path d="M12 25 L20 25 L20.6 29 L11.4 29 Z" fill="url(#gtl-gold)"/>
  <path d="M21 25 L29 25 L29.6 29 L20.4 29 Z" fill="url(#gtl-gold)"/>
  <path d="M11.6 29 L12 25" stroke="#7e5912" stroke-width="0.35" opacity="0.6"/>
  <path d="M20.6 29 L21 25" stroke="#7e5912" stroke-width="0.35" opacity="0.6"/>
</svg>
