<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="coin-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8bf5a"/>
      <stop offset="40%" stop-color="#d4a840"/>
      <stop offset="100%" stop-color="#b8892c"/>
    </linearGradient>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1118"/>
      <stop offset="100%" stop-color="#08090e"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="8" fill="url(#bg-grad)"/>
  <!-- Gold coin circle -->
  <circle cx="16" cy="16" r="11" fill="none" stroke="url(#coin-grad)" stroke-width="1.5"/>
  <circle cx="16" cy="16" r="8.5" fill="url(#coin-grad)" opacity="0.12"/>
  <!-- GT mark -->
  <text x="16" y="20.5" font-size="11" text-anchor="middle" fill="url(#coin-grad)" font-family="Georgia,serif" font-weight="700" letter-spacing="-0.5">G</text>
  <!-- Ticker bar accent -->
  <rect x="8" y="25.5" width="16" height="1" rx="0.5" fill="url(#coin-grad)" opacity="0.6"/>
</svg>
