<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" role="img" aria-label="Gold Ticker Live">
  <defs>
    <linearGradient id="gtl-coin" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0ca5c"/>
      <stop offset="45%" stop-color="#d8aa3e"/>
      <stop offset="100%" stop-color="#b07d1f"/>
    </linearGradient>
    <linearGradient id="gtl-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10141d"/>
      <stop offset="100%" stop-color="#080a0e"/>
    </linearGradient>
    <style>
      /* SVG favicon adapts to the browser-chrome theme */
      .tile-edge { stroke: #caa24a; stroke-opacity: 0.28; }
      @media (prefers-color-scheme: dark) {
        .tile-edge { stroke-opacity: 0.45; }
      }
    </style>
  </defs>
  <!-- App tile so the mark holds contrast on any browser chrome -->
  <rect class="tile-edge" x="0.6" y="0.6" width="30.8" height="30.8" rx="7.4" fill="url(#gtl-bg)" stroke-width="0.8"/>
  <!-- Struck gold coin -->
  <circle cx="16" cy="16" r="11" fill="none" stroke="url(#gtl-coin)" stroke-width="1.5"/>
  <circle cx="16" cy="16" r="8.7" fill="url(#gtl-coin)" opacity="0.10"/>
  <!-- Geometric "G" (path, no font dependency) -->
  <path d="M21.08 12.44 A6.2 6.2 0 1 0 21.08 19.56 L21.08 16.1 L16.7 16.1"
        fill="none" stroke="url(#gtl-coin)" stroke-width="2.4"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Ticker accent -->
  <rect x="9.5" y="25.4" width="13" height="1.25" rx="0.62" fill="url(#gtl-coin)" opacity="0.65"/>
</svg>
