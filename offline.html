<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8578581906562588"
         crossorigin="anonymous"></script>
    <meta charset="UTF-8" />
    <script src="assets/analytics.js" defer></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline Gold Prices — Gold Ticker Live</title>
    <meta name="robots" content="noindex" />
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles/global.css" />
    <style>
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        background: #f8fafc;
      }
      .offline-card {
        text-align: center;
        max-width: 480px;
        margin: 2rem;
        padding: 2.5rem 2rem;
        background: white;
        border-radius: 16px;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      }
      .offline-icon {
        font-size: 3.5rem;
        margin-bottom: 1rem;
      }
      h1 {
        font-size: 1.5rem;
        font-weight: 800;
        color: #1e293b;
        margin: 0 0 0.75rem;
      }
      p {
        color: #64748b;
        font-size: 0.95rem;
        line-height: 1.6;
        margin: 0 0 1.5rem;
      }
      .cached-price-section {
        background: #fef3c7;
        border-radius: 10px;
        padding: 1.25rem;
        margin: 1.25rem 0;
        text-align: left;
      }
      .cached-label {
        font-size: 0.75rem;
        font-weight: 700;
        color: #92400e;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 0.5rem;
      }
      .cached-rows {
        display: flex;
        flex-direction: column;
        gap: 0.35rem;
      }
      .cached-row {
        display: flex;
        justify-content: space-between;
        font-size: 0.85rem;
        color: #1e293b;
      }
      .cached-row strong {
        font-weight: 700;
      }
      .cached-timestamp {
        font-size: 0.72rem;
        color: #78716c;
        margin-top: 0.5rem;
      }
      .btn-retry {
        display: inline-block;
        padding: 0.65rem 1.5rem;
        background: #d4a017;
        color: white;
        border-radius: 8px;
        font-weight: 700;
        font-size: 0.9rem;
        text-decoration: none;
        cursor: pointer;
        border: none;
        transition: opacity 0.15s;
      }
      .btn-retry:hover {
        opacity: 0.88;
      }
      .no-cache-msg {
        color: #94a3b8;
        font-size: 0.82rem;
        margin-top: 1rem;
      }
    </style>
  </head>
  <body>
    <div class="offline-card">
      <div class="offline-icon">📡</div>
      <h1 id="offline-title">You're offline — cached gold prices</h1>
      <p id="offline-body">
        No internet connection detected. If cached values are available, they are shown below as
        last-known reference prices, not live retail quotes.
      </p>

      <div id="cached-section" class="cached-price-section" style="display: none">
        <div class="cached-label" id="cached-label">Last known reference prices (cached)</div>
        <div class="cached-rows" id="cached-rows"></div>
        <div class="cached-timestamp" id="cached-ts"></div>
      </div>

      <p class="no-cache-msg" id="no-cache-msg" style="display: none">
        No cached prices are available yet. Visit Gold Ticker Live while online first.
      </p>

      <button class="btn-retry" onclick="window.location.reload()">🔄 Try Again</button>
    </div>

    <script>
      // Try to load last-known prices from localStorage
      (function () {
        const TROY = 31.1035;
        const AED_PEG = 3.6725;
        const KARATS = [
          { code: '24', purity: 1 },
          { code: '22', purity: 22 / 24 },
          { code: '21', purity: 21 / 24 },
          { code: '18', purity: 18 / 24 },
        ];

        let spotPrice = null,
          updatedAt = null;
        try {
          const raw = localStorage.getItem('gp_gold_price');
          if (raw) {
            const d = JSON.parse(raw);
            spotPrice = d.price || d.data?.price;
            updatedAt = d.updatedAt || d.data?.updatedAt;
          }
        } catch (e) {}

        if (spotPrice && spotPrice > 0) {
          const rows = document.getElementById('cached-rows');
          const ts = document.getElementById('cached-ts');
          const sec = document.getElementById('cached-section');

          rows.innerHTML = KARATS.map((k) => {
            const pricePerGram = (spotPrice / TROY) * k.purity * AED_PEG;
            return `<div class="cached-row">
            <span>${k.code}K Gold</span>
            <strong>AED ${pricePerGram.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}/g</strong>
          </div>`;
          }).join('');

          if (updatedAt) {
            const d = new Date(updatedAt);
            ts.textContent =
              'As of ' + d.toLocaleString('en-US', { dateStyle: 'medium', timeStyle: 'short' });
          }
          sec.style.display = '';
        } else {
          document.getElementById('no-cache-msg').style.display = '';
        }
      })();
    </script>
  </body>
</html>
