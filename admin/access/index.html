<!doctype html>
<html lang="en">
  <head>
    <!-- Google tag (gtag.js) -->

    <script>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Admin Access — Gold Prices</title>
    <link rel="stylesheet" href="../../styles/admin.css" />
    <style>
      body {
        align-items: center;
        background-color: var(--bg);
        background-image:
          radial-gradient(ellipse at 30% 20%, rgba(245,158,11,0.06) 0%, transparent 55%),
          radial-gradient(ellipse at 70% 80%, rgba(99,102,241,0.05) 0%, transparent 55%);
        display: flex;
        justify-content: center;
        min-height: 100vh;
        padding: 16px;
      }

      .access-wrap {
        animation: rise 0.45s cubic-bezier(0.22,1,0.36,1) both;
        width: 100%;
        max-width: 400px;
      }

      @keyframes rise {
        from { opacity: 0; transform: translateY(20px) scale(0.97); }
        to   { opacity: 1; transform: translateY(0) scale(1); }
      }

      .access-brand {
        align-items: center;
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-bottom: 32px;
        text-align: center;
      }

      .brand-icon {
        align-items: center;
        background: linear-gradient(135deg, #f59e0b 0%, #d97706 60%, #b45309 100%);
        border-radius: 20px;
        box-shadow: 0 4px 28px rgba(245,158,11,0.45), 0 1px 3px rgba(0,0,0,0.35);
        color: #0f172a;
        display: flex;
        font-size: 28px;
        height: 64px;
        justify-content: center;
        width: 64px;
      }

      .brand-name {
        background: linear-gradient(135deg, #fff 0%, #f59e0b 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        font-size: 1.375rem;
        font-weight: 800;
        letter-spacing: 0.04em;
      }

      .access-card {
        background: linear-gradient(135deg, rgba(13,21,38,0.95), rgba(9,15,26,0.98));
        border: 1px solid var(--border-light);
        border-radius: 20px;
        box-shadow: 0 24px 80px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.05);
        padding: 40px;
        position: relative;
        overflow: hidden;
      }

      .access-card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 2px;
        background: linear-gradient(90deg, transparent, var(--gold), transparent);
        opacity: 0.6;
      }

      .access-card h1 {
        color: var(--text);
        font-size: 1.25rem;
        font-weight: 800;
        letter-spacing: -0.02em;
        margin-bottom: 6px;
      }

      .access-sub {
        color: var(--text-muted);
        font-size: 0.875rem;
        margin-bottom: 28px;
        line-height: 1.5;
      }

      /* PIN input row */
      .pin-input-group {
        display: flex;
        gap: 10px;
        justify-content: center;
        margin: 24px 0 8px;
      }

      .pin-digit {
        width: 52px;
        height: 60px;
        text-align: center;
        font-size: 1.75rem;
        font-weight: 700;
        background: var(--surface-2);
        border: 2px solid var(--border);
        border-radius: var(--radius);
        color: var(--text);
        caret-color: var(--gold);
        transition: border-color 0.2s, box-shadow 0.2s, transform 0.1s;
        -webkit-text-security: disc;
        text-security: disc;
      }

      .pin-digit:focus {
        border-color: var(--gold);
        box-shadow: 0 0 0 3px var(--gold-glow);
        outline: none;
        transform: scale(1.04);
      }

      .pin-digit.filled {
        border-color: var(--border-light);
        color: var(--gold);
      }

      .pin-hint {
        color: var(--text-dim);
        font-size: 0.78rem;
        text-align: center;
        margin-bottom: 20px;
      }

      .btn-access {
        align-items: center;
        background: linear-gradient(135deg, var(--gold) 0%, var(--gold-hover) 100%);
        border: none;
        border-radius: var(--radius);
        box-shadow: 0 2px 16px var(--gold-glow);
        color: #0f172a;
        cursor: pointer;
        display: flex;
        font-size: 1rem;
        font-weight: 700;
        gap: 8px;
        justify-content: center;
        padding: 14px 24px;
        transition: box-shadow 0.2s, transform 0.1s, opacity 0.2s;
        width: 100%;
      }

      .btn-access:hover {
        box-shadow: 0 4px 24px var(--gold-glow);
        transform: translateY(-1px);
      }

      .btn-access:active { transform: translateY(0); }

      .btn-access:disabled {
        cursor: not-allowed;
        opacity: 0.5;
        transform: none;
      }

      .access-error {
        background: rgba(239,68,68,0.1);
        border: 1px solid rgba(239,68,68,0.35);
        border-radius: var(--radius-sm);
        color: var(--danger);
        font-size: 0.8125rem;
        padding: 10px 14px;
        margin-bottom: 16px;
        display: none;
        animation: alert-slide 0.2s ease both;
      }

      .access-error.visible { display: block; }

      @keyframes alert-slide {
        from { opacity: 0; transform: translateY(-4px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      @keyframes shake {
        0%,100% { transform: translateX(0); }
        15%     { transform: translateX(-7px); }
        30%     { transform: translateX(7px); }
        45%     { transform: translateX(-5px); }
        60%     { transform: translateX(5px); }
        75%     { transform: translateX(-3px); }
        90%     { transform: translateX(3px); }
      }

      .access-card.shake { animation: shake 0.45s ease both; }

      .access-divider {
        border: none;
        border-top: 1px solid var(--border);
        margin: 24px 0;
      }

      .access-alt-link {
        color: var(--text-muted);
        font-size: 0.8125rem;
        text-align: center;
        display: block;
      }

      .access-alt-link a {
        color: var(--gold);
        text-decoration: none;
        font-weight: 600;
      }

      .access-alt-link a:hover { text-decoration: underline; }

      .access-attempts {
        color: var(--text-dim);
        font-size: 0.75rem;
        text-align: center;
        margin-top: 8px;
      }
    </style>
  </head>
  <body>
    <!-- Flash prevention: redirect if already authenticated -->
    <script>
      (function () {
        try {
          var keys = Object.keys(localStorage);
          var hasSession = keys.some(function (k) {
            return k.startsWith('sb-') && k.endsWith('-auth-token');
          });
          if (hasSession && !window.location.hash) {
            window.location.replace('../');
          }
        } catch (e) {}
      })();
    </script>

    <div class="access-wrap">
      <div class="access-brand">
        <div class="brand-icon" aria-hidden="true">🔐</div>
        <span class="brand-name">GoldAdmin</span>
      </div>

      <div class="access-card" id="access-card">
        <h1>Quick Access</h1>
        <p class="access-sub">Enter the 6-digit admin PIN to proceed to the login page.</p>

        <div class="access-error" id="access-error" role="alert"></div>

        <div class="pin-input-group" id="pin-group" role="group" aria-label="PIN entry">
          <input class="pin-digit" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off" aria-label="PIN digit 1" data-index="0" />
          <input class="pin-digit" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off" aria-label="PIN digit 2" data-index="1" />
          <input class="pin-digit" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off" aria-label="PIN digit 3" data-index="2" />
          <input class="pin-digit" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off" aria-label="PIN digit 4" data-index="3" />
          <input class="pin-digit" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off" aria-label="PIN digit 5" data-index="4" />
          <input class="pin-digit" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off" aria-label="PIN digit 6" data-index="5" />
        </div>
        <p class="pin-hint">Enter 6 digits to proceed</p>

        <button class="btn-access" id="verify-btn" type="button" disabled>
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>
          Verify PIN
        </button>
        <p class="access-attempts" id="attempts-text"></p>

        <hr class="access-divider" />
        <span class="access-alt-link">Prefer OAuth? <a href="../login/">Sign in with GitHub →</a></span>
      </div>
    </div>

    <script type="module">
      import { ADMIN_ACCESS_PIN } from '../supabase-config.js';

      const digits = Array.from(document.querySelectorAll('.pin-digit'));
      const verifyBtn = document.getElementById('verify-btn');
      const errorEl = document.getElementById('access-error');
      const cardEl = document.getElementById('access-card');
      const attemptsEl = document.getElementById('attempts-text');

      const MAX_ATTEMPTS = 5;
      let attempts = parseInt(sessionStorage.getItem('gp_access_attempts') || '0', 10);

      function updateAttemptsUI() {
        if (attempts > 0) {
          const remaining = MAX_ATTEMPTS - attempts;
          attemptsEl.textContent = remaining > 0
            ? `${remaining} attempt${remaining !== 1 ? 's' : ''} remaining`
            : 'No more attempts. Please use GitHub login.';
        }
      }

      updateAttemptsUI();

      if (attempts >= MAX_ATTEMPTS) {
        digits.forEach(d => { d.disabled = true; });
        verifyBtn.disabled = true;
        showError('Too many attempts. Use GitHub login below.');
      }

      function getPin() {
        return digits.map(d => d.value).join('');
      }

      function triggerShake() {
        cardEl.classList.remove('shake');
        void cardEl.offsetWidth;
        cardEl.classList.add('shake');
        cardEl.addEventListener('animationend', () => cardEl.classList.remove('shake'), { once: true });
      }

      function showError(msg) {
        errorEl.textContent = msg;
        errorEl.classList.add('visible');
        triggerShake();
      }

      function clearError() {
        errorEl.classList.remove('visible');
      }

      digits.forEach((input, i) => {
        input.addEventListener('input', () => {
          const val = input.value.replace(/\D/g, '');
          input.value = val.slice(-1);
          if (val) {
            input.classList.add('filled');
            if (i < digits.length - 1) digits[i + 1].focus();
          } else {
            input.classList.remove('filled');
          }
          verifyBtn.disabled = getPin().length < 6;
          clearError();

          // Auto-submit when all 6 filled
          if (getPin().length === 6) {
            setTimeout(() => verifyBtn.click(), 80);
          }
        });

        input.addEventListener('keydown', (e) => {
          if (e.key === 'Backspace' && !input.value && i > 0) {
            digits[i - 1].focus();
            digits[i - 1].value = '';
            digits[i - 1].classList.remove('filled');
          }
        });

        input.addEventListener('paste', (e) => {
          e.preventDefault();
          const pasted = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '').slice(0, 6);
          pasted.split('').forEach((ch, j) => {
            if (digits[j]) {
              digits[j].value = ch;
              digits[j].classList.add('filled');
            }
          });
          verifyBtn.disabled = getPin().length < 6;
          if (pasted.length >= 6) setTimeout(() => verifyBtn.click(), 80);
        });
      });

      verifyBtn.addEventListener('click', () => {
        const pin = getPin();
        const correctPin = (typeof ADMIN_ACCESS_PIN !== 'undefined' && ADMIN_ACCESS_PIN) ? String(ADMIN_ACCESS_PIN) : null;

        if (!correctPin) {
          // If PIN not configured, just redirect to login
          window.location.replace('../login/');
          return;
        }

        if (pin === correctPin) {
          sessionStorage.removeItem('gp_access_attempts');
          verifyBtn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Access granted!';
          verifyBtn.style.background = 'linear-gradient(135deg,#10b981,#059669)';
          setTimeout(() => window.location.replace('../login/'), 700);
        } else {
          attempts++;
          sessionStorage.setItem('gp_access_attempts', String(attempts));
          updateAttemptsUI();

          if (attempts >= MAX_ATTEMPTS) {
            digits.forEach(d => { d.disabled = true; });
            verifyBtn.disabled = true;
            showError('Too many incorrect attempts. Please use GitHub login below.');
          } else {
            showError('Incorrect PIN. Please try again.');
            digits.forEach(d => { d.value = ''; d.classList.remove('filled'); });
            verifyBtn.disabled = true;
            digits[0].focus();
          }
        }
      });

      // Auto-focus first digit
      digits[0].focus();
    </script>
  </body>
</html>
