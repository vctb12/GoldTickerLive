    <!-- Auth guard -->
    <script>
      (function () {
        try {
          if (window.location.hash && window.location.hash.includes('access_token')) return;
          var k = Object.keys(localStorage);
          if (
            !k.some(function (x) {
              return x.startsWith('sb-') && x.endsWith('-auth-token');
            })
          )
            window.location.replace('../login/');
        } catch (e) {
          // On storage error, let the async guard handle it
        }
      })();
    </script>

    <script type="module">
      import { logout, requireAuth, getSupabase, getSession, logActivity } from '../supabase-auth.js';
      import { initAdminShell, renderBreadcrumb } from '../shared/admin-shell.js';
      import { showToast, renderPagination, downloadCSV, confirmDialog, initCommandPalette, skeletonRows } from '../shared/admin-utils.js';
      import { ICONS } from '../shared/icons.js';

      // ── Auth guard ──────────────────────────────────────────
      if (!(await requireAuth())) throw new Error('redirect');
      await initAdminShell({ logout, getSession });
      renderBreadcrumb([{ label: 'Orders' }]);
      initCommandPalette([
        { label: 'Dashboard', href: '../', icon: ICONS.dashboard },
        { label: 'Orders', href: './', icon: ICONS.orders },
        { label: 'Pricing', href: '../pricing/', icon: ICONS.pricing },
        { label: 'Content', href: '../content/', icon: ICONS.content },
        { label: 'Social', href: '../social/', icon: ICONS.social },
        { label: 'Analytics', href: '../analytics/', icon: ICONS.analytics },
        { label: 'Settings', href: '../settings/', icon: ICONS.settings },
      ]);

      // ── Supabase Data Layer (with localStorage cache fallback) ──
      const STORAGE_KEY = 'gp_orders';

      /** Map admin UI order → Supabase row. */
      function toDbRow(order) {
        return {
          id: order.id,
          items: order.items || [],
          pricing: order.pricing || {},
          gold_spot_at_order: order.goldSpotAtOrder ?? null,
          fx_rate_at_order: order.fxRateAtOrder ?? null,
          customer: order.customer || {},
          status: order.status || 'pending',
          status_history: order.statusHistory || [],
          created_at: order.createdAt || new Date().toISOString(),
          updated_at: order.updatedAt || new Date().toISOString(),
        };
      }

      /** Map Supabase row → admin UI shape. */
      function fromDbRow(row) {
        return {
          id: row.id,
          items: row.items || [],
          pricing: row.pricing || {},
          goldSpotAtOrder: row.gold_spot_at_order,
          fxRateAtOrder: row.fx_rate_at_order,
          customer: row.customer || {},
          status: row.status || 'pending',
          statusHistory: row.status_history || [],
          createdAt: row.created_at,
          updatedAt: row.updated_at,
        };
      }

      /** Cache orders to localStorage for offline resilience. */
      function cacheOrders(orders) {
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(orders)); } catch {}
      }

      /** Read cached orders from localStorage. */
      function readCachedOrders() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return [];
          const parsed = JSON.parse(raw);
          return Array.isArray(parsed) ? parsed : [];
        } catch { return []; }
      }

      /**
       * Load all orders. Tries Supabase first; falls back to localStorage cache.
       */
      async function loadOrders() {
        const sb = getSupabase();
        if (sb) {
          try {
            const { data, error } = await sb
              .from('orders')
              .select('*')
              .order('created_at', { ascending: false });
            if (!error && Array.isArray(data)) {
              const orders = data.map(fromDbRow);
              cacheOrders(orders);
              return orders;
            }
            console.warn('[orders] Supabase read error, falling back to cache:', error?.message);
          } catch (err) {
            console.warn('[orders] Supabase unreachable, falling back to cache:', err.message);
          }
        }
        return readCachedOrders();
      }

      /** Save/upsert a single order to Supabase and cache. */
      async function saveOrder(order) {
        const sb = getSupabase();
        if (sb) {
          const row = toDbRow(order);
          const { error } = await sb.from('orders').upsert(row);
          if (error) console.warn('[orders] Supabase upsert error:', error.message);
        }
        // Always update local cache
        const cached = readCachedOrders();
        const idx = cached.findIndex((o) => o.id === order.id);
        if (idx !== -1) cached[idx] = order;
        else cached.unshift(order);
        cacheOrders(cached);
      }

      /** Batch-save all orders (for sample data init). */
      async function saveOrders(orders) {
        const sb = getSupabase();
        if (sb) {
          try {
            const rows = orders.map(toDbRow);
            const { error } = await sb.from('orders').upsert(rows);
            if (error) console.warn('[orders] Supabase batch upsert error:', error.message);
          } catch (err) {
            console.warn('[orders] Supabase batch upsert failed:', err.message);
          }
        }
        cacheOrders(orders);
      }

      async function updateOrderStatus(id, newStatus, note) {
        const orders = await loadOrders();
        const idx = orders.findIndex((o) => o.id === id);
        if (idx === -1) return null;
        const now = new Date().toISOString();
        const entry = { status: newStatus, timestamp: now, note: note || '' };
        if (!Array.isArray(orders[idx].statusHistory)) orders[idx].statusHistory = [];
        orders[idx].statusHistory.push(entry);
        orders[idx].status = newStatus;
        orders[idx].updatedAt = now;
        await saveOrder(orders[idx]);
        logActivity('order_status', `Order ${id} → ${newStatus}${note ? ': ' + note : ''}`);
        return orders[idx];
      }

      // ── Sample data ────────────────────────────────────────
      function buildSampleOrders() {
        const now = new Date();
        const yesterday = new Date(now);
        yesterday.setDate(yesterday.getDate() - 1);
        const lastWeek = new Date(now);
        lastWeek.setDate(lastWeek.getDate() - 7);

        return [
          {
            id: 'ORD-20260412-001',
            items: [
              { weight: 10, weightUnit: 'gram', karat: '24K', quantity: 1, unitPriceAed: 3832.7 },
            ],
            pricing: {
              basePrice: 3832.7,
              margin: 114.98,
              marginPercent: 3,
              subtotal: 3947.68,
              vat: 197.38,
              vatRate: 5,
              total: 4145.06,
              currency: 'AED',
            },
            goldSpotAtOrder: 3255.75,
            fxRateAtOrder: 3.6725,
            customer: {

      // ── Helpers ────────────────────────────────────────────
      function formatDate(iso) {
        if (!iso) return '—';
        try {
          return new Date(iso).toLocaleDateString('en-GB', {
            day: '2-digit',
            month: 'short',
            year: 'numeric',
          });
        } catch {
          return iso;
        }
      }

      function formatDatetime(iso) {
        if (!iso) return '—';
        try {
          return new Date(iso).toLocaleString('en-GB', {
            day: '2-digit',
            month: 'short',
            year: 'numeric',
            hour: '2-digit',
            minute: '2-digit',
          });
        } catch {
          return iso;
        }
      }

      function formatAed(amount) {
        if (amount == null || isNaN(amount)) return '—';
        return (
          'AED ' +
          Number(amount).toLocaleString('en-US', {
            minimumFractionDigits: 2,
            maximumFractionDigits: 2,
          })
        );
      }

      function itemsSummary(items) {
        if (!Array.isArray(items) || items.length === 0) return '—';
        return items
          .map(
            (i) =>
              `${i.weight}${i.weightUnit === 'gram' ? 'g' : i.weightUnit} ${i.karat} × ${i.quantity}`
          )
          .join(', ');
      }

      function badgeHtml(status) {
        const labels = {
          pending: 'Pending',
          confirmed: 'Confirmed',
          processing: 'Processing',
          shipped: 'Shipped',
          delivered: 'Delivered',
          cancelled: 'Cancelled',
        };
        const s = String(status).toLowerCase();
        return `<span class="badge badge-${s}">${labels[s] || status}</span>`;
      }

      function isToday(iso) {
        if (!iso) return false;
        const d = new Date(iso);
        const n = new Date();
        return (
          d.getFullYear() === n.getFullYear() &&
          d.getMonth() === n.getMonth() &&
          d.getDate() === n.getDate()
        );
      }

      const REVENUE_STATUSES = new Set(['confirmed', 'processing', 'shipped', 'delivered']);

      // ── State ──────────────────────────────────────────────
      let allOrders = [];
      let filteredOrders = [];
      const selectedIds = new Set();
      const PER_PAGE = 20;
      let currentPage = 1;
      let colSort = { key: 'date', dir: 'desc' }; // column sort (independent of toolbar)

      // ── Stats ──────────────────────────────────────────────
      function renderStats() {
        const total = allOrders.length;
        const pending = allOrders.filter((o) => o.status === 'pending').length;
        const todayRev = allOrders
          .filter((o) => isToday(o.createdAt) && REVENUE_STATUSES.has(o.status))
          .reduce((s, o) => s + (o.pricing?.total || 0), 0);
        const totalRev = allOrders
          .filter((o) => REVENUE_STATUSES.has(o.status))
          .reduce((s, o) => s + (o.pricing?.total || 0), 0);
        const revOrders = allOrders.filter((o) => REVENUE_STATUSES.has(o.status));
        const avgRev = revOrders.length ? totalRev / revOrders.length : 0;

        document.getElementById('stat-total').textContent = total;
        document.getElementById('stat-pending').textContent = pending;
        document.getElementById('stat-today-rev').textContent = formatAed(todayRev);
        document.getElementById('stat-total-rev').textContent = formatAed(totalRev);
        document.getElementById('stat-avg').textContent = revOrders.length ? formatAed(avgRev) : '—';
      }

      // ── Filter & sort ──────────────────────────────────────
      function applyFilters() {
        const search = document.getElementById('search-input').value.trim().toLowerCase();
        const statusF = document.getElementById('filter-status').value;
        const dateFrom = document.getElementById('filter-date-from').value;
        const dateTo = document.getElementById('filter-date-to').value;
        const toolbarSort = document.getElementById('sort-select').value;

        filteredOrders = allOrders.filter((o) => {
          if (search) {
            const haystack = `${o.id} ${o.customer?.name || ''}`.toLowerCase();
            if (!haystack.includes(search)) return false;
          }
          if (statusF && o.status !== statusF) return false;
          if (dateFrom) {
            const d = new Date(o.createdAt);
            d.setHours(0, 0, 0, 0);
            if (d < new Date(dateFrom)) return false;
          }
          if (dateTo) {
            const d = new Date(o.createdAt);
            d.setHours(23, 59, 59, 999);
            if (d > new Date(dateTo)) return false;
          }
          return true;
        });

        // Apply column sort if active, otherwise fall back to toolbar sort
        filteredOrders.sort((a, b) => {
          const asc = colSort.dir === 'asc' ? 1 : -1;
          if (colSort.key === 'id') return asc * a.id.localeCompare(b.id);
          if (colSort.key === 'date') return asc * (new Date(a.createdAt) - new Date(b.createdAt));
          if (colSort.key === 'total') return asc * ((a.pricing?.total || 0) - (b.pricing?.total || 0));
          if (colSort.key === 'status') return asc * a.status.localeCompare(b.status);
          // fallback to toolbar sort
          if (toolbarSort === 'newest') return new Date(b.createdAt) - new Date(a.createdAt);
          if (toolbarSort === 'oldest') return new Date(a.createdAt) - new Date(b.createdAt);
          if (toolbarSort === 'amount-desc') return (b.pricing?.total || 0) - (a.pricing?.total || 0);
          if (toolbarSort === 'amount-asc') return (a.pricing?.total || 0) - (b.pricing?.total || 0);
          return 0;
        });

        currentPage = 1;
        updateSortHeaders();
        renderTable();
      }

      // ── Column sort headers ────────────────────────────────
      function updateSortHeaders() {
        document.querySelectorAll('th[data-sort]').forEach((th) => {
          th.classList.remove('sort-asc', 'sort-desc');
          if (th.dataset.sort === colSort.key) {
            th.classList.add(colSort.dir === 'asc' ? 'sort-asc' : 'sort-desc');
          }
        });
      }

      // ── Bulk select helpers ────────────────────────────────
      function updateBulkBar() {
        const bar = document.getElementById('bulk-bar');
        const count = document.getElementById('bulk-count');
        if (selectedIds.size > 0) {
          bar.classList.remove('hidden');
          count.textContent = `${selectedIds.size} order${selectedIds.size !== 1 ? 's' : ''} selected`;
        } else {
          bar.classList.add('hidden');
        }
        // Update select-all checkbox state
        const allChk = document.getElementById('select-all-chk');
        if (!allChk) return;
        const pageIds = getPageOrders().map((o) => o.id);
        allChk.indeterminate = false;
        if (pageIds.length === 0) {
          allChk.checked = false;
        } else if (pageIds.every((id) => selectedIds.has(id))) {
          allChk.checked = true;
        } else if (pageIds.some((id) => selectedIds.has(id))) {
          allChk.indeterminate = true;
          allChk.checked = false;
        } else {
          allChk.checked = false;
        }
      }

      function getPageOrders() {
        const start = (currentPage - 1) * PER_PAGE;
        return filteredOrders.slice(start, start + PER_PAGE);
      }

      // ── Table ──────────────────────────────────────────────
      function renderTable() {
        const tbody = document.getElementById('orders-tbody');
        document.getElementById('result-count').textContent =
          `${filteredOrders.length} order${filteredOrders.length !== 1 ? 's' : ''}`;

        if (filteredOrders.length === 0) {
          const noOrders = allOrders.length === 0;
          tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state">
          📦 ${noOrders ? 'No orders yet.' : 'No orders match your filters.'}
          <p>${noOrders ? 'Orders submitted on /order-gold will appear here.' : 'Try adjusting your search or filters.'}</p>
        </div></td></tr>`;
          renderPagination(document.getElementById('pagination-wrap'), { total: 0, page: 1, perPage: PER_PAGE, onChange: () => {} });
          updateBulkBar();
          return;
        }

        const pageOrders = getPageOrders();

        tbody.innerHTML = pageOrders
          .map((o) => {
            const hasPhone = o.customer?.phone;
            const waText = encodeURIComponent(
              `Order ${o.id}\n${itemsSummary(o.items)}\nTotal: AED ${(o.pricing?.total || 0).toFixed(2)}\nCustomer: ${o.customer?.name || '—'}`
            );
            const waHref = hasPhone
              ? `https://wa.me/${o.customer.phone.replace(/\D/g, '')}?text=${waText}`
              : '';
            const isSelected = selectedIds.has(o.id);

            return `<tr data-id="${escHtml(o.id)}" tabindex="0" role="row" aria-label="Order ${escHtml(o.id)}"${isSelected ? ' class="row-selected"' : ''}>
          <td class="chk-td"><input type="checkbox" class="row-chk" data-id="${escHtml(o.id)}" aria-label="Select order ${escHtml(o.id)}"${isSelected ? ' checked' : ''} /></td>
          <td class="order-id-cell"><strong>${escHtml(o.id)}</strong></td>
          <td>${formatDate(o.createdAt)}</td>
          <td><div class="customer-cell">
            <span class="customer-name">${escHtml(o.customer?.name || '—')}</span>
            <span class="customer-email">${escHtml(o.customer?.email || '')}</span>
          </div></td>
          <td class="items-summary">${escHtml(itemsSummary(o.items))}</td>
          <td class="total-cell">${formatAed(o.pricing?.total)}</td>
          <td>${badgeHtml(o.status)}</td>
          <td class="actions-td"><div class="row-actions" role="group" aria-label="Actions for ${escHtml(o.id)}">
            <button class="btn-icon view-btn" data-id="${escHtml(o.id)}" aria-label="View order ${escHtml(o.id)}" title="View details" type="button">${ICONS.eye}</button>
            ${hasPhone ? `<a class="btn-icon btn-icon-success" href="${escHtml(waHref)}" target="_blank" rel="noopener noreferrer" aria-label="WhatsApp ${escHtml(o.customer?.name || '')}" title="Contact via WhatsApp">${ICONS.externalLink}</a>` : ''}
          </div></td>
        </tr>`;
          })
          .join('');

        renderPagination(document.getElementById('pagination-wrap'), {
          total: filteredOrders.length,
          page: currentPage,
          perPage: PER_PAGE,
          onChange: (p) => { currentPage = p; renderTable(); },
        });
        updateBulkBar();
      }

      function escHtml(str) {
        return String(str)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }

      // ── Order detail drawer ────────────────────────────────
      function openOrderDrawer(orderId) {
        const o = allOrders.find((x) => x.id === orderId);
        if (!o) return;

        document.getElementById('order-drawer-title').textContent = `Order ${o.id}`;

        const hasPhone = o.customer?.phone;
        const waText = encodeURIComponent(
          `Order ${o.id}\n${itemsSummary(o.items)}\nTotal: AED ${(o.pricing?.total || 0).toFixed(2)}\nCustomer: ${o.customer?.name || '—'}`
        );
        const waHref = hasPhone
          ? `https://wa.me/${o.customer.phone.replace(/\D/g, '')}?text=${waText}`
          : '';

        const nextStatuses = getNextStatuses(o.status);

        // Status history
        const historyHtml =
          Array.isArray(o.statusHistory) && o.statusHistory.length
            ? `<div class="status-timeline">${o.statusHistory
                .slice()
                .reverse()
                .map(
                  (h, i) =>
                    `<div class="timeline-item">
              <div class="timeline-dot${i === 0 ? ' dot-active' : ''}"></div>
              <div class="timeline-content">
                <div class="timeline-status">${badgeHtml(h.status)}</div>
                <div class="timeline-meta">${formatDatetime(h.timestamp)}${h.note ? ' — ' + escHtml(h.note) : ''}</div>
              </div>
            </div>`
                )
                .join('')}</div>`
            : '<p style="color:var(--text-dim);font-size:0.8125rem;">No history.</p>';

        // Items table
        const itemsHtml =
          Array.isArray(o.items) && o.items.length
            ? `<table class="data-table" style="font-size:0.8125rem;">
            <thead><tr><th>Weight</th><th>Karat</th><th>Qty</th><th style="text-align:right">Unit Price</th><th style="text-align:right">Line Total</th></tr></thead>
            <tbody>${o.items
              .map(
                (it) =>
                  `<tr>
                <td>${it.weight} ${it.weightUnit || 'g'}</td>
                <td>${escHtml(it.karat)}</td>
                <td>${it.quantity}</td>
                <td style="text-align:right">${formatAed(it.unitPriceAed)}</td>
                <td style="text-align:right">${formatAed((it.unitPriceAed || 0) * (it.quantity || 1))}</td>
              </tr>`
              )
              .join('')}</tbody>
           </table>`
            : '<p style="color:var(--text-dim)">No items.</p>';

        const p = o.pricing || {};
        const pricingHtml = `<table class="pricing-table">
        <tr><td class="text-muted">Base Price</td><td>${formatAed(p.basePrice)}</td></tr>
        <tr><td class="text-muted">Margin (${p.marginPercent || 0}%)</td><td>+ ${formatAed(p.margin)}</td></tr>
        <tr><td class="text-muted">Subtotal</td><td>${formatAed(p.subtotal)}</td></tr>
        <tr><td class="text-muted">VAT (${p.vatRate || 0}%)</td><td>+ ${formatAed(p.vat)}</td></tr>
        <tr class="pricing-total"><td>Total</td><td>${formatAed(p.total)} ${escHtml(p.currency || 'AED')}</td></tr>
      </table>`;

        const statusChangeHtml = nextStatuses.length
          ? `<div class="status-change-box">
            <div class="status-change-row">
              <span style="font-size:0.8125rem;color:var(--text-muted);flex-shrink:0;">Change to:</span>
              <select class="form-select" id="drawer-status-select" aria-label="New status" style="flex:1;min-width:130px;">
                ${nextStatuses.map((s) => `<option value="${s}">${s.charAt(0).toUpperCase() + s.slice(1)}</option>`).join('')}
              </select>
            </div>
            <div style="display:flex;gap:8px;align-items:flex-start;flex-wrap:wrap;">
              <input class="form-input" id="drawer-status-note" type="text" placeholder="Add a note (optional)" style="flex:1;" aria-label="Status note" />
              <button class="btn btn-primary btn-sm" id="drawer-update-status-btn" data-id="${escHtml(o.id)}" type="button">Update Status</button>
            </div>
          </div>`
          : `<p style="color:var(--text-dim);font-size:0.8125rem;margin-top:4px;">No further status transitions available.</p>`;

        document.getElementById('order-drawer-body').innerHTML = `
        <div class="detail-section">
          <div class="detail-section-title">Order Overview</div>
          <div class="detail-grid">
            <div class="detail-item"><div class="detail-label">Order ID</div><div class="detail-value">${escHtml(o.id)}</div></div>
            <div class="detail-item"><div class="detail-label">Status</div><div class="detail-value">${badgeHtml(o.status)}</div></div>
            <div class="detail-item"><div class="detail-label">Created</div><div class="detail-value">${formatDatetime(o.createdAt)}</div></div>
            <div class="detail-item"><div class="detail-label">Last Updated</div><div class="detail-value">${formatDatetime(o.updatedAt)}</div></div>
            <div class="detail-item"><div class="detail-label">Gold Spot at Order</div><div class="detail-value">USD ${o.goldSpotAtOrder != null ? escHtml(Number(o.goldSpotAtOrder).toLocaleString('en-US', { minimumFractionDigits: 2 })) : '—'}/oz</div></div>
            <div class="detail-item"><div class="detail-label">FX Rate at Order</div><div class="detail-value">1 USD = ${escHtml(o.fxRateAtOrder != null ? String(o.fxRateAtOrder) : '—')} AED</div></div>
          </div>
        </div>

        <div class="detail-section">
          <div class="detail-section-title">Customer</div>
          <div class="detail-grid">
            <div class="detail-item"><div class="detail-label">Name</div><div class="detail-value">${escHtml(o.customer?.name || '—')}</div></div>
            <div class="detail-item"><div class="detail-label">Phone</div><div class="detail-value">${escHtml(o.customer?.phone || '—')}</div></div>
            <div class="detail-item"><div class="detail-label">Email</div><div class="detail-value">${escHtml(o.customer?.email || '—')}</div></div>
            <div class="detail-item"><div class="detail-label">Delivery</div><div class="detail-value">${escHtml(o.customer?.delivery || '—')}</div></div>
            ${o.customer?.notes ? `<div class="detail-item" style="grid-column:span 2"><div class="detail-label">Notes</div><div class="detail-value">${escHtml(o.customer.notes)}</div></div>` : ''}
          </div>
          ${hasPhone ? `<div style="margin-top:12px;"><a class="wa-btn" href="${waHref}" target="_blank" rel="noopener noreferrer">💬 WhatsApp ${escHtml(o.customer?.name || '')}</a></div>` : ''}
        </div>

        <div class="detail-section">
          <div class="detail-section-title">Items</div>
          ${itemsHtml}
        </div>

        <div class="detail-section">
          <div class="detail-section-title">Pricing Breakdown</div>
          ${pricingHtml}
        </div>

        <div class="detail-section">
          <div class="detail-section-title">Status History</div>
          ${historyHtml}
        </div>

        <div class="detail-section">
          <div class="detail-section-title">Change Status</div>
          ${statusChangeHtml}
        </div>
      `;

        document.getElementById('order-drawer-overlay').classList.remove('hidden');
        document.getElementById('order-drawer').classList.add('open');
        document.getElementById('order-drawer-close').focus();

        const updateBtn = document.getElementById('drawer-update-status-btn');
        if (updateBtn) {
          updateBtn.addEventListener('click', async () => {
            const newStatus = document.getElementById('drawer-status-select').value;
            const note = document.getElementById('drawer-status-note').value.trim();
            const updated = await updateOrderStatus(orderId, newStatus, note);
            if (updated) {
              allOrders = await loadOrders();
              renderStats();
              applyFilters();
              openOrderDrawer(orderId); // re-render drawer
              showToast(`Status updated to ${newStatus}.`, 'success');
            }
          });
        }
      }

      function getNextStatuses(current) {
        const flow = {
          pending: ['confirmed', 'cancelled'],
          confirmed: ['processing', 'cancelled'],
          processing: ['shipped', 'cancelled'],
          shipped: ['delivered', 'cancelled'],
          delivered: [],
          cancelled: [],
        };
        return flow[current] || [];
      }

      function closeOrderDrawer() {
        document.getElementById('order-drawer').classList.remove('open');
        document.getElementById('order-drawer-overlay').classList.add('hidden');
      }

      // ── CSV export ─────────────────────────────────────────
      function exportOrdersCsv(orders) {
        const cols = ['id', 'createdAt', 'customerName', 'customerPhone', 'customerEmail',
          'delivery', 'notes', 'items', 'basePrice', 'margin', 'subtotal', 'vat', 'total', 'currency', 'status'];
        const rows = orders.map((o) => {
          const p = o.pricing || {};
          const c = o.customer || {};
          return {
            id: o.id, createdAt: o.createdAt,
            customerName: c.name || '', customerPhone: c.phone || '', customerEmail: c.email || '',
            delivery: c.delivery || '', notes: c.notes || '', items: JSON.stringify(o.items || []),
            basePrice: p.basePrice || 0, margin: p.margin || 0, subtotal: p.subtotal || 0,
            vat: p.vat || 0, total: p.total || 0, currency: p.currency || 'AED', status: o.status,
          };
        });
        downloadCSV(`orders-${new Date().toISOString().slice(0, 10)}.csv`, rows, cols);
        showToast(`Exported ${orders.length} order${orders.length !== 1 ? 's' : ''}.`, 'success');
      }

      // ── Init ───────────────────────────────────────────────
      async function init() {
        allOrders = await loadOrders();

        if (allOrders.length === 0) {
          allOrders = buildSampleOrders();
          await saveOrders(allOrders);
          document.getElementById('sample-notice').classList.remove('hidden');
        }

        renderStats();
        applyFilters();

        // Toolbar events
        ['search-input', 'filter-status', 'filter-date-from', 'filter-date-to', 'sort-select'].forEach((id) => {
          document.getElementById(id).addEventListener('input', applyFilters);
          document.getElementById(id).addEventListener('change', applyFilters);
        });

        // Column sort headers
        document.querySelectorAll('th[data-sort]').forEach((th) => {
          th.addEventListener('click', () => {
            const key = th.dataset.sort;
            if (colSort.key === key) {
              colSort.dir = colSort.dir === 'asc' ? 'desc' : 'asc';
            } else {
              colSort = { key, dir: 'desc' };
            }
            applyFilters();
          });
        });

        // Table click delegation
        const tbody = document.getElementById('orders-tbody');
        tbody.addEventListener('click', (e) => {
          const viewBtn = e.target.closest('.view-btn');
          const chk = e.target.closest('.row-chk');
          const row = e.target.closest('tr[data-id]');

          if (viewBtn) {
            openOrderDrawer(viewBtn.dataset.id);
            return;
          }
          if (chk) {
            const id = chk.dataset.id;
            if (chk.checked) selectedIds.add(id);
            else selectedIds.delete(id);
            updateBulkBar();
            return;
          }
          if (row && !e.target.closest('.row-actions') && !e.target.closest('.chk-td')) {
            openOrderDrawer(row.dataset.id);
          }
        });

        tbody.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') {
            const row = e.target.closest('tr[data-id]');
            if (row) openOrderDrawer(row.dataset.id);
          }
        });

        // Select-all checkbox
        document.getElementById('select-all-chk').addEventListener('change', (e) => {
          getPageOrders().forEach((o) => {
            if (e.target.checked) selectedIds.add(o.id);
            else selectedIds.delete(o.id);
          });
          renderTable();
        });

        // Bulk action bar
        document.getElementById('bulk-export-btn').addEventListener('click', () => {
          const selected = allOrders.filter((o) => selectedIds.has(o.id));
          exportOrdersCsv(selected);
        });
        document.getElementById('bulk-deselect-btn').addEventListener('click', () => {
          selectedIds.clear();
          renderTable();
        });

        // Drawer close
        document.getElementById('order-drawer-close').addEventListener('click', closeOrderDrawer);
        document.getElementById('order-drawer-overlay').addEventListener('click', closeOrderDrawer);
        document.addEventListener('keydown', (e) => {
          if (e.key === 'Escape') closeOrderDrawer();
        });

        // Export CSV (toolbar)
        document.getElementById('export-csv-btn').addEventListener('click', () => {
          exportOrdersCsv(filteredOrders);
        });
      }

      init();
    </script>
  </body>
</html>
