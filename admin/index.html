<!doctype html>
<html lang="en">
  <head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-M14N2GP8ZQ"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-M14N2GP8ZQ');
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Dashboard — GoldAdmin</title>
    <link rel="stylesheet" href="../styles/admin.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
      /* ── Stat grid ─────────────────────────────────────────── */
      .stat-grid {
        display: grid;
        gap: 16px;
        grid-template-columns: repeat(4, 1fr);
        margin-bottom: 28px;
      }
      @media (max-width: 900px) {
        .stat-grid {
          grid-template-columns: repeat(2, 1fr);
        }
      }
      @media (max-width: 480px) {
        .stat-grid {
          grid-template-columns: 1fr;
        }
      }

      .stat-card .stat-icon {
        font-size: 1.5rem;
        line-height: 1;
        margin-bottom: 10px;
      }
      .stat-card .stat-sub {
        color: var(--text-dim);
        font-size: 0.75rem;
        margin-top: 4px;
      }

      /* ── Sections ───────────────────────────────────────────── */
      .section {
        margin-bottom: 28px;
      }

      /* ── API Status table ───────────────────────────────────── */
      .api-status-header {
        align-items: center;
        display: flex;
        gap: 12px;
        justify-content: space-between;
        margin-bottom: 16px;
        flex-wrap: wrap;
        gap: 8px;
      }
      .api-last-checked {
        color: var(--text-dim);
        font-size: 0.75rem;
      }

      /* ── Quick actions ──────────────────────────────────────── */
      .quick-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 28px;
      }

      /* ── Activity timeline ──────────────────────────────────── */
      .activity-list {
        display: flex;
        flex-direction: column;
        gap: 0;
      }
      .activity-item {
        align-items: flex-start;
        border-bottom: 1px solid var(--border);
        display: flex;
        gap: 12px;
        padding: 12px 0;
      }
      .activity-item:last-child {
        border-bottom: none;
      }
      .activity-icon {
        background: var(--surface-2);
        border-radius: 50%;
        flex-shrink: 0;
        font-size: 14px;
        height: 32px;
        line-height: 32px;
        text-align: center;
        width: 32px;
      }
      .activity-body {
        flex: 1;
        min-width: 0;
      }
      .activity-action {
        color: var(--text);
        font-size: 0.875rem;
        font-weight: 500;
      }
      .activity-details {
        color: var(--text-muted);
        font-size: 0.8125rem;
        margin-top: 1px;
      }
      .activity-time {
        color: var(--text-dim);
        font-size: 0.75rem;
        flex-shrink: 0;
        margin-top: 2px;
      }
      .activity-empty {
        color: var(--text-dim);
        font-size: 0.875rem;
        padding: 24px 0;
        text-align: center;
      }

      /* ── Gold ticker badge ──────────────────────────────────── */
      .ticker-badge {
        align-items: center;
        background: var(--surface-2);
        border: 1px solid var(--border);
        border-radius: 999px;
        display: flex;
        font-size: 0.8125rem;
        font-weight: 600;
        gap: 6px;
        padding: 4px 12px;
        white-space: nowrap;
      }
      .ticker-dot {
        border-radius: 50%;
        flex-shrink: 0;
        height: 7px;
        width: 7px;
      }
      .ticker-dot--green {
        background: var(--success);
      }
      .ticker-dot--yellow {
        background: var(--warning);
      }
      .ticker-loading {
        opacity: 0.5;
      }

      /* ── Spinner inline ─────────────────────────────────────── */
      .inline-spinner {
        animation: spin 0.75s linear infinite;
        border: 2px solid var(--border);
        border-radius: 50%;
        border-top-color: var(--primary);
        display: inline-block;
        height: 14px;
        vertical-align: middle;
        width: 14px;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <!-- Auth: hide page until session is verified (async requireAuth handles redirect) -->
    <script>
      (function () {
        try {
          // If the URL has an OAuth hash fragment (#access_token=...), let the
          // Supabase client parse it before deciding — do NOT redirect yet.
          if (window.location.hash && window.location.hash.includes('access_token')) return;

          var k = Object.keys(localStorage);
          var hasToken = k.some(function (x) {
            return x.startsWith('sb-') && x.endsWith('-auth-token');
          });
          if (!hasToken) {
            // No session token at all — safe to redirect immediately
            window.location.replace('./login/');
          }
        } catch (e) {
          // On storage error, let the async guard handle it
        }
      })();
    </script>

    <!-- Sidebar overlay (mobile) -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <div class="admin-layout">
      <!-- ── Sidebar (injected by admin-shell.js) ───────────────── -->
      <aside class="sidebar" id="sidebar" aria-label="Admin navigation"></aside>

      <!-- ── Main area ────────────────────────────────────────── -->
      <div class="main-area">
        <!-- Header -->
        <header class="page-header">
          <button
            class="sidebar-toggle"
            id="sidebar-toggle"
            aria-label="Toggle navigation"
            type="button"
          >
            ☰
          </button>
          <h1 class="page-title">Dashboard</h1>
          <div class="header-actions">
            <div class="ticker-badge ticker-loading" id="ticker-badge" aria-live="polite">
              <span class="ticker-dot ticker-dot--yellow" id="ticker-dot"></span>
              <span id="ticker-text">XAU: loading…</span>
            </div>
          </div>
        </header>

        <!-- Content -->
        <main class="content-area">
          <!-- ── Stat cards ──────────────────────────────────── -->
          <div class="stat-grid" role="list" aria-label="Key metrics">
            <!-- Gold Spot -->
            <div class="stat-card" role="listitem">
              <div class="stat-icon" aria-hidden="true">🥇</div>
              <div class="stat-label">Gold Spot (XAU)</div>
              <div class="stat-number" id="stat-gold" aria-live="polite">
                <span class="inline-spinner" aria-hidden="true"></span>
              </div>
              <canvas id="gold-sparkline" class="sparkline-canvas" width="80" height="28" style="display:block;margin-top:6px"></canvas>
              <div class="stat-sub" id="stat-gold-sub"></div>
            </div>

            <!-- Shops Listed -->
            <div class="stat-card" role="listitem">
              <div class="stat-icon" aria-hidden="true">🏪</div>
              <div class="stat-label">Shops Listed</div>
              <div class="stat-number" id="stat-shops" aria-live="polite">
                <span class="inline-spinner" aria-hidden="true"></span>
              </div>
              <div class="stat-sub" id="stat-shops-sub">from database</div>
            </div>

            <!-- Pending Orders -->
            <div class="stat-card" role="listitem">
              <div class="stat-icon" aria-hidden="true">
                📦 <span id="stat-orders-dot" style="display:none;width:8px;height:8px;border-radius:50%;background:#ef4444;vertical-align:middle;margin-left:4px"></span>
              </div>
              <div class="stat-label">Pending Orders</div>
              <div class="stat-number" id="stat-orders" aria-live="polite">
                <span class="inline-spinner" aria-hidden="true"></span>
              </div>
              <div class="stat-sub" id="stat-orders-sub">from database</div>
            </div>

            <!-- Published Posts -->
            <div class="stat-card" role="listitem">
              <div class="stat-icon" aria-hidden="true">📝</div>
              <div class="stat-label">Published Posts</div>
              <div class="stat-number" id="stat-posts" aria-live="polite">
                <span class="inline-spinner" aria-hidden="true"></span>
              </div>
              <div class="stat-sub" id="stat-posts-sub">from database</div>
            </div>
          </div>

          <!-- ── API Status ──────────────────────────────────── -->
          <section class="section card" aria-labelledby="api-status-title">
            <div class="api-status-header">
              <div class="flex gap-2" style="align-items: center">
                <h2 class="card-title" id="api-status-title">API Status</h2>
                <span class="api-last-checked" id="api-last-checked"></span>
              </div>
              <div style="display:flex;align-items:center;gap:10px">
                <span style="color:var(--text-dim);font-size:0.75rem">auto-refresh in <span id="api-countdown">60</span>s</span>
                <button class="btn btn-ghost btn-sm" id="api-check-btn" type="button">Check Now</button>
              </div>
            </div>
            <div class="table-wrap">
              <table aria-label="API service status">
                <thead>
                  <tr>
                    <th>Service</th>
                    <th>Status</th>
                    <th>Last Checked</th>
                    <th>Response (ms)</th>
                  </tr>
                </thead>
                <tbody id="api-table-body">
                  <tr>
                    <td
                      colspan="4"
                      style="color: var(--text-dim); text-align: center; padding: 20px"
                    >
                      <span class="inline-spinner" aria-hidden="true"></span>
                      Checking services…
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </section>

          <!-- ── Quick Actions ───────────────────────────────── -->
          <section class="section" aria-label="Quick actions">
            <div class="quick-actions">
              <button class="btn btn-primary" id="qa-force-refresh" type="button">
                <span style="vertical-align:middle;margin-right:4px" aria-hidden="true" id="qa-refresh-icon"></span> Force Refresh Prices
              </button>
              <button class="btn btn-ghost" id="qa-clear-cache" type="button">
                <span style="vertical-align:middle;margin-right:4px" aria-hidden="true" id="qa-trash-icon"></span> Clear Cache
              </button>
              <a class="btn btn-ghost" href="./content/">
                <span style="vertical-align:middle;margin-right:4px" aria-hidden="true" id="qa-post-icon"></span> New Post
              </a>
              <a class="btn btn-ghost" href="./shops/">
                <span style="vertical-align:middle;margin-right:4px" aria-hidden="true" id="qa-shop-icon"></span> Add Shop
              </a>
            </div>
          </section>

          <!-- ── Recent Activity ─────────────────────────────── -->
          <section class="section card" aria-labelledby="activity-title">
            <div class="card-header">
              <h2 class="card-title" id="activity-title">Recent Activity</h2>
            </div>
            <div class="activity-list" id="activity-list" role="list">
              <!-- populated by JS -->
            </div>
          </section>
        </main>
      </div>
    </div>

    <!-- Toast container -->
    <div class="toast-container" id="toast-container" aria-live="polite" aria-atomic="false"></div>

    <script type="module">
      import { logout as supabaseLogout, requireAuth, getSession, getSupabase } from './supabase-auth.js';
      import { CONSTANTS } from '../config/constants.js';
      import { initAdminShell } from './shared/admin-shell.js';
      import { showToast, qs, relativeTime, storageGet, storageSet, storageRemove, drawSparkline, skeletonRows } from './shared/admin-utils.js';
      import { ICONS } from './shared/icons.js';

      // ── Auth guard ───────────────────────────────────────────
      if (!(await requireAuth('./login/'))) throw new Error('redirect');

      // ── Initialise shared sidebar / shell ───────────────────
      await initAdminShell({ logout: supabaseLogout, getSession });

      const API_GOLD_URL = CONSTANTS.API_GOLD_URL;
      const API_FX_URL   = CONSTANTS.API_FX_URL;
      const API_TIMEOUT_MS = CONSTANTS.GOLD_FETCH_TIMEOUT;

      // ── Gold Ticker + sparkline ──────────────────────────────
      async function updateTicker() {
        const badge     = qs('#ticker-badge');
        const dot       = qs('#ticker-dot');
        const tickerTxt = qs('#ticker-text');
        try {
          const res   = await fetch(API_GOLD_URL);
          const data  = await res.json();
          const price = data.price ?? data.Price ?? null;
          if (price) {
            const formatted = new Intl.NumberFormat('en-US', {
              style: 'currency', currency: 'USD', maximumFractionDigits: 2,
            }).format(price);
            tickerTxt.textContent = `XAU: ${formatted}`;
            dot.className = 'ticker-dot ticker-dot--green';
            badge.classList.remove('ticker-loading');
            storageSet('gp_ticker_ts', Date.now().toString());

            // Stat card value
            qs('#stat-gold').textContent = formatted;

            const change    = data.ch  ?? data.change         ?? null;
            const changePct = data.chp ?? data.change_percent ?? null;
            let trendHtml = '';
            if (change !== null && changePct !== null) {
              const sign  = change >= 0 ? '+' : '';
              const arrow = change >= 0 ? '▲' : '▼';
              const color = change >= 0 ? 'var(--success)' : 'var(--danger, #ef4444)';
              trendHtml = `<span style="color:${color};font-size:0.8125rem">${arrow} ${sign}${Number(changePct).toFixed(2)}%</span>`;
            }
            const sub = qs('#stat-gold-sub');
            if (sub) sub.innerHTML = trendHtml || 'live spot price';

            // Persist price history and draw sparkline
            let history = [];
            try { history = JSON.parse(storageGet('gp_price_history') || '[]'); } catch { history = []; }
            if (!Array.isArray(history)) history = [];
            history.push(price);
            if (history.length > 20) history = history.slice(-20);
            storageSet('gp_price_history', JSON.stringify(history));

            const canvas = qs('#gold-sparkline');
            if (canvas) {
              const sparkData = history.length >= 2 ? history : Array.from({ length: 7 }, (_, i) => price * (0.99 + i * 0.002));
              drawSparkline(canvas, sparkData, { color: change >= 0 ? '#10b981' : '#ef4444', fill: true });
            }
          }
        } catch {
          tickerTxt.textContent = 'XAU: unavailable';
          dot.className = 'ticker-dot ticker-dot--yellow';
          qs('#stat-gold').textContent = 'Unavailable';
          const sub = qs('#stat-gold-sub');
          if (sub) sub.textContent = 'could not fetch price';
        }
      }
      updateTicker();

      // ── Supabase stats ──────────────────────────────────────
      async function loadSupabaseStats() {
        const sb = getSupabase();
        const weekAgo = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000).toISOString();

        // Shops
        if (sb) {
          try {
            const { count: total } = await sb.from('shops').select('*', { count: 'exact', head: true });
            const { count: newCount } = await sb.from('shops').select('*', { count: 'exact', head: true }).gte('created_at', weekAgo);
            qs('#stat-shops').textContent = (total ?? '—').toLocaleString?.() ?? total ?? '—';
            qs('#stat-shops-sub').textContent = newCount > 0 ? `+${newCount} new this week` : 'total in database';
          } catch {
            qs('#stat-shops').textContent = '—';
            qs('#stat-shops-sub').textContent = 'could not connect';
          }
        } else {
          qs('#stat-shops').textContent = '—';
          qs('#stat-shops-sub').textContent = 'Supabase not connected';
        }

        // Pending orders
        if (sb) {
          try {
            const { count: pending } = await sb.from('orders').select('*', { count: 'exact', head: true }).eq('status', 'pending');
            const val = pending ?? 0;
            qs('#stat-orders').textContent = val.toLocaleString();
            const dot = qs('#stat-orders-dot');
            if (dot) dot.style.display = val > 0 ? 'inline-block' : 'none';
            qs('#stat-orders-sub').textContent = val > 0 ? 'awaiting action' : 'all clear';
          } catch {
            qs('#stat-orders').textContent = '—';
            qs('#stat-orders-sub').textContent = 'could not connect';
          }
        } else {
          qs('#stat-orders').textContent = '—';
          qs('#stat-orders-sub').textContent = 'Supabase not connected';
        }

        // Published posts
        if (sb) {
          try {
            const { count: published } = await sb.from('content_posts').select('*', { count: 'exact', head: true }).eq('status', 'published');
            qs('#stat-posts').textContent = (published ?? '—').toLocaleString?.() ?? published ?? '—';
            qs('#stat-posts-sub').textContent = 'published articles';
          } catch {
            qs('#stat-posts').textContent = '—';
            qs('#stat-posts-sub').textContent = 'could not connect';
          }
        } else {
          qs('#stat-posts').textContent = '—';
          qs('#stat-posts-sub').textContent = 'Supabase not connected';
        }
      }
      loadSupabaseStats();

      // ── Recent activity feed ─────────────────────────────────
      async function loadActivity() {
        const list = qs('#activity-list');
        if (!list) return;
        list.innerHTML = skeletonRows(5, 1);

        const sb = getSupabase();
        let rows = [];

        if (sb) {
          try {
            const { data } = await sb
              .from('audit_log')
              .select('id,action,target_type,target_id,actor,created_at')
              .order('created_at', { ascending: false })
              .limit(15);
            if (data?.length) rows = data;
          } catch { /* fall through to synthesis */ }

          if (!rows.length) {
            // Synthesise from recent records across tables
            const sources = await Promise.allSettled([
              sb.from('shops').select('id,name,created_at').order('created_at', { ascending: false }).limit(5),
              sb.from('orders').select('id,status,created_at').order('created_at', { ascending: false }).limit(5),
              sb.from('content_posts').select('id,title,created_at').order('created_at', { ascending: false }).limit(5),
            ]);
            const [shopsRes, ordersRes, postsRes] = sources;
            (shopsRes.value?.data || []).forEach(s => rows.push({ action: 'Shop added', target_type: 'shop', actor: s.name || 'unknown', created_at: s.created_at }));
            (ordersRes.value?.data || []).forEach(o => rows.push({ action: `Order ${o.status}`, target_type: 'order', actor: `#${o.id}`, created_at: o.created_at }));
            (postsRes.value?.data || []).forEach(p => rows.push({ action: 'Post created', target_type: 'content', actor: p.title || 'untitled', created_at: p.created_at }));
            rows.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
            rows = rows.slice(0, 15);
          }
        }

        if (!rows.length) {
          list.innerHTML = `<div class="activity-empty">
            No activity yet. <a href="./shops/" style="color:var(--primary)">Add a shop</a> to get started.
          </div>`;
          return;
        }

        const iconMap = { shop: ICONS.shops, order: ICONS.orders, content: ICONS.content, default: ICONS.edit };
        list.innerHTML = rows.map(r => {
          const icon = iconMap[r.target_type] || iconMap.default;
          return `<div class="activity-item" role="listitem">
            <div class="activity-icon" aria-hidden="true">${icon}</div>
            <div class="activity-body">
              <div class="activity-action">${r.action || '—'}</div>
              <div class="activity-details">${r.actor || ''}</div>
            </div>
            <div class="activity-time">${relativeTime(r.created_at)}</div>
          </div>`;
        }).join('');
      }
      loadActivity();

      // ── API Status checks ────────────────────────────────────
      const SERVICES = [
        { name: 'Gold API (gold-api.com)',     url: API_GOLD_URL },
        { name: 'Exchange Rates (er-api.com)', url: API_FX_URL },
      ];

      let lastCheckedAt = null;
      let countdownInterval = null;
      let autoRefreshInterval = null;

      function respBar(ms) {
        const w   = Math.min(ms / 5, 80);
        const bg  = ms < 200 ? '#10b981' : ms < 500 ? '#f59e0b' : '#ef4444';
        return `<span class="resp-bar" style="display:inline-block;height:8px;width:${w}px;background:${bg};border-radius:2px;vertical-align:middle;margin-right:4px"></span>${ms} ms`;
      }

      async function checkService(service) {
        const start = performance.now();
        try {
          const res = await fetch(service.url, { cache: 'no-store', signal: AbortSignal.timeout(API_TIMEOUT_MS) });
          const ms  = Math.round(performance.now() - start);
          return { name: service.name, ok: res.ok, status: res.status, ms };
        } catch {
          const ms = Math.round(performance.now() - start);
          return { name: service.name, ok: false, status: 'Error', ms };
        }
      }

      async function checkSupabaseDb() {
        const sb = getSupabase();
        if (!sb) return { name: 'Supabase DB', ok: false, status: 'Not configured', ms: 0 };
        const start = performance.now();
        try {
          const { error } = await sb.from('shops').select('*', { count: 'exact', head: true });
          const ms = Math.round(performance.now() - start);
          return { name: 'Supabase DB', ok: !error, status: error ? 'Error' : 200, ms };
        } catch {
          const ms = Math.round(performance.now() - start);
          return { name: 'Supabase DB', ok: false, status: 'Error', ms };
        }
      }

      function renderApiTable(results) {
        const tbody = qs('#api-table-body');
        const now   = new Date().toLocaleTimeString();
        tbody.innerHTML = results.map(r => `<tr>
          <td>${r.name}</td>
          <td><span style="color:${r.ok ? 'var(--success)' : 'var(--danger,#ef4444)'}">${r.ok ? '● ' + r.status + ' OK' : '● ' + r.status}</span></td>
          <td>${now}</td>
          <td>${respBar(r.ms)}</td>
        </tr>`).join('');
      }

      function resetCountdown() {
        clearInterval(countdownInterval);
        let secs = 60;
        const el = qs('#api-countdown');
        if (el) el.textContent = secs;
        countdownInterval = setInterval(() => {
          secs--;
          if (el) el.textContent = secs;
          if (secs <= 0) {
            clearInterval(countdownInterval);
            runApiChecks();
          }
        }, 1000);
      }

      async function runApiChecks() {
        const tbody    = qs('#api-table-body');
        const checkBtn = qs('#api-check-btn');
        const lastEl   = qs('#api-last-checked');

        if (checkBtn) checkBtn.disabled = true;
        tbody.innerHTML = `<tr><td colspan="4" style="color:var(--text-dim);text-align:center;padding:20px">
          <span class="inline-spinner" aria-hidden="true"></span> Checking…
        </td></tr>`;

        const results = await Promise.all([...SERVICES.map(checkService), checkSupabaseDb()]);
        lastCheckedAt = Date.now();

        renderApiTable(results);
        if (checkBtn) checkBtn.disabled = false;
        if (lastEl) lastEl.textContent = 'Last checked: just now';

        resetCountdown();
      }

      runApiChecks();
      qs('#api-check-btn')?.addEventListener('click', runApiChecks);

      setInterval(() => {
        if (!lastCheckedAt) return;
        const sec   = Math.floor((Date.now() - lastCheckedAt) / 1000);
        const lastEl = qs('#api-last-checked');
        if (!lastEl) return;
        if (sec < 60) lastEl.textContent = `Last checked: ${sec}s ago`;
        else lastEl.textContent = `Last checked: ${Math.floor(sec / 60)} min ago`;
      }, 5000);

      // ── Inject SVG icons into Quick Action buttons ──────────
      const qaIcons = { 'qa-refresh-icon': ICONS.refresh, 'qa-trash-icon': ICONS.trash, 'qa-post-icon': ICONS.content, 'qa-shop-icon': ICONS.shops };
      Object.entries(qaIcons).forEach(([id, svg]) => { const el = qs('#' + id); if (el) el.innerHTML = svg; });

      // ── Quick Actions ────────────────────────────────────────
      qs('#qa-force-refresh')?.addEventListener('click', () => {
        storageSet('gp_force_refresh', Date.now().toString());
        showToast('Force refresh flagged — prices will reload on next public visit', 'success');
      });

      qs('#qa-clear-cache')?.addEventListener('click', () => {
        storageRemove('gp_cache_gold', 'goldprice_cache', 'gp_fx_cache');
        showToast('Cache cleared', 'success');
      });
    </script>
  </body>
</html>
