<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Admin Login — Gold Prices</title>
  <link rel="stylesheet" href="../admin.css" />
  <style>
    body {
      align-items: center;
      display: flex;
      justify-content: center;
      min-height: 100vh;
      padding: 16px;
    }

    .login-wrap {
      width: 100%;
      max-width: 400px;
    }

    .login-brand {
      align-items: center;
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 32px;
      text-align: center;
    }

    .brand-icon {
      align-items: center;
      background: linear-gradient(135deg, #f59e0b, #d97706);
      border-radius: 14px;
      box-shadow: 0 4px 20px rgba(245, 158, 11, 0.35);
      color: #0f172a;
      display: flex;
      font-size: 28px;
      height: 60px;
      justify-content: center;
      width: 60px;
    }

    .brand-name {
      color: var(--text);
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
    }

    .login-card h1 {
      color: var(--text);
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .login-sub {
      color: var(--text-muted);
      font-size: 0.875rem;
      margin-bottom: 28px;
    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .login-alert {
      align-items: flex-start;
      border-radius: var(--radius-sm);
      display: none;
      font-size: 0.8125rem;
      gap: 8px;
      padding: 10px 14px;
    }

    .login-alert.visible { display: flex; }

    .login-alert--error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: var(--danger);
    }

    .login-alert--offline {
      background: rgba(245, 158, 11, 0.1);
      border: 1px solid rgba(245, 158, 11, 0.3);
      color: var(--warning);
    }

    .btn-submit {
      margin-top: 4px;
      width: 100%;
    }

    .login-help {
      color: var(--text-dim);
      font-size: 0.8rem;
      margin-top: 20px;
      text-align: center;
    }

    .login-help a {
      color: var(--text-muted);
      text-decoration: underline;
    }

    .login-help a:hover { color: var(--text); }
  </style>
</head>
<body>
  <!-- Flash prevention: redirect immediately if already authenticated -->
  <script>
    (function () {
      try {
        if (localStorage.getItem('gp_admin_token')) {
          window.location.replace('../');
        }
      } catch (e) {
        // not authenticated
      }
    })();
  </script>

  <div class="login-wrap">
    <div class="login-brand">
      <div class="brand-icon" aria-hidden="true">⚙</div>
      <span class="brand-name">GoldAdmin</span>
    </div>

    <div class="login-card">
      <h1>Admin Login</h1>
      <p class="login-sub">Gold Prices Admin Panel</p>

      <form class="login-form" id="login-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input
            class="form-input"
            id="email"
            name="email"
            type="email"
            autocomplete="email"
            placeholder="admin@goldprices.com"
            required
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input
            class="form-input"
            id="password"
            name="password"
            type="password"
            autocomplete="current-password"
            required
          />
        </div>

        <div class="login-alert login-alert--error" id="login-error" role="alert"></div>
        <div class="login-alert login-alert--offline" id="login-offline" role="alert">
          <span>⚠️</span>
          <span>Admin server is unreachable. Make sure <code>npm start</code> is running on port 3000.</span>
        </div>

        <button type="submit" class="btn btn-gold btn-submit" id="submit-btn">
          Sign In
        </button>
      </form>

      <p class="login-help">
        Default: <code>admin@goldprices.com</code> / <code>ADMIN_PASSWORD</code> env var
        &nbsp;·&nbsp;
        <a href="../../ADMIN_SETUP.md" target="_blank" rel="noopener">Setup guide</a>
      </p>
    </div>
  </div>

  <script type="module">
    import { login } from '../api-client.js';

    const form      = document.getElementById('login-form');
    const emailEl   = document.getElementById('email');
    const passwordEl= document.getElementById('password');
    const errorEl   = document.getElementById('login-error');
    const offlineEl = document.getElementById('login-offline');
    const submitBtn = document.getElementById('submit-btn');

    function showError(msg) {
      errorEl.textContent = msg;
      errorEl.classList.add('visible');
      offlineEl.classList.remove('visible');
    }

    function showOffline() {
      offlineEl.classList.add('visible');
      errorEl.classList.remove('visible');
    }

    function clearAlerts() {
      errorEl.classList.remove('visible');
      offlineEl.classList.remove('visible');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearAlerts();

      const email    = emailEl.value.trim();
      const password = passwordEl.value;

      if (!email) {
        showError('Email is required.');
        emailEl.focus();
        return;
      }
      if (!password) {
        showError('Password is required.');
        passwordEl.focus();
        return;
      }

      submitBtn.disabled    = true;
      submitBtn.textContent = 'Signing in…';

      const result = await login(email, password);

      if (result.success) {
        window.location.replace('../');
        return;
      }

      submitBtn.disabled    = false;
      submitBtn.textContent = 'Sign In';

      if (result.offline) {
        showOffline();
      } else {
        showError(result.message || 'Invalid credentials.');
        passwordEl.value = '';
        passwordEl.focus();
      }
    });
  </script>
</body>
</html>
