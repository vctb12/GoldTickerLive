# Canonical GitHub issue/PR labels for Gold Ticker Live.
# Synced by .github/workflows/sync-labels.yml (push to main or workflow_dispatch).
#
# Format: https://github.com/EndBug/label-sync#configuration

- name: bug
  color: d73a4a
  description: Something isn't working

- name: documentation
  color: '0075ca'
  description: Improvements or additions to documentation

- name: duplicate
  color: cfd3d7
  description: This issue or pull request already exists

- name: enhancement
  color: a2eeef
  description: New feature or request

- name: good first issue
  color: '7057ff'
  description: Good for newcomers

- name: help wanted
  color: '008672'
  description: Extra attention is needed

- name: invalid
  color: e4e669
  description: This doesn't seem right

- name: question
  color: d876e3
  description: Further information is requested

- name: wontfix
  color: ffffff
  description: This will not be worked on

- name: polish
  color: fbca04
  description: Visual, copy, RTL, or interaction polish

- name: performance
  color: 0e8a16
  description: Performance, Lighthouse, or bundle size regressions

- name: dependencies
  color: '0366d6'
  description: Pull requests that update a dependency file

- name: github_actions
  color: '000000'
  description: Pull requests that update GitHub Actions code

- name: javascript
  color: '168700'
  description: Pull requests that update JavaScript code

- name: python
  color: 2b67c6
  description: Pull requests that update Python code
