# ------------------------------------------------------------------
# Daily Newsletter — informational / operational scheduled job.
# NOT a required merge gate. Failures surface via job logs only.
# ------------------------------------------------------------------
name: Daily Newsletter

on:
  schedule:
    # Run daily at 7:00 AM Dubai time (03:00 UTC)
    - cron: '0 3 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: read

concurrency:
  group: daily-newsletter
  cancel-in-progress: false

jobs:
  send-daily-newsletter:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Send daily newsletter
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SITE_URL: https://goldtickerlive.com
        run: node scripts/node/send-newsletter.js daily

      - name: Notify on failure
        if: failure()
        run: |
          echo "Daily newsletter send failed"
          # TODO: Add Slack/Discord notification
