name: Daily Newsletter

on:
  schedule:
    # Run daily at 7:00 AM Dubai time (03:00 UTC)
    - cron: '0 3 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  send-daily-newsletter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Send daily newsletter
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SITE_URL: https://goldprices.com
        run: node scripts/node/send-newsletter.js daily

      - name: Notify on failure
        if: failure()
        run: |
          echo "Daily newsletter send failed"
          # TODO: Add Slack/Discord notification
