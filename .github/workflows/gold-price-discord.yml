name: Discord Gold Price Bot

on:
  schedule:
    # Posts daily at 08:00 UTC (= 12:00 Dubai noon)
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  post:
    name: Post gold price to Discord
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Post to Discord
        env:
          GOLD_API_KEY:          ${{ secrets.GOLD_API_KEY }}
          DISCORD_WEBHOOK_URL:   ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: node scripts/notify-discord.js
