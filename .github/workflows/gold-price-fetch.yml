# ------------------------------------------------------------------
# Gold Price Fetch — pulls live gold/AED rates from goldpricez.com
# every 6 minutes while global gold markets are open and commits
# data/gold_price.json if it changed.
# NOT a required merge gate.
# ------------------------------------------------------------------
name: Gold Price Fetch (goldpricez.com)

on:
  schedule:
    - cron: '*/6 21-23 * * 0'  # Every 6 min from Sunday open
    - cron: '*/6 * * * 1-4'    # Every 6 min Mon–Thu
    - cron: '*/6 0-20 * * 5'   # Every 6 min Friday until close hour
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gold-price-fetch
  cancel-in-progress: false

jobs:
  fetch:
    name: Fetch goldpricez.com → data/gold_price.json
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scripts/python/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/python/requirements.txt

      - name: Fetch gold price
        env:
          GOLDPRICEZ_API_KEY: ${{ secrets.GOLDPRICEZ_API_KEY }}
        run: python scripts/fetch_gold_price.py

      - name: Commit data/gold_price.json if changed
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7
        with:
          commit_message: 'chore(data): update gold price [skip ci]'
          file_pattern: data/gold_price.json
          commit_user_name: github-actions[bot]
          commit_user_email: 41898282+github-actions[bot]@users.noreply.github.com
