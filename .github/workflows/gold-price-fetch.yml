# ------------------------------------------------------------------
# Gold Price Fetch — pulls live gold/AED rates from the provider-adapter
# once per hour while global gold markets are open and commits
# data/gold_price.json if it changed. This is the single production
# provider-call path; post_gold.yml reads the cached result and does not
# fetch again.
# NOT a required merge gate.
# ------------------------------------------------------------------
name: Gold Price Fetch (provider-adapter)

on:
  schedule:
    # Market hours: Sunday 21:00 UTC (Monday 01:00 UAE/GMT+4) through Friday 20:59 UTC.
    # Runs 7 minutes before post_gold.yml so fresh data is committed first.
    - cron: '2 21-23 * * 0'  # Sunday 21:02–23:02 UTC (market open window)
    - cron: '2 * * * 1-4'    # Monday–Thursday all hours (24/5 market open)
    - cron: '2 0-20 * * 5'   # Friday 00:02–20:02 UTC (until market close)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gold-price-fetch
  cancel-in-progress: true

jobs:
  fetch:
    name: Fetch provider-adapter → data/gold_price.json
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scripts/python/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/python/requirements.txt

      - name: Fetch gold price
        id: fetch_gold
        env:
          GOLD_API_COM_ENABLED: 'true'
          GOLD_PROVIDER_ORDER: gold_api_com,twelvedata_xauusd,fmp_gcusd
          GOLD_API_COM_KEY: ${{ secrets.GOLD_API_COM_KEY }}
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY }}
          TWELVEDATA_SYMBOL: ${{ secrets.TWELVEDATA_SYMBOL }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          FMP_SYMBOL: ${{ secrets.FMP_SYMBOL }}
          GOLDPRICEZ_API_KEY: ${{ secrets.GOLDPRICEZ_API_KEY }}
        run: python scripts/python/fetch_gold_price.py

      - name: Sync latest snapshot to Supabase (optional)
        id: snapshot_sync
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SNAPSHOT_SYNC_STRICT: ${{ vars.SNAPSHOT_SYNC_STRICT || 'false' }}
          PRICE_PROVIDER_CHAIN: ${{ steps.fetch_gold.outputs.reason }}
          PRICE_CIRCUIT_STATE: ${{ steps.fetch_gold.outputs.fresh == 'true' && 'closed' || 'fallback' }}
        run: node scripts/node/sync-price-snapshot.js

      - name: Workflow summary
        if: always()
        run: |
          {
            echo "## Gold Price Fetch Summary"
            echo ""
            echo "- Fresh quote: \`${{ steps.fetch_gold.outputs.fresh || 'unknown' }}\`"
            echo "- Selected provider: \`${{ steps.fetch_gold.outputs.provider || 'n/a' }}\`"
            echo "- Provider decision chain: \`${{ steps.fetch_gold.outputs.reason || 'n/a' }}\`"
            echo "- Snapshot synced: \`${{ steps.snapshot_sync.outputs.snapshot_synced || 'false' }}\`"
            echo "- Snapshot sync reason: \`${{ steps.snapshot_sync.outputs.snapshot_sync_reason || 'not_available' }}\`"
            echo "- Snapshot duplicate: \`${{ steps.snapshot_sync.outputs.snapshot_duplicate || 'false' }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Commit data/gold_price.json if changed
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7
        with:
          commit_message: 'chore(data): update gold price [skip ci]'
          file_pattern: data/gold_price.json
          commit_user_name: github-actions[bot]
          commit_user_email: 41898282+github-actions[bot]@users.noreply.github.com
