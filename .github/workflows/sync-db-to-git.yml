name: Sync Database to Git

on:
  repository_dispatch:
    types: [sync-shops]

jobs:
  update-shops-file:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch Data from Supabase
        id: fetch
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          RESPONSE=$(curl -s "$SUPABASE_URL/rest/v1/shops?select=*&order=confidence_score.desc" \
            -H "apikey: $SUPABASE_KEY" \
            -H "Authorization: Bearer $SUPABASE_KEY")
          echo "DATA<<EOF" >> $GITHUB_OUTPUT
          echo "$RESPONSE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Generate shops.js
        run: |
          cat > data/shops.js << EOL
          // AUTO-GENERATED BY ADMIN PANEL - DO NOT EDIT MANUALLY
          // Last Updated: $(date -u +"%Y-%m-%dT%H:%M:%SZ")
          const SHOPS_DATA = ${{ steps.fetch.outputs.DATA }};
          
          if (typeof module !== 'undefined' && module.exports) {
            module.exports = SHOPS_DATA;
          }
          EOL

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/shops.js
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: sync shops from admin panel" && git push)
