name: Sync Database to Git

on:
  repository_dispatch:
    types: [sync-shops]

jobs:
  update-shops-file:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch Data from Supabase
        id: fetch
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          RESPONSE=$(curl -s "$SUPABASE_URL/rest/v1/shops?select=*&order=confidence.desc" \
            -H "apikey: $SUPABASE_KEY" \
            -H "Authorization: Bearer $SUPABASE_KEY")
          echo "DATA<<EOF" >> $GITHUB_OUTPUT
          echo "$RESPONSE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Generate shops.js
        run: |
          cat > data/shops.js << 'SHOPS_EOF'
          // AUTO-GENERATED FROM SUPABASE — DO NOT EDIT MANUALLY
          // Last synced: SYNC_TIMESTAMP
          export const SHOPS = SHOPS_DATA_PLACEHOLDER;
          SHOPS_EOF
          # Inject actual timestamp and data
          sed -i "s|SYNC_TIMESTAMP|$(date -u +"%Y-%m-%dT%H:%M:%SZ")|" data/shops.js
          sed -i "s|SHOPS_DATA_PLACEHOLDER|${{ steps.fetch.outputs.DATA }}|" data/shops.js

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/shops.js
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: sync shops from admin panel" && git push)
