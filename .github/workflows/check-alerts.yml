# ------------------------------------------------------------------
# Alerts Check Job — scheduled/manual alert evaluation trigger.
# Runs in dry mode when ALERT_JOB_TOKEN is missing.
# ------------------------------------------------------------------
name: Check Alerts

on:
  schedule:
    # Hourly shortly after price-refresh workflows
    - cron: '12 * * * 1-5'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Force dry-run mode (no real sends)'
        required: false
        default: 'false'

permissions:
  contents: read

concurrency:
  group: check-alerts
  cancel-in-progress: true

jobs:
  run-check:
    name: Trigger /api/v1/jobs/check-alerts
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Resolve mode
        id: mode
        run: |
          if [ "${{ github.event.inputs.dry_run || 'false' }}" = "true" ]; then
            echo "dry_run=true" >> "$GITHUB_OUTPUT"
          elif [ -z "${{ secrets.ALERT_JOB_TOKEN }}" ]; then
            echo "dry_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "dry_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger alerts check
        env:
          SITE_URL: https://goldtickerlive.com
          ALERT_JOB_TOKEN: ${{ secrets.ALERT_JOB_TOKEN }}
          DRY_RUN: ${{ steps.mode.outputs.dry_run }}
        run: |
          set -euo pipefail
          URL="${SITE_URL%/}/api/v1/jobs/check-alerts?dryRun=${DRY_RUN}"
          echo "Calling ${URL}"
          if [ -n "${ALERT_JOB_TOKEN}" ]; then
            curl -sS --fail \
              -H "Content-Type: application/json" \
              -H "x-alert-job-token: ${ALERT_JOB_TOKEN}" \
              -X POST "${URL}" | tee /tmp/alerts-check-response.json
          else
            echo "ALERT_JOB_TOKEN missing → running dry mode."
            curl -sS --fail \
              -H "Content-Type: application/json" \
              -H "x-alerts-dry-run: true" \
              -X POST "${URL}" | tee /tmp/alerts-check-response.json
          fi

      - name: Step summary
        if: always()
        run: |
          echo "## Alerts check run" >> "$GITHUB_STEP_SUMMARY"
          echo "- Dry run: \`${{ steps.mode.outputs.dry_run }}\`" >> "$GITHUB_STEP_SUMMARY"
          if [ -f /tmp/alerts-check-response.json ]; then
            echo "- API response captured in logs." >> "$GITHUB_STEP_SUMMARY"
          fi
