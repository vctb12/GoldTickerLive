name: Perf & QA Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: perf-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  audit:
    name: Audit assets, run Playwright
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run image audit
        run: node scripts/node/image-audit.js || true

      - name: Run Playwright tests
        run: npx playwright test --project=chromium --reporter=list || true

      - name: Summarize artifacts
        run: |
          echo 'Artifacts:'
          ls -la data || true
