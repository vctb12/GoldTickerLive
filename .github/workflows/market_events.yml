name: Gold Market Events

# Cron schedules aligned to market_sessions.json.
# All times are UTC. GST equivalents noted in comments.
#
# Sydney open:       Sunday  22:00 UTC  →  Monday 02:00 GST  (global weekly open)
# London open:       Mon–Fri 08:00 UTC  →  12:00 GST
# New York COMEX open: Mon–Fri 13:30 UTC →  17:30 GST
# New York COMEX close: Mon–Fri 18:00 UTC → 22:00 GST  (Friday = global weekly close)
# Dubai open:        Sun–Thu 04:30 UTC  →  08:30 GST

on:
  schedule:
    # Sydney open — global weekly market open (Sunday 22:00 UTC / Monday 02:00 GST)
    - cron: '0 22 * * 0'

    # London open — weekdays 08:00 UTC / 12:00 GST
    - cron: '0 8 * * 1-5'

    # New York COMEX close — weekdays 18:00 UTC / 22:00 GST
    # (Friday run = global weekly market close)
    - cron: '0 18 * * 1-5'

    # Dubai open — Sunday–Thursday 04:30 UTC / 08:30 GST
    - cron: '30 4 * * 0-4'

  workflow_dispatch:

permissions:
  contents: read

jobs:
  post:
    name: Post market event to X
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-poster-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-poster-

      - name: Install dependencies
        run: pip install requests tweepy supabase

      - name: Run gold poster (market_event mode)
        env:
          POST_MODE: market_event
          GOLD_API_KEY: ${{ secrets.GOLD_API_KEY }}
          TWITTER_API_KEY: ${{ secrets.CONSUMER_KEY }}
          TWITTER_API_SECRET: ${{ secrets.CONSUMER_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.ACCESS_TOKEN_SECRET }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/python/gold_poster.py
