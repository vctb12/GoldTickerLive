# ------------------------------------------------------------------
# Test Gold Providers — manual smoke test for every configured
# provider adapter. Runs ONE bakeoff round, prints per-provider
# success/error, uploads a sanitized artifact, and DOES NOT post
# to X or commit anything.
#
# Useful when wiring up a new API key in repository secrets.
# ------------------------------------------------------------------
name: Test Gold Providers (manual)

on:
  workflow_dispatch:
    inputs:
      providers:
        description: "Comma-separated provider names (blank = all known)"
        required: false
        default: ""
      log_raw:
        description: "Log raw response bodies (BAKEOFF_LOG_RAW)"
        required: false
        default: "false"

permissions:
  contents: read

concurrency:
  group: gold-provider-test
  cancel-in-progress: true

jobs:
  test:
    name: One-round provider smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scripts/python/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/python/requirements.txt

      - name: Run one bakeoff round
        env:
          BAKEOFF_LOG_RAW: ${{ inputs.log_raw }}
          # Each adapter pulls its own env vars. Keep secrets opt-in:
          # absent values produce a clean ``missing_api_key`` result.
          METAL_SENTINEL_ENABLED: ${{ secrets.METAL_SENTINEL_ENABLED }}
          METAL_SENTINEL_API_KEY: ${{ secrets.METAL_SENTINEL_API_KEY }}
          METAL_SENTINEL_API_HOST: ${{ secrets.METAL_SENTINEL_API_HOST }}
          METAL_SENTINEL_ENDPOINT: ${{ secrets.METAL_SENTINEL_ENDPOINT }}
          FINNHUB_ENABLED: ${{ secrets.FINNHUB_ENABLED }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          FINNHUB_SYMBOL: ${{ secrets.FINNHUB_SYMBOL }}
          FMP_ENABLED: ${{ secrets.FMP_ENABLED }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          FMP_SYMBOL: ${{ secrets.FMP_SYMBOL }}
          GOLDAPI_IO_ENABLED: ${{ secrets.GOLDAPI_IO_ENABLED }}
          GOLDAPI_IO_KEY: ${{ secrets.GOLDAPI_IO_KEY }}
          TWELVEDATA_ENABLED: ${{ secrets.TWELVEDATA_ENABLED }}
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY }}
          TWELVEDATA_SYMBOL: ${{ secrets.TWELVEDATA_SYMBOL }}
          GOLDPRICEZ_API_KEY: ${{ secrets.GOLDPRICEZ_API_KEY }}
          GOLD_PROVIDER_ORDER: ${{ inputs.providers }}
        run: |
          python scripts/python/provider_bakeoff.py \
            --once \
            --providers "${{ inputs.providers }}" \
            --output ./out/provider_test_log.jsonl \
            --write-scorecard \
            --scorecard-output ./out/provider_test_scorecard.json

      - name: Upload sanitized artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: gold-provider-test-${{ github.run_id }}
          path: out/
          retention-days: 7
