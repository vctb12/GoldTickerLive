name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: NODE_ENV=production npm run build

      - name: Regenerate sitemap.xml
        run: node scripts/generate-sitemap.js

      - name: Generate RSS feed
        run: node scripts/generate-rss.js

      - name: Copy root-level statics not bundled by Vite
        run: |
          # Service worker must be at the root to have the correct scope
          cp sw.js dist/
          # OG image and other assets
          cp -r assets dist/
          # Prevent Jekyll from breaking ES6 module imports on GitHub Pages
          touch dist/.nojekyll
          # Robots.txt and .htaccess must live at root for GitHub Pages / servers
          cp robots.txt dist/
          [ -f .htaccess ] && cp .htaccess dist/ || true
          # Copy freshly-generated sitemap and RSS feed
          cp sitemap.xml dist/ || true
          cp feed.xml dist/ || true
          # ES module source files used by all leaf pages via page-hydrator.js
          cp -r lib dist/
          cp -r config dist/
          cp -r components dist/
          cp -r data dist/
          # Root-level shared CSS/icons used by leaf pages via relative paths
          cp style.css dist/
          cp favicon.svg dist/
          cp manifest.json dist/
          # Page-specific CSS/JS in new organized directories
          cp -r styles dist/
          mkdir -p dist/scripts/pages && cp -r scripts/pages/* dist/scripts/pages/ || true
          # Tool pages
          [ -d tools ] && cp -r tools dist/ || true
          # ── Country-specific city / karat / shops leaf-page directories ──
          # Each of these contains static index.html files that load page-hydrator.js.
          # Copy any top-level directory that contains at least one gold-price/ subdirectory
          # (i.e. is a country leaf-page tree), excluding Vite-managed source dirs.
          VITE_DIRS="assets dist node_modules .git guides countries social gold-price-history order-gold search embed components config lib data"
          for d in */; do
            country="${d%/}"
            # Skip known non-country dirs
            if echo "$VITE_DIRS" | tr ' ' '\n' | grep -qx "$country"; then continue; fi
            # Skip directories without a gold-price subdirectory (not a country tree)
            if [ ! -d "$country/gold-price" ]; then continue; fi
            cp -r "$country" dist/
          done
          # ── Tool / feature directories ──
          # Note: social/, gold-price-history/, order-gold/, search/, guides/ are
          # handled by Vite build (ES module imports bundled and hashed).
          # Only embed/ is copied verbatim (standalone, no build needed).
          [ -d embed ] && cp -r embed dist/ || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
