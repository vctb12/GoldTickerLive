name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Copy root-level statics not bundled by Vite
        run: |
          # Service worker must be at the root to have the correct scope
          cp sw.js dist/
          # OG image and other assets
          cp -r assets dist/
          # Prevent Jekyll from breaking ES6 module imports on GitHub Pages
          touch dist/.nojekyll
          # Robots.txt and .htaccess must live at root for GitHub Pages / servers
          cp robots.txt dist/
          [ -f .htaccess ] && cp .htaccess dist/ || true
          # ES module source files used by all leaf pages via page-hydrator.js
          cp -r lib dist/
          cp -r config dist/
          cp -r components dist/
          cp -r data dist/
          # Root-level shared CSS/icons used by leaf pages via relative paths
          cp style.css dist/
          cp favicon.svg dist/
          cp manifest.json dist/
          # ── Country-specific city / karat / shops leaf-page directories ──
          # Each of these contains static index.html files that load page-hydrator.js
          for country in uae saudi-arabia qatar kuwait bahrain oman jordan lebanon egypt morocco algeria tunisia libya sudan india; do
            [ -d "$country" ] && cp -r "$country" dist/ || true
          done
          # ── Tool / feature directories ──
          # Note: social/, gold-price-history/, order-gold/, search/, guides/ are
          # handled by Vite build (ES module imports bundled and hashed).
          # Only embed/ is copied verbatim (standalone, no build needed).
          [ -d embed ] && cp -r embed dist/ || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
