# ------------------------------------------------------------------
# Deploy — production deploy.
# Builds the Vite bundle, regenerates sitemap.xml / feed.xml, and
# publishes `dist/` to GitHub Pages on every push to `main`.
# Tier: production deploy (not a merge gate — runs after merge)
# ------------------------------------------------------------------
name: Deploy to GitHub Pages

on:
  schedule:
    # Safety net: redeploy during market hours so Pages never drifts more than ~30 min
    # behind main, even if a future regression re-introduces [skip ci] on data commits.
    # Windows mirror gold-price-fetch.yml's open-market schedule. All times UTC.
    - cron: '*/30 21-23 * * 0'   # Sun open (21:00–23:30 UTC)
    - cron: '*/30 * * * 1-4'     # Mon–Thu (full day UTC)
    - cron: '*/30 0-20 * * 5'    # Fri until close (00:00–20:30 UTC)
  push:
    branches: [main]
    paths-ignore:
      - '.github/workflows/setup-mcp.yml'
      - '.github/copilot/**'
      - 'data/last_gold_price.json'
      - 'docs/**'
      - '*.md'
      - 'scripts/python/**'
      - 'config/twitter_bot/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  # Cancel in-flight builds when a newer push lands so bursty data refreshes
  # (gold-price-fetch.yml runs every 6 min) don't queue redundant deploys.
  # The latest data always wins.
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Pre-build validation
        run: npm run validate

      - name: Build
        run: NODE_ENV=production npm run build

      # sitemap.xml and feed.xml are generated here and NOT committed to the repo
      - name: Regenerate sitemap.xml
        run: node scripts/node/generate-sitemap.js

      - name: Enforce sitemap coverage
        run: node scripts/node/check-sitemap-coverage.js

      - name: Generate RSS feed
        run: node scripts/node/generate-rss.js

      - name: Copy root-level statics not bundled by Vite
        run: |
          # Service worker must be at the root to have the correct scope
          cp sw.js dist/
          # OG image and other assets
          cp -r assets dist/
          # Prevent Jekyll from breaking ES6 module imports on GitHub Pages
          touch dist/.nojekyll
          # Robots.txt and .htaccess must live at root for GitHub Pages / servers
          cp robots.txt dist/
          [ -f .htaccess ] && cp .htaccess dist/ || true
          # CNAME for custom domain (goldtickerlive.com)
          [ -f CNAME ] && cp CNAME dist/ || true
          # Copy freshly-generated sitemap and RSS feed
          cp sitemap.xml dist/ || true
          cp feed.xml dist/ || true
          # ES module source files used by all leaf pages via page-hydrator.js
          cp -r src dist/
          cp -r data dist/
          # Root-level shared CSS/icons used by leaf pages via relative paths
          cp favicon.svg dist/
          cp manifest.json dist/
          # Page-specific CSS/JS in organized directories
          cp -r styles dist/
          # Admin pages — excluded from Vite build, served as-is (ES modules with top-level await)
          [ -d admin ] && cp -r admin dist/ || true
          # 2026-07-04 IA reset: countries/ and content/ trees were deleted
          # (docs/plans/2026-07-04_radical-page-reduction.md) — nothing to copy.

      - name: Flatten leaf-page CSS (collapse the @import waterfall in the dist copy)
        # Leaf pages (countries/, content/) load styles/global.css as-is, where 9
        # nested @imports load serially. Inline them into the dist copy only — the
        # source keeps its @import structure for development. Safe: unresolved
        # imports are left untouched. See scripts/node/flatten-css.js.
        run: node scripts/node/flatten-css.js dist/styles/global.css

      - name: Verify dist directory
        run: |
          echo "── dist/ contents ──"
          ls -la dist/
          echo ""
          echo "── dist/ size ──"
          du -sh dist/
          echo ""
          # Sanity check: index.html must exist
          if [ ! -f dist/index.html ]; then
            echo "::error::dist/index.html is missing — build may have failed silently"
            exit 1
          fi

      - name: Write build-info marker
        # A tiny deploy fingerprint the post-deploy smoke reads back from the live
        # site to prove the NEW commit is actually serving (merged ≠ deployed until
        # verified live). Safe: only writes one JSON file into dist/ before upload.
        run: |
          cat > dist/build-info.json <<EOF
          {
            "commit": "${{ github.sha }}",
            "ref": "${{ github.ref_name }}",
            "run_id": "${{ github.run_id }}",
            "built_at_utc": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF
          echo "build-info.json:" && cat dist/build-info.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
