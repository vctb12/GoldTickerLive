# ------------------------------------------------------------------
# Post Gold Price to X — informational social-posting bot. Runs hourly
# while global gold markets are open and publishes a gold price update.
#
# POST_INTENT=must_post (default for all runs): every triggered run
# publishes a valid non-duplicate post unless a hard external blocker
# prevents it (invalid X credentials, X API outage, no usable price).
# Soft guard conditions (small price move, provider timestamp unchanged,
# cooldown, fallback data) are bypassed — the tweet text is always unique
# thanks to the current UAE run-window timestamp.
#
# NOT a required merge gate.
# ------------------------------------------------------------------
name: Post Gold Price to X (Python)

on:
  schedule:
    - cron: '9 21-23 * * 0'  # Hourly from Sunday open, after the fetch workflow
    - cron: '9 * * * 1-4'    # Hourly Mon–Thu
    - cron: '9 0-20 * * 5'   # Hourly Friday until close hour
  workflow_dispatch:
    inputs:
      post_intent:
        description: "must_post = publish a valid non-duplicate update unless X/API/auth hard-fails. guard_normal = legacy guard behaviour (small moves may skip)."
        required: false
        default: "must_post"
      dry_run:
        description: "true = evaluate all guards and skip the real X API call"
        required: false
        default: "false"
      force_post:
        description: "true = bypass cooldown only; duplicate and stale guards still apply (use post_intent=must_post to bypass all soft guards)"
        required: false
        default: "false"
      source:
        description: "Trigger source label for logs/state (manual, shortcut, scheduled)"
        required: false
        default: "manual"
      refresh_price_first:
        description: "Run one price refresh before posting (manual/operator only). Fetches data/gold_price.json from providers once, then continues with the regular post guards."
        required: false
        default: "false"
      trigger_nonce:
        description: "Optional unique manual trigger label"
        required: false
        default: ""
      allow_same_price_closed_market_repost:
        description: "Manual/operator only: allow market_closed_reference repost even if closing price is unchanged, subject to duplicate/content-hash/cooldown protections. Scheduled runs ignore this."
        required: false
        default: "false"

# Least-privilege default; the posting job elevates to write for the state commit.
permissions:
  contents: read

concurrency:
  # Conservative by design: if a scheduled run and a manual Shortcut run overlap,
  # cancel the older in-flight run so the repo state and tweet budget stay clean.
  group: post-gold
  cancel-in-progress: true

jobs:
  post:
    name: Post gold price to X / Twitter (Python)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scripts/python/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/python/requirements.txt

      - name: Refresh gold price (manual operator only)
        # Only runs when an operator explicitly sets refresh_price_first=true via
        # workflow_dispatch. Scheduled runs never fetch inside this workflow.
        # Soft-fail: if the fetch fails (e.g., provider key unavailable), the
        # workflow continues and posts from the existing cached data/gold_price.json.
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.refresh_price_first == 'true'
        env:
          GOLD_API_COM_ENABLED: 'true'
          GOLD_PROVIDER_ORDER: gold_api_com,twelvedata_xauusd,fmp_gcusd
          GOLD_API_COM_KEY: ${{ secrets.GOLD_API_COM_KEY }}
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY }}
          TWELVEDATA_SYMBOL: ${{ secrets.TWELVEDATA_SYMBOL }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          FMP_SYMBOL: ${{ secrets.FMP_SYMBOL }}
          GOLDPRICEZ_API_KEY: ${{ secrets.GOLDPRICEZ_API_KEY }}
        continue-on-error: true
        run: python scripts/python/fetch_gold_price.py

      - name: Commit refreshed gold price (manual operator only)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.refresh_price_first == 'true'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -f data/gold_price.json ]; then
            git add data/gold_price.json || true
            git diff --cached --quiet || git commit -m "chore(data): refresh gold price before post [skip ci]"
            git push || true
          fi

      - name: Run posting script
        env:
          TWITTER_API_KEY:             ${{ secrets.CONSUMER_KEY }}
          TWITTER_API_SECRET:          ${{ secrets.CONSUMER_SECRET }}
          TWITTER_ACCESS_TOKEN:        ${{ secrets.ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.ACCESS_TOKEN_SECRET }}
          GITHUB_EVENT_SCHEDULE:       ${{ github.event.schedule }}
          POST_INTENT:                 ${{ github.event.inputs.post_intent || 'must_post' }}
          DRY_RUN_TWEET:               ${{ github.event.inputs.dry_run || 'false' }}
          FORCE_POST:                  ${{ github.event.inputs.force_post || 'false' }}
          POST_TRIGGER_SOURCE:         ${{ github.event.inputs.source || 'scheduled' }}
          REFRESH_PRICE_FIRST:         ${{ github.event.inputs.refresh_price_first || 'false' }}
          POST_TRIGGER_NONCE:          ${{ github.event.inputs.trigger_nonce || '' }}
          ALLOW_SAME_PRICE_CLOSED_MARKET_REPOST: ${{ github.event.inputs.allow_same_price_closed_market_repost || 'false' }}
          MIN_TWEET_INTERVAL_MINUTES:  '55'
          POST_GOLD_RESULT_PATH:       ${{ runner.temp }}/post-gold-result.json
          POST_GOLD_REPORT_PATH:       ${{ runner.temp }}/post-gold-report.md
          X_AUTOMATION_OBSERVABILITY_SYNC: 'true'
          X_AUTOMATION_RUNS_FILE:      ${{ github.workspace }}/data/automation_runs.json
          X_AUTOMATION_POSTS_FILE:     ${{ github.workspace }}/data/tweet_posts.json
          X_AUTOMATION_FAILURES_FILE:  ${{ github.workspace }}/data/tweet_failures.json
          SUPABASE_URL:                ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY:   ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/python/post_gold_price.py

      - name: Commit last price state
        env:
          POST_GOLD_RESULT_PATH: ${{ runner.temp }}/post-gold-result.json
        run: |
          set -euo pipefail
          RESULT_STATUS="$(python - <<'PY'
          import json
          import os
          from pathlib import Path

          path = Path(os.environ["POST_GOLD_RESULT_PATH"])
          if not path.exists():
              print("unknown")
          else:
              try:
                  payload = json.loads(path.read_text(encoding="utf-8"))
                  if not isinstance(payload, dict):
                      print("unknown")
                  else:
                      print(payload.get("status") or "unknown")
              except (OSError, json.JSONDecodeError):
                  print("unknown")
          PY
          )"
          # Only commit state after a real successful post.  Dry-run, skipped, and
          # failed runs must not advance the tweet-guard state — the Python script
          # already guarantees this (state files are only written at section 12,
          # after a successful X API call), but we add an explicit gate here so the
          # commit step is never triggered for non-post outcomes.
          if [ "$RESULT_STATUS" != "posted" ]; then
            echo "runtime result status=$RESULT_STATUS (not 'posted'); skipping state commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -f data/last_gold_price.json ] || [ -f data/last_tweet_state.json ]; then
            git add data/last_gold_price.json data/last_tweet_state.json || true
            git diff --cached --quiet || git commit -m "chore: update gold tweet state [skip ci]"
            git push || {
              echo "ERROR: git push failed after successful X post!"
              echo "Recovery: The tweet was posted to X but the state file could not be committed."
              echo "  Run ID:  ${GITHUB_RUN_ID:-unknown}"
              echo "  Run URL: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
              echo "  Action:  Manually update data/last_tweet_state.json with the latest post hash,"
              echo "           or the duplicate guard may re-post or block the next run."
              exit 1
            }
          else
            echo "tweet state files not found, skipping commit."
          fi

      - name: Commit observability fallback files
        if: always()
        env:
          X_AUTOMATION_RUNS_FILE:      ${{ github.workspace }}/data/automation_runs.json
          X_AUTOMATION_POSTS_FILE:     ${{ github.workspace }}/data/tweet_posts.json
          X_AUTOMATION_FAILURES_FILE:  ${{ github.workspace }}/data/tweet_failures.json
        run: |
          set -euo pipefail
          OBS_FILES=("$X_AUTOMATION_RUNS_FILE" "$X_AUTOMATION_POSTS_FILE" "$X_AUTOMATION_FAILURES_FILE")
          EXISTING_FILES=()
          for f in "${OBS_FILES[@]}"; do
            if [ -f "$f" ]; then
              EXISTING_FILES+=("$f")
            else
              echo "observability fallback file not found (skipping): $f"
            fi
          done
          if [ "${#EXISTING_FILES[@]}" -eq 0 ]; then
            echo "no observability fallback files found; skipping commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${EXISTING_FILES[@]}"
          if git diff --cached --quiet; then
            echo "no observability fallback file changes to commit."
            exit 0
          fi
          git commit -m "chore(data): update x automation observability logs [skip ci]"
          git push || {
            echo "ERROR: git push failed after observability file update."
            echo "  Run ID:  ${GITHUB_RUN_ID:-unknown}"
            echo "  Run URL: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo "  Common causes: concurrent workflow push, temporary remote failure, or branch protection mismatch."
            echo "  Recovery: rerun this workflow after checking branch protections and recent commits on the branch."
            exit 1
          }

      - name: Operator run summary
        if: always()
        env:
          GITHUB_EVENT_NAME_VAR:  ${{ github.event_name }}
          GITHUB_ACTOR_VAR:       ${{ github.actor }}
          POST_INTENT_INPUT:      ${{ github.event.inputs.post_intent || 'must_post' }}
          DRY_RUN_INPUT:          ${{ github.event.inputs.dry_run || 'false' }}
          FORCE_POST_INPUT:       ${{ github.event.inputs.force_post || 'false' }}
          SOURCE_INPUT:           ${{ github.event.inputs.source || 'scheduled' }}
          REFRESH_PRICE_FIRST_INPUT: ${{ github.event.inputs.refresh_price_first || 'false' }}
          ALLOW_SAME_PRICE_INPUT: ${{ github.event.inputs.allow_same_price_closed_market_repost || 'false' }}
          TRIGGER_NONCE_INPUT:    ${{ github.event.inputs.trigger_nonce || '' }}
          POST_GOLD_RESULT_PATH:  ${{ runner.temp }}/post-gold-result.json
          POST_GOLD_REPORT_PATH:  ${{ runner.temp }}/post-gold-report.md
        run: |
          {
            echo "### 🏅 Post Gold — Run Summary"
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| event | \`$GITHUB_EVENT_NAME_VAR\` |"
            echo "| actor | \`$GITHUB_ACTOR_VAR\` |"
            echo "| post_intent | \`$POST_INTENT_INPUT\` |"
            echo "| dry_run | \`$DRY_RUN_INPUT\` |"
            echo "| force_post | \`$FORCE_POST_INPUT\` |"
            echo "| source | \`$SOURCE_INPUT\` |"
            echo "| refresh_price_first | \`$REFRESH_PRICE_FIRST_INPUT\` |"
            echo "| allow_same_price_closed_market_repost | \`$ALLOW_SAME_PRICE_INPUT\` |"
            echo "| trigger_nonce | \`${TRIGGER_NONCE_INPUT:-none}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
          python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          import os
          from pathlib import Path

          path = Path(os.environ["POST_GOLD_RESULT_PATH"])
          if not path.exists():
              print("\n### Runtime outcome\nNo structured runtime outcome file was written.")
          else:
              try:
                  payload = json.loads(path.read_text(encoding="utf-8"))
              except (OSError, json.JSONDecodeError) as exc:
                  print("\n### Runtime outcome")
                  print(f"Best-effort summary unavailable: `{type(exc).__name__}: {exc}`")
              else:
                  if not isinstance(payload, dict):
                      print("\n### Runtime outcome")
                      print("Best-effort summary unavailable: runtime outcome payload was not a JSON object.")
                  else:
                      print("\n### Runtime outcome")
                      print("| Field | Value |")
                      print("| --- | --- |")
                      ordered_fields = [
                          "created_at",
                          "outcome",
                          "status",
                          "status_bucket",
                          "post_type",
                          "template_used",
                          "run_id",
                          "dry_run",
                          "force_post",
                          "post_intent",
                          "market_open",
                          "price_source",
                          "price_freshness",
                          "duplicate_guard_result",
                          "price_usd_oz",
                          "tweet_length",
                          "content_hash",
                          "state_hash",
                          "tweet_id",
                          "skip_reason",
                          "error_summary",
                          "operator_action",
                          "reset_date",
                          "retry_after_seconds",
                          "trigger_source",
                          "trigger_nonce",
                          "detail",
                      ]
                      for key in ordered_fields:
                          value = payload.get(key)
                          if value in (None, ""):
                              continue
                          print(f"| {key} | `{value}` |")
          PY
          if [ -f "$POST_GOLD_REPORT_PATH" ]; then
            {
              echo ""
              cat "$POST_GOLD_REPORT_PATH"
            } >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Upload post-gold observability artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: post-gold-observability-${{ github.run_id }}-${{ github.run_attempt }}
          retention-days: 14
          if-no-files-found: warn
          path: |
            ${{ runner.temp }}/post-gold-result.json
            ${{ runner.temp }}/post-gold-report.md
            ${{ github.workspace }}/data/automation_runs.json
            ${{ github.workspace }}/data/tweet_posts.json
            ${{ github.workspace }}/data/tweet_failures.json
