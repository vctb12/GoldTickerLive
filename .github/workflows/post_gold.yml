name: Post Gold Price to X (Python)

on:
  schedule:
    # Runs every 3 hours to avoid overlap with the Node.js hourly workflow
    - cron: '30 */3 * * *'
  # Allow manual trigger from Actions tab (for testing)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  post:
    name: Post gold price to X / Twitter (Python)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests tweepy

      - name: Run posting script
        env:
          GOLD_API_KEY:                ${{ secrets.GOLD_API_KEY }}
          TWITTER_API_KEY:             ${{ secrets.CONSUMER_KEY }}
          TWITTER_API_SECRET:          ${{ secrets.CONSUMER_SECRET }}
          TWITTER_ACCESS_TOKEN:        ${{ secrets.ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.ACCESS_TOKEN_SECRET }}
        run: python scripts/post_gold_price.py
