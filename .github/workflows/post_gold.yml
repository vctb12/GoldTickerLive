# ------------------------------------------------------------------
# Post Gold Price to X — informational social-posting bot. Runs every
# 6 minutes while global gold markets are open and posts only when the
# committed spot price changes. Requires `contents: write` because it
# rotates a small state file commit.
# NOT a required merge gate.
# ------------------------------------------------------------------
name: Post Gold Price to X (Python)

on:
  schedule:
    - cron: '0 21 * * 0'       # Market OPEN  — Sun 9PM UTC = Mon 1AM UAE
    - cron: '6-59/6 21 * * 0'  # Every 6 min after Sunday open
    - cron: '*/6 22-23 * * 0'  # Sunday evening UTC
    - cron: '*/6 * * * 1-4'    # Every 6 min Mon–Thu
    - cron: '*/6 0-20 * * 5'   # Every 6 min Friday until close hour
    - cron: '0 21 * * 5'       # Market CLOSE — Fri 9PM UTC = Sat 1AM UAE
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  # Serialize tweet runs so two crons can't race on the state-file commit.
  group: post-gold
  cancel-in-progress: false

jobs:
  post:
    name: Post gold price to X / Twitter (Python)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scripts/python/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/python/requirements.txt

      - name: Run posting script
        env:
          TWITTER_API_KEY:             ${{ secrets.CONSUMER_KEY }}
          TWITTER_API_SECRET:          ${{ secrets.CONSUMER_SECRET }}
          TWITTER_ACCESS_TOKEN:        ${{ secrets.ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.ACCESS_TOKEN_SECRET }}
          GITHUB_EVENT_SCHEDULE:       ${{ github.event.schedule }}
        run: |
          python scripts/python/post_gold_price.py
          echo "Exit code: $?"

      - name: Commit last price state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -f data/last_gold_price.json ]; then
            git add data/last_gold_price.json
            git diff --cached --quiet || git commit -m "chore: update gold price state [skip ci]"
            git push
          else
            echo "data/last_gold_price.json not found, skipping commit."
          fi
