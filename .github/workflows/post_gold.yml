name: Post Gold Price to X (Python)

on:
  schedule:
    - cron: '0 4-18 * * 1-5'  # Hourly 8AM–10PM UAE, Mon–Fri (market open hours only)
    - cron: '0 21 * * 0'       # Market OPEN  — Sun 9PM UTC = Mon 1AM UAE
    - cron: '0 21 * * 5'       # Market CLOSE — Fri 9PM UTC = Sat 1AM UAE
  workflow_dispatch:

permissions:
  contents: read

jobs:
  post:
    name: Post gold price to X / Twitter (Python)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests tweepy

      - name: Run posting script
        env:
          GOLD_API_KEY:                ${{ secrets.GOLD_API_KEY }}
          TWITTER_API_KEY:             ${{ secrets.CONSUMER_KEY }}
          TWITTER_API_SECRET:          ${{ secrets.CONSUMER_SECRET }}
          TWITTER_ACCESS_TOKEN:        ${{ secrets.ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.ACCESS_TOKEN_SECRET }}
        run: |
          python scripts/python/post_gold_price.py
          echo "Exit code: $?"
