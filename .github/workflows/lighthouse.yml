# ------------------------------------------------------------------
# Lighthouse CI — informational performance scan.
# Manual-only (`workflow_dispatch`); reports Core Web Vitals to the
# LHCI temporary public storage. NOT a required merge gate.
# Tier: informational scan
# ------------------------------------------------------------------
name: Lighthouse CI

on:
  workflow_dispatch:

# Manual best-effort performance reporting — no write scope required.
permissions:
  contents: read

concurrency:
  group: lighthouse
  cancel-in-progress: true

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    # Lighthouse runs are bounded; hard timeout prevents hung preview servers from
    # tying up minutes indefinitely.
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Start preview server
        run: |
          nohup npm run preview -- --port 4173 > /tmp/preview.log 2>&1 &
          sleep 5

      - name: Install LHCI
        run: npm install -g @lhci/cli@0.11

      - name: Run LHCI autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx @lhci/cli autorun --collect.url=http://localhost:4173 --upload.target=temporary-public-storage

      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: lighthouse-report
          path: .lighthouseci/
          retention-days: 30
