# ------------------------------------------------------------------
# Lighthouse CI — informational performance scan.
# Manual (`workflow_dispatch`) or UI-heavy PRs; reads `lighthouserc.json`.
# Reports Core Web Vitals to LHCI temporary public storage. NOT a merge gate.
# Tier: informational scan
# ------------------------------------------------------------------
name: Lighthouse CI

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - '**.html'
      - 'styles/**'
      - 'src/**'
      - 'lighthouserc.json'
      - '.github/workflows/lighthouse.yml'

# Manual best-effort performance reporting — no write scope required.
permissions:
  contents: read

concurrency:
  group: lighthouse
  cancel-in-progress: true

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    # Lighthouse runs are bounded; hard timeout prevents hung preview servers from
    # tying up minutes indefinitely.
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Use Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Start preview server
        run: |
          nohup npm run preview -- --port 4173 > /tmp/preview.log 2>&1 &
          sleep 5

      - name: Install LHCI
        run: npm install -g @lhci/cli@0.11

      - name: Run LHCI autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: lhci autorun

      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: lighthouse-report
          path: .lighthouseci/
          retention-days: 30
