# ------------------------------------------------------------------
# PR Provider Smoke — pre-merge, in-PR, one-round provider smoke
# test.
#
# Why this exists in addition to ``test-gold-providers.yml``:
#
#   GitHub only exposes a ``workflow_dispatch`` "Run workflow" button
#   in the Actions UI for workflow files that exist on the
#   repository's **default branch**. A brand-new dispatch-only
#   workflow living on a feature branch is not visible from the UI
#   until merge, which makes it useless as a pre-merge smoke test.
#
#   This workflow uses ``pull_request`` triggers so it appears as a
#   regular PR check (under "Checks") and can be re-run from there
#   on every PR push, no merge required.
#
# Hard safety contract:
#   * NEVER posts to X (Twitter secrets are not even referenced).
#   * NEVER commits anything (`permissions: contents: read`).
#   * NEVER logs raw provider response bodies (``BAKEOFF_LOG_RAW``
#     stays unset; only sha256 hashes of parsed bodies are recorded).
#   * Provider ``*_ENABLED=true`` flags are scoped to *this* job's
#     env block only — they never reach production workflows.
#   * If a provider secret is missing, its adapter returns a clean
#     ``missing_api_key`` row and the run still succeeds.
#   * If GitHub does not expose secrets for this PR (e.g. PR from a
#     fork), the smoke step prints a clear skip message and the job
#     exits 0 instead of failing the check.
#
# What it does NOT do:
#   * Does NOT pick a provider winner.
#   * Does NOT activate the new orchestrator.
#   * Does NOT touch ``post_gold.yml`` / ``gold-price-fetch.yml``.
#   * Does NOT replace the 24h+ bakeoff — that still runs separately
#     once the workflow files land on the default branch.
# ------------------------------------------------------------------
name: PR Provider Smoke

on:
  pull_request:
    paths:
      - "scripts/python/gold_providers/**"
      - "scripts/python/provider_bakeoff.py"
      - "scripts/python/provider_scorecard.py"
      - "scripts/python/gold_bakeoff_readiness.py"
      - "scripts/python/requirements.txt"
      - ".github/workflows/pr-provider-smoke.yml"
      - ".github/workflows/test-gold-providers.yml"
      - ".github/workflows/gold-provider-bakeoff.yml"
      - ".github/workflows/gold-bakeoff-readiness.yml"
      - "docs/OWNER_ACTIONS_REQUIRED_GOLD_BAKEOFF.md"
      - "docs/operator-inputs-gold-provider-bakeoff.md"
      - "docs/gold-price-provider-bakeoff.md"
  workflow_dispatch:
    inputs:
      providers:
        description: "Comma-separated provider names (blank = all known/enabled)."
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: pr-provider-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: One-round provider smoke (PR check)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scripts/python/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/python/requirements.txt

      - name: Detect provider secret availability
        id: detect
        env:
          # Fork PRs and first-time-contributor PRs do not receive
          # repository secrets. We probe a single representative key
          # to decide whether to attempt real provider calls.
          PROBE_TWELVEDATA: ${{ secrets.TWELVEDATA_API_KEY }}
          PROBE_FINNHUB: ${{ secrets.FINNHUB_API_KEY }}
          PROBE_FMP: ${{ secrets.FMP_API_KEY }}
          PROBE_GOLDAPI_IO: ${{ secrets.GOLDAPI_IO_KEY }}
          PROBE_GOLDPRICEZ: ${{ secrets.GOLDPRICEZ_API_KEY }}
          PROBE_METAL_SENTINEL: ${{ secrets.METAL_SENTINEL_API_KEY }}
        run: |
          set -euo pipefail
          have_any=false
          for v in "$PROBE_TWELVEDATA" "$PROBE_FINNHUB" "$PROBE_FMP" \
                   "$PROBE_GOLDAPI_IO" "$PROBE_GOLDPRICEZ" "$PROBE_METAL_SENTINEL"; do
            if [ -n "$v" ]; then have_any=true; fi
          done
          echo "have_secrets=$have_any" >> "$GITHUB_OUTPUT"
          if [ "$have_any" = "false" ]; then
            echo "::notice::No provider secrets exposed to this PR context (likely a fork PR or first-time contributor). Smoke will skip provider calls."
          fi

      - name: Run one-round smoke (real providers)
        if: steps.detect.outputs.have_secrets == 'true'
        env:
          # Provider keys — each adapter reads its own env vars, and
          # absent keys produce a clean ``missing_api_key`` row, not
          # a workflow failure.
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY }}
          TWELVEDATA_SYMBOL: ${{ secrets.TWELVEDATA_SYMBOL }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          FINNHUB_SYMBOL: ${{ secrets.FINNHUB_SYMBOL }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          FMP_SYMBOL: ${{ secrets.FMP_SYMBOL }}
          GOLDAPI_IO_KEY: ${{ secrets.GOLDAPI_IO_KEY }}
          GOLDPRICEZ_API_KEY: ${{ secrets.GOLDPRICEZ_API_KEY }}
          METAL_SENTINEL_API_KEY: ${{ secrets.METAL_SENTINEL_API_KEY }}
          METAL_SENTINEL_API_HOST: ${{ secrets.METAL_SENTINEL_API_HOST }}
          METAL_SENTINEL_ENDPOINT: ${{ secrets.METAL_SENTINEL_ENDPOINT }}
          # Provider enable flags scoped to THIS smoke job only.
          # These do not propagate to ``post_gold.yml`` or any other
          # production workflow.
          TWELVEDATA_ENABLED: "true"
          FINNHUB_ENABLED: "true"
          FMP_ENABLED: "true"
          GOLDAPI_IO_ENABLED: "true"
          GOLDPRICEZ_ENABLED: "true"
          METAL_SENTINEL_ENABLED: "true"
          # Raw bodies are NEVER logged from this workflow. Hard-coded
          # to keep upstream payloads out of CI logs and artifacts.
          BAKEOFF_LOG_RAW: "false"
          # Provider ordering for this single round.
          GOLD_PROVIDER_ORDER: ${{ inputs.providers || 'twelvedata_xauusd,finnhub_oanda,fmp_gcusd,goldapi_io,metal_sentinel,goldpricez' }}
        run: |
          set -euo pipefail
          mkdir -p out
          PROVIDERS="${{ inputs.providers || 'twelvedata_xauusd,finnhub_oanda,fmp_gcusd,goldapi_io,metal_sentinel,goldpricez' }}"
          python scripts/python/provider_bakeoff.py \
            --once \
            --providers "$PROVIDERS" \
            --output ./out/provider_bakeoff_log.jsonl \
            --write-scorecard \
            --scorecard-output ./out/provider_scorecard.json
          python scripts/python/provider_scorecard.py \
            --input ./out/provider_bakeoff_log.jsonl \
            --output ./out/provider_scorecard.json || true

      - name: Print skip notice (no secrets in PR context)
        if: steps.detect.outputs.have_secrets != 'true'
        run: |
          mkdir -p out
          cat <<'EOF' | tee out/SKIPPED.txt
          Provider secrets unavailable in this PR context; run local
          smoke test or wait until workflow exists on default branch.

          Local smoke test (replace placeholders, never commit values):

            export TWELVEDATA_API_KEY=...
            export TWELVEDATA_ENABLED=true
            export FINNHUB_API_KEY=...
            export FINNHUB_ENABLED=true
            python scripts/python/provider_bakeoff.py --once \
              --providers twelvedata_xauusd,finnhub_oanda
            python scripts/python/provider_scorecard.py
          EOF

      - name: Summarize result
        if: always()
        run: |
          set -euo pipefail
          {
            echo "## PR Provider Smoke"
            echo
            if [ -f out/provider_scorecard.json ]; then
              echo "Smoke ran against real providers. Per-provider summary:"
              echo
              echo '```json'
              # Trim potentially large arrays; show top-level scorecard only.
              python -c "import json,sys; d=json.load(open('out/provider_scorecard.json')); print(json.dumps({k:v for k,v in d.items() if k!='samples'}, indent=2)[:4000])" || cat out/provider_scorecard.json | head -c 4000
              echo
              echo '```'
            else
              echo "Smoke skipped (no provider secrets in this PR context). See artifact \`SKIPPED.txt\`."
            fi
            echo
            echo "_No commit. No X post. No raw provider bodies. No production change._"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload sanitized smoke artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: pr-provider-smoke-${{ github.run_id }}
          path: out/
          retention-days: 7
          if-no-files-found: ignore
