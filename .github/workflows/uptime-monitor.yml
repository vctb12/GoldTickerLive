# ------------------------------------------------------------------
# Uptime Monitor — informational. Pings public site every 30 min.
# NOT a required merge gate.
# ------------------------------------------------------------------
name: Uptime Monitor

on:
  schedule:
    # Every 30 minutes
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: uptime-monitor
  cancel-in-progress: true

jobs:
  ping:
    name: Ping site and alert on failure
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Check site availability
        env:
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SITE_URL: 'https://goldtickerlive.com/'
        run: node scripts/node/uptime-check.js
