name: Telegram Gold Price Bot

on:
  schedule:
    # Posts at 07:00, 12:00, 18:00 UTC (= 11:00, 16:00, 22:00 Dubai)
    - cron: '0 7,12,18 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  post:
    name: Post gold price to Telegram channel
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Post to Telegram
        env:
          GOLD_API_KEY:        ${{ secrets.GOLD_API_KEY }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: node scripts/notify-telegram.js
