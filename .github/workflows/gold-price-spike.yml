name: Gold Price Spike Alert

on:
  schedule:
    # Check every hour to detect >2% intra-day moves
    - cron: '30 * * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    name: Check for gold price spike
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Check for spike and alert
        env:
          GOLD_API_KEY:                ${{ secrets.GOLD_API_KEY }}
          TELEGRAM_BOT_TOKEN:          ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID:         ${{ secrets.TELEGRAM_CHANNEL_ID }}
          DISCORD_WEBHOOK_URL:         ${{ secrets.DISCORD_WEBHOOK_URL }}
          TWITTER_API_KEY:             ${{ secrets.CONSUMER_KEY }}
          TWITTER_API_SECRET:          ${{ secrets.CONSUMER_SECRET }}
          TWITTER_ACCESS_TOKEN:        ${{ secrets.ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.ACCESS_TOKEN_SECRET }}
          SPIKE_THRESHOLD_PCT:         "2.0"
        run: node scripts/node/price-spike-alert.js
