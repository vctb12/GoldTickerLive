name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  validate-and-build:
    name: Validate & Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # Test-only secrets (never used in production); required by tests/auth.test.js
      # and server/lib/auth.js startup guard. Real values live in deployment secrets.
      JWT_SECRET: ci-test-secret-do-not-use-in-production
      ADMIN_PASSWORD: ci-test-password-do-not-use-in-production
      ADMIN_ACCESS_PIN: '000000'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high || true

      - name: Pre-build validation
        run: npm run validate

      - name: Code quality (lint + format + stylelint)
        run: npm run quality

      - name: Run unit tests
        run: npm test

      - name: Production build
        run: NODE_ENV=production npm run build

      - name: Verify dist output
        run: |
          if [ ! -f dist/index.html ]; then
            echo "::error::dist/index.html is missing after build"
            exit 1
          fi
          echo "Build output size:"
          du -sh dist/
          echo "HTML files generated: $(find dist -name '*.html' | wc -l)"

      - name: Run link-check
        run: node scripts/node/check-links.js --dir dist --fail-on-error || true

      - name: Upload build artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 7

  e2e:
    name: Playwright smoke
    runs-on: ubuntu-latest
    needs: validate-and-build
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Production build
        run: NODE_ENV=production npm run build

      - name: Serve dist and run E2E tests
        run: |
          # Copy country leaf pages (excluded from Vite build, served as-is in deploy)
          cp -r countries dist/
          python3 -m http.server 8080 --directory dist &
          sleep 2
          npx playwright test --config=playwright.config.js --project=chromium

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  link-check:
    name: Nightly link check
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Production build
        run: NODE_ENV=production npm run build

      - name: Check links
        run: node scripts/node/check-links.js --dir dist --fail-on-error || true
