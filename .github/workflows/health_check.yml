# ------------------------------------------------------------------
# Daily Health Check — informational. Smoke-tests key public URLs
# + upstream API availability. NOT a required merge gate.
# ------------------------------------------------------------------
name: Daily Health Check

on:
  schedule:
    # Daily at 04:00 UTC = 08:00 GST (morning in the Gulf)
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: health-check
  cancel-in-progress: true

jobs:
  health:
    name: Verify system health
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-poster-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-poster-

      - name: Install dependencies
        run: pip install -r scripts/python/requirements.txt

      - name: Run health check
        env:
          POST_MODE: health_check
          TWITTER_API_KEY: ${{ secrets.CONSUMER_KEY }}
          TWITTER_API_SECRET: ${{ secrets.CONSUMER_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.ACCESS_TOKEN_SECRET }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/python/gold_poster.py
