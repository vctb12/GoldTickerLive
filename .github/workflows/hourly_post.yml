name: Hourly Gold Price Post

on:
  schedule:
    # Every hour at minute 0 (UTC)
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  post:
    name: Post hourly gold price to X
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-poster-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-poster-

      - name: Install dependencies
        run: pip install requests tweepy supabase

      - name: Run gold poster (hourly mode)
        env:
          POST_MODE: hourly
          GOLD_API_KEY: ${{ secrets.GOLD_API_KEY }}
          TWITTER_API_KEY: ${{ secrets.CONSUMER_KEY }}
          TWITTER_API_SECRET: ${{ secrets.CONSUMER_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.ACCESS_TOKEN_SECRET }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/gold_poster.py
