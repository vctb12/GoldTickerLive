# ------------------------------------------------------------------
# Link Check — focused internal link audit on built dist/.
# Complements link steps in ci.yml with path-filtered PR runs and a
# dedicated nightly schedule. Tier 2 — informational on PRs; nightly
# job uploads artifacts for triage.
# Tier: informational scan
# ------------------------------------------------------------------
name: Link Check

on:
  pull_request:
    branches: [main]
    paths:
      - '**.html'
      - 'content/**'
      - 'countries/**'
      - 'src/**'
      - 'styles/**'
      - 'scripts/node/check-links.js'
      - 'scripts/node/enforce-linkcheck.js'
      - 'scripts/node/stage-dist-statics.js'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:
  schedule:
    # 04:00 UTC daily — offset from ci.yml nightly (03:00 UTC)
    - cron: '0 4 * * *'

permissions:
  contents: read

concurrency:
  group: link-check-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  link-check:
    name: Build + audit links
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Production build
        run: NODE_ENV=production npm run build

      - name: Check links (check-links.js)
        run: node scripts/node/check-links.js --dir dist --fail-on-error || true

      - name: Run linkinator
        run: npm run linkcheck:dist

      - name: Enforce internal link baseline
        if: github.event_name != 'pull_request'
        run: node scripts/node/enforce-linkcheck.js reports/links-dist.json

      - name: Upload link-check report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: link-check-report-${{ github.run_id }}
          path: reports/
          retention-days: 30
