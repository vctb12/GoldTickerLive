# ------------------------------------------------------------------
# Gold Provider Bakeoff — repeatedly samples every configured
# provider, logs JSONL rows to data/provider_bakeoff_log.jsonl, and
# regenerates the scorecard.
#
# Strategy:
#   * Manual: workflow_dispatch with smoke / micro / custom modes.
#     Default = one round smoke so a single click is safe. Micro mode
#     runs 50–90 minutes (default 60) at 6-minute intervals so we can
#     gather quick evidence without waiting 24h.
#
# X is NEVER posted from this workflow. Raw response bodies are
# NEVER logged (BAKEOFF_LOG_RAW is hard-pinned to "false"). By
# default the JSONL log + scorecard are uploaded as artifacts only;
# commit the scorecard back to git only when explicitly requested
# via the ``commit_results`` input.
#
# Production (``gold-price-fetch.yml`` → ``data/gold_price.json`` →
# ``post_gold.yml``) is intentionally untouched: this workflow only
# samples providers and stores artifacts. A separate cutover PR is
# required to switch production off the legacy GoldPriceZ path.
# ------------------------------------------------------------------
name: Gold Provider Bakeoff

on:
  workflow_dispatch:
    inputs:
      providers:
        description: "Comma-separated provider names (blank = all known/enabled). Scheduled runs auto-pin the smoke-passing trio: goldapi_io,twelvedata_xauusd,fmp_gcusd"
        required: false
        default: ""
      mode:
        description: "smoke = one round, micro = 50-90 minute artifact-only run at 6-minute intervals, custom = use duration_hours/interval_seconds as entered."
        required: false
        default: "smoke"
      duration_minutes:
        description: "Used by mode=micro. Clamped to 50-90 minutes. Default 60."
        required: false
        default: "60"
      duration_hours:
        description: "Total runtime in hours (0 = single round). Hosted runners cap at 6h per run; scheduled runs use 0.83h chunks (~50 min) and accumulate via artifact restore across hourly runs."
        required: false
        default: "0"
      interval_seconds:
        description: "Seconds between rounds when duration_hours > 0. Default 360 (6 min) so each provider gets ~10 samples/hour without burning quotas."
        required: false
        default: "360"
      commit_results:
        description: "Commit scorecard + JSONL back to the branch. Default false — the rolling artifact is the canonical store. Only set true for a specific tracked snapshot."
        required: false
        default: "false"

permissions:
  contents: read

concurrency:
  group: gold-provider-bakeoff
  cancel-in-progress: false

jobs:
  bakeoff:
    name: Run bakeoff round(s)
    runs-on: ubuntu-latest
    # Hard cap below the 6h hosted-runner soft ceiling so even a
    # mistakenly-long manual run terminates safely.
    timeout-minutes: 350
    permissions:
      # ``actions: read`` is required so the "Restore previous
      # bakeoff log" step can call ``gh run download`` against the
      # most recent successful run of this workflow.
      actions: read
      # GitHub Actions does not allow runtime contexts inside
      # ``permissions`` values, so keep this static; the guarded commit
      # step below is still opt-in via ``commit_results``.
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scripts/python/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/python/requirements.txt

      - name: Run bakeoff
        env:
          # Provider API keys come from secrets. Anything not
          # configured cleanly returns ``provider_disabled`` and is
          # skipped — no fatal failure.
          METAL_SENTINEL_API_KEY: ${{ secrets.METAL_SENTINEL_API_KEY }}
          METAL_SENTINEL_API_HOST: ${{ secrets.METAL_SENTINEL_API_HOST }}
          METAL_SENTINEL_ENDPOINT: ${{ secrets.METAL_SENTINEL_ENDPOINT }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          FINNHUB_SYMBOL: ${{ secrets.FINNHUB_SYMBOL }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          FMP_SYMBOL: ${{ secrets.FMP_SYMBOL }}
          GOLDAPI_IO_KEY: ${{ secrets.GOLDAPI_IO_KEY }}
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY }}
          TWELVEDATA_SYMBOL: ${{ secrets.TWELVEDATA_SYMBOL }}
          GOLDPRICEZ_API_KEY: ${{ secrets.GOLDPRICEZ_API_KEY }}
          # gold-api.com — no key required per provider docs, but one
          # can be supplied. Hard-disabled by default (previous
          # production failure; needs fresh bakeoff before re-enabling).
          # To test manually: pass ``gold_api_com`` in the providers
          # input and set GOLD_API_COM_ENABLED=true as a repo secret.
          GOLD_API_COM_ENABLED: ${{ secrets.GOLD_API_COM_ENABLED || 'false' }}
          GOLD_API_COM_KEY: ${{ secrets.GOLD_API_COM_KEY }}
          # Provider enable flags scoped to THIS bakeoff workflow
          # only. These literals do NOT propagate to
          # ``gold-price-fetch.yml`` / ``post_gold.yml`` or any other
          # production workflow — production stays on the legacy
          # GoldPriceZ path until a separate cutover PR is merged.
          # The smoke-passing candidate trio is hard-enabled. The
          # smoke-failing providers stay off so we don't burn quota
          # on known-broken endpoints during scheduled accumulation.
          GOLDAPI_IO_ENABLED: "true"
          TWELVEDATA_ENABLED: "true"
          FMP_ENABLED: "true"
          FINNHUB_ENABLED: "false"
          METAL_SENTINEL_ENABLED: "false"
          GOLDPRICEZ_ENABLED: "false"
          # Raw bodies are NEVER logged from this workflow. Hard-pinned
          # to keep upstream payloads out of CI logs and artifacts.
          BAKEOFF_LOG_RAW: "false"
        run: |
          set -euo pipefail
          EVENT="${{ github.event_name }}"
          MODE="${{ github.event.inputs.mode || 'smoke' }}"
          DURATION_MINUTES="${{ github.event.inputs.duration_minutes || '60' }}"
          DURATION="${{ github.event.inputs.duration_hours || '0' }}"
          INTERVAL="${{ github.event.inputs.interval_seconds || '360' }}"
          PROVIDERS="${{ github.event.inputs.providers || '' }}"

          if [ "$MODE" = "micro" ]; then
            if [ -z "$PROVIDERS" ]; then
              PROVIDERS="goldapi_io,twelvedata_xauusd,fmp_gcusd"
            fi
            if ! printf '%s' "$DURATION_MINUTES" | grep -Eq '^[0-9]+$'; then
              DURATION_MINUTES="60"
            fi
            if [ "$DURATION_MINUTES" -lt 50 ]; then
              DURATION_MINUTES="50"
            elif [ "$DURATION_MINUTES" -gt 90 ]; then
              DURATION_MINUTES="90"
            fi
            DURATION="$(python - <<PY
minutes = int("${DURATION_MINUTES}")
print(f"{minutes / 60:.4f}")
PY
)"
            INTERVAL="360"
          fi

          echo "mode=$MODE"
          echo "providers=$PROVIDERS"
          echo "duration_hours=$DURATION"
          echo "interval_seconds=$INTERVAL"
          ARGS=(--providers "$PROVIDERS" --interval-seconds "$INTERVAL" --write-scorecard)
          if [ "$DURATION" = "0" ] || [ -z "$DURATION" ]; then
            ARGS+=(--once)
          else
            ARGS+=(--duration-hours "$DURATION")
          fi
          python scripts/python/provider_bakeoff.py "${ARGS[@]}"

      - name: Summarize bakeoff mode
        if: always()
        run: |
          set -euo pipefail
          LOG_PATH="data/provider_bakeoff_log.jsonl"
          SCORECARD_PATH="data/provider_scorecard.json"
          {
            echo "## Gold Provider Bakeoff"
            echo
            echo "- Mode: `${{ github.event.inputs.mode || 'smoke' }}`"
            echo "- Providers: `${{ github.event.inputs.providers || 'auto/default selection' }}`"
            echo "- Interval seconds: `${{ github.event.inputs.interval_seconds || '360' }}`"
            echo "- Commit results: `${{ github.event.inputs.commit_results || 'false' }}`"
            echo "- Posting: `disabled`"
            echo "- Storage default: `artifacts only`"
            if [ -f "$LOG_PATH" ]; then
              echo "- Sample rows in current artifact: `$(wc -l < "$LOG_PATH")`"
            fi
            if [ -f "$SCORECARD_PATH" ]; then
              echo
              echo '```json'
              python -c "import json; d=json.load(open('$SCORECARD_PATH')); print(json.dumps({k:v for k,v in d.items() if k!='providers'}, indent=2))"
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload bakeoff artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: gold-provider-bakeoff-${{ github.run_id }}
          path: |
            data/provider_bakeoff_log.jsonl
            data/provider_scorecard.json
          retention-days: 30

      - name: Commit results (opt-in)
        if: github.event.inputs.commit_results == 'true'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/provider_bakeoff_log.jsonl data/provider_scorecard.json || true
          if git diff --cached --quiet; then
            echo "No bakeoff changes to commit."
          else
            git commit -m "chore: update gold provider bakeoff log + scorecard [skip ci]"
            git push
          fi
