# ------------------------------------------------------------------
# Gold Provider Bakeoff — repeatedly samples every configured
# provider, logs JSONL rows to data/provider_bakeoff_log.jsonl, and
# regenerates the scorecard.
#
# Strategy:
#   * Manual: workflow_dispatch with duration_hours / interval_seconds
#     inputs. Default = one round so a single click is safe.
#   * Scheduled: every hour we grab one sample per provider. This
#     gives ~24 datapoints/provider/day without leaning on a
#     long-running 24h job (which is risky on hosted runners).
#
# X is NOT posted to. By default the JSONL log + scorecard are
# uploaded as artifacts only; commit the scorecard back to git only
# when the user asks for it via the ``commit_results`` input.
# ------------------------------------------------------------------
name: Gold Provider Bakeoff

on:
  workflow_dispatch:
    inputs:
      providers:
        description: "Comma-separated provider names (blank = all known)"
        required: false
        default: ""
      duration_hours:
        description: "Total runtime in hours (0 = single round)"
        required: false
        default: "0"
      interval_seconds:
        description: "Seconds between rounds when duration_hours > 0"
        required: false
        default: "360"
      commit_results:
        description: "Commit scorecard + JSONL back to the branch"
        required: false
        default: "false"
  schedule:
    # Hourly single-round sample, offset away from minute 0 (where
    # GitHub Actions schedules see the most starvation/dropping).
    - cron: "11 * * * *"

permissions:
  contents: read

concurrency:
  group: gold-provider-bakeoff
  cancel-in-progress: false

jobs:
  bakeoff:
    name: Run bakeoff round(s)
    runs-on: ubuntu-latest
    # Hard cap below the 6h hosted-runner soft ceiling so even a
    # mistakenly-long manual run terminates safely.
    timeout-minutes: 350
    permissions:
      contents: ${{ github.event.inputs.commit_results == 'true' && 'write' || 'read' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scripts/python/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/python/requirements.txt

      - name: Run bakeoff
        env:
          METAL_SENTINEL_ENABLED: ${{ secrets.METAL_SENTINEL_ENABLED }}
          METAL_SENTINEL_API_KEY: ${{ secrets.METAL_SENTINEL_API_KEY }}
          METAL_SENTINEL_API_HOST: ${{ secrets.METAL_SENTINEL_API_HOST }}
          METAL_SENTINEL_ENDPOINT: ${{ secrets.METAL_SENTINEL_ENDPOINT }}
          FINNHUB_ENABLED: ${{ secrets.FINNHUB_ENABLED }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          FINNHUB_SYMBOL: ${{ secrets.FINNHUB_SYMBOL }}
          FMP_ENABLED: ${{ secrets.FMP_ENABLED }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          FMP_SYMBOL: ${{ secrets.FMP_SYMBOL }}
          GOLDAPI_IO_ENABLED: ${{ secrets.GOLDAPI_IO_ENABLED }}
          GOLDAPI_IO_KEY: ${{ secrets.GOLDAPI_IO_KEY }}
          TWELVEDATA_ENABLED: ${{ secrets.TWELVEDATA_ENABLED }}
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY }}
          TWELVEDATA_SYMBOL: ${{ secrets.TWELVEDATA_SYMBOL }}
          GOLDPRICEZ_API_KEY: ${{ secrets.GOLDPRICEZ_API_KEY }}
        run: |
          DURATION="${{ github.event.inputs.duration_hours || '0' }}"
          INTERVAL="${{ github.event.inputs.interval_seconds || '360' }}"
          PROVIDERS="${{ github.event.inputs.providers || '' }}"
          ARGS=(--providers "$PROVIDERS" --interval-seconds "$INTERVAL" --write-scorecard)
          if [ "$DURATION" = "0" ] || [ -z "$DURATION" ]; then
            ARGS+=(--once)
          else
            ARGS+=(--duration-hours "$DURATION")
          fi
          python scripts/python/provider_bakeoff.py "${ARGS[@]}"

      - name: Upload bakeoff artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: gold-provider-bakeoff-${{ github.run_id }}
          path: |
            data/provider_bakeoff_log.jsonl
            data/provider_scorecard.json
          retention-days: 30

      - name: Commit results (opt-in)
        if: github.event.inputs.commit_results == 'true'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/provider_bakeoff_log.jsonl data/provider_scorecard.json || true
          if git diff --cached --quiet; then
            echo "No bakeoff changes to commit."
          else
            git commit -m "chore: update gold provider bakeoff log + scorecard [skip ci]"
            git push
          fi
