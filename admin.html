<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gold Prices | Enterprise Admin Console</title>
    
    <!-- External Libraries (CDN for reliability) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* -------------------------------------------------------------------------- */
        /*                                 CORE STYLES                                */
        /* -------------------------------------------------------------------------- */
        :root {
            --bg-body: #0f172a;
            --bg-sidebar: #1e293b;
            --bg-card: #1e293b;
            --bg-input: #334155;
            --border-color: #334155;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #06b6d4;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --radius: 8px;
            --transition: all 0.2s ease-in-out;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-body); }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }

        /* Utilities */
        .hidden { display: none !important; }
        .flex { display: flex; }
        .flex-col { flex-direction: column; }
        .items-center { align-items: center; }
        .justify-between { justify-content: space-between; }
        .gap-2 { gap: 0.5rem; }
        .gap-4 { gap: 1rem; }
        .p-4 { padding: 1rem; }
        .text-sm { font-size: 0.875rem; }
        .text-xs { font-size: 0.75rem; }
        .font-bold { font-weight: 700; }
        .text-danger { color: var(--danger); }
        .text-success { color: var(--success); }
        .text-warning { color: var(--warning); }
        .w-full { width: 100%; }
        .h-full { height: 100%; }

        /* -------------------------------------------------------------------------- */
        /*                               LOGIN SCREEN                                 */
        /* -------------------------------------------------------------------------- */
        #login-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .login-box {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            padding: 2.5rem;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        .login-header { text-align: center; margin-bottom: 2rem; }
        .login-header h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; background: linear-gradient(to right, #3b82f6, #06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .login-header p { color: var(--text-secondary); font-size: 0.9rem; }

        .form-group { margin-bottom: 1.25rem; }
        .form-label { display: block; margin-bottom: 0.5rem; font-size: 0.875rem; font-weight: 500; color: var(--text-secondary); }
        .form-input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            color: var(--text-primary);
            font-size: 0.95rem;
            transition: var(--transition);
        }
        .form-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2); }
        
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.75rem 1.5rem;
            border-radius: var(--radius);
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: var(--transition);
            border: none;
            gap: 0.5rem;
        }
        .btn-primary { background: var(--accent); color: white; width: 100%; }
        .btn-primary:hover { background: var(--accent-hover); transform: translateY(-1px); }
        .btn-secondary { background: var(--bg-input); color: var(--text-primary); border: 1px solid var(--border-color); }
        .btn-secondary:hover { background: var(--border-color); }
        .btn-danger { background: var(--danger); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-sm { padding: 0.4rem 0.8rem; font-size: 0.8rem; }
        .btn-icon { padding: 0.5rem; border-radius: 50%; width: 32px; height: 32px; }

        /* -------------------------------------------------------------------------- */
        /*                                LAYOUT                                      */
        /* -------------------------------------------------------------------------- */
        #app-container { display: flex; width: 100%; height: 100%; opacity: 0; transition: opacity 0.5s ease; }
        #app-container.active { opacity: 1; }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
            z-index: 100;
        }
        .sidebar-header { padding: 1.5rem; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; gap: 0.75rem; }
        .sidebar-logo { width: 32px; height: 32px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; }
        .sidebar-nav { flex: 1; padding: 1rem; overflow-y: auto; }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            color: var(--text-secondary);
            text-decoration: none;
            border-radius: var(--radius);
            margin-bottom: 0.25rem;
            transition: var(--transition);
            cursor: pointer;
        }
        .nav-item:hover { background: rgba(255,255,255,0.05); color: var(--text-primary); }
        .nav-item.active { background: rgba(59, 130, 246, 0.1); color: var(--accent); font-weight: 600; }
        .nav-section { font-size: 0.75rem; text-transform: uppercase; color: var(--text-secondary); font-weight: 700; margin: 1.5rem 0 0.5rem 1rem; letter-spacing: 0.05em; }

        /* Main Content */
        .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .top-bar {
            height: 64px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(8px);
        }
        .page-title { font-size: 1.25rem; font-weight: 600; }
        .user-profile { display: flex; align-items: center; gap: 1rem; }
        .avatar { width: 32px; height: 32px; background: var(--bg-input); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: bold; border: 1px solid var(--border-color); }

        .content-area { flex: 1; overflow-y: auto; padding: 2rem; }

        /* -------------------------------------------------------------------------- */
        /*                               DASHBOARD WIDGETS                            */
        /* -------------------------------------------------------------------------- */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }
        .stat-card::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--accent); }
        .stat-card.success::before { background: var(--success); }
        .stat-card.warning::before { background: var(--warning); }
        
        .stat-label { font-size: 0.875rem; color: var(--text-secondary); margin-bottom: 0.5rem; }
        .stat-value { font-size: 2rem; font-weight: 700; color: var(--text-primary); }
        .stat-trend { font-size: 0.8rem; margin-top: 0.5rem; display: flex; align-items: center; gap: 0.25rem; }
        .trend-up { color: var(--success); }
        .trend-down { color: var(--danger); }

        .chart-container {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            height: 400px;
        }

        /* -------------------------------------------------------------------------- */
        /*                                  DATA TABLE                                */
        /* -------------------------------------------------------------------------- */
        .table-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .search-box { position: relative; width: 300px; }
        .search-box input { padding-left: 2.5rem; }
        .search-box i { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-secondary); }

        .data-table-wrapper {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
        }
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th {
            background: rgba(0,0,0,0.2);
            padding: 1rem;
            text-align: left;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
            font-weight: 600;
            border-bottom: 1px solid var(--border-color);
        }
        .data-table td {
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.9rem;
            vertical-align: middle;
        }
        .data-table tr:last-child td { border-bottom: none; }
        .data-table tr:hover { background: rgba(255,255,255,0.02); }

        .badge {
            display: inline-block;
            padding: 0.25rem 0.6rem;
            border-radius: 99px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .badge-verified { background: rgba(16, 185, 129, 0.15); color: var(--success); border: 1px solid rgba(16, 185, 129, 0.3); }
        .badge-pending { background: rgba(245, 158, 11, 0.15); color: var(--warning); border: 1px solid rgba(245, 158, 11, 0.3); }
        .badge-low { background: rgba(239, 68, 68, 0.15); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.3); }

        /* -------------------------------------------------------------------------- */
        /*                                   MAP VIEW                                 */
        /* -------------------------------------------------------------------------- */
        #map-container {
            width: 100%;
            height: 600px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            z-index: 1;
        }
        .leaflet-popup-content-wrapper { background: var(--bg-card); color: var(--text-primary); border-radius: 8px; }
        .leaflet-popup-tip { background: var(--bg-card); }
        .popup-content h3 { margin-bottom: 0.5rem; color: var(--accent); }
        .popup-content p { margin-bottom: 0.25rem; font-size: 0.9rem; }
        .popup-content .price { font-weight: bold; color: var(--success); font-size: 1.1rem; }

        /* -------------------------------------------------------------------------- */
        /*                                   MODAL                                    */
        /* -------------------------------------------------------------------------- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            z-index: 1000;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .modal-overlay.active { opacity: 1; pointer-events: all; }
        
        .modal-content {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            width: 100%;
            max-width: 700px;
            max-height: 90vh;
            overflow-y: auto;
            transform: translateY(20px);
            transition: transform 0.3s ease;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        .modal-overlay.active .modal-content { transform: translateY(0); }

        .modal-header { padding: 1.5rem; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .modal-body { padding: 1.5rem; }
        .modal-footer { padding: 1.5rem; border-top: 1px solid var(--border-color); display: flex; justify-content: flex-end; gap: 1rem; background: rgba(0,0,0,0.2); }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
        
        /* -------------------------------------------------------------------------- */
        /*                              TOAST NOTIFICATIONS                           */
        /* -------------------------------------------------------------------------- */
        #toast-container { position: fixed; bottom: 2rem; right: 2rem; z-index: 2000; display: flex; flex-direction: column; gap: 1rem; }
        .toast {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 1rem 1.5rem;
            border-radius: 8px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            display: flex; align-items: center; gap: 0.75rem;
            min-width: 300px;
            transform: translateX(120%);
            transition: transform 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        .toast.show { transform: translateX(0); }
        .toast.success { border-left: 4px solid var(--success); }
        .toast.error { border-left: 4px solid var(--danger); }
        .toast.warning { border-left: 4px solid var(--warning); }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar { position: fixed; left: -260px; height: 100%; }
            .sidebar.open { left: 0; }
            .main-content { margin-left: 0; }
            .grid-2 { grid-template-columns: 1fr; }
            .stats-grid { grid-template-columns: 1fr; }
            .table-controls { flex-direction: column; align-items: stretch; }
            .search-box { width: 100%; }
        }
    </style>
</head>
<body>

    <!-- Login Screen -->
    <div id="login-screen">
        <div class="login-box">
            <div class="login-header">
                <i class="fas fa-coins fa-3x" style="color: var(--accent); margin-bottom: 1rem;"></i>
                <h1>Gold Admin Console</h1>
                <p>Enterprise Grade Management System</p>
            </div>
            <form id="login-form">
                <div class="form-group">
                    <label class="form-label">GitHub Username</label>
                    <input type="text" id="gh-user" class="form-input" placeholder="e.g. vctb12" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Personal Access Token (Classic)</label>
                    <input type="password" id="gh-token" class="form-input" placeholder="ghp_..." required>
                    <small style="color: var(--text-secondary); font-size: 0.75rem; margin-top: 0.25rem; display: block;">
                        Requires <code>repo</code> scope. <a href="https://github.com/settings/tokens" target="_blank" style="color: var(--accent);">Generate here</a>.
                    </small>
                </div>
                <div class="form-group">
                    <label class="form-label">Repository Name</label>
                    <input type="text" id="gh-repo" class="form-input" value="Gold-Prices" required>
                </div>
                <button type="submit" class="btn btn-primary" id="login-btn">
                    <span>Secure Login</span> <i class="fas fa-arrow-right"></i>
                </button>
            </form>
            <div id="login-error" class="text-danger text-sm" style="margin-top: 1rem; text-align: center; display: none;"></div>
        </div>
    </div>

    <!-- Main App -->
    <div id="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo"><i class="fas fa-coins"></i></div>
                <div>
                    <div style="font-weight: 700; font-size: 1rem;">Gold Admin</div>
                    <div style="font-size: 0.75rem; color: var(--text-secondary);">v2.0 Production</div>
                </div>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-section">Core</div>
                <a class="nav-item active" onclick="app.navigate('dashboard')">
                    <i class="fas fa-chart-line" style="width: 20px;"></i> Dashboard
                </a>
                <a class="nav-item" onclick="app.navigate('shops')">
                    <i class="fas fa-store" style="width: 20px;"></i> Shops Directory
                </a>
                <a class="nav-item" onclick="app.navigate('map')">
                    <i class="fas fa-map-marked-alt" style="width: 20px;"></i> Global Map
                </a>
                
                <div class="nav-section">Analytics</div>
                <a class="nav-item" onclick="app.navigate('analytics')">
                    <i class="fas fa-chart-pie" style="width: 20px;"></i> Market Insights
                </a>
                <a class="nav-item" onclick="app.navigate('audit')">
                    <i class="fas fa-history" style="width: 20px;"></i> Audit Logs
                </a>

                <div class="nav-section" style="margin-top: auto;">
                    <a class="nav-item" onclick="app.logout()" style="color: var(--danger);">
                        <i class="fas fa-sign-out-alt" style="width: 20px;"></i> Logout
                    </a>
                </div>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <div class="flex items-center gap-2">
                    <button class="btn btn-secondary btn-sm" style="display: none;" id="menu-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">
                        <i class="fas fa-bars"></i>
                    </button>
                    <h2 class="page-title" id="page-title">Dashboard</h2>
                </div>
                <div class="user-profile">
                    <div class="text-sm text-secondary" id="user-display">Guest</div>
                    <div class="avatar" id="user-avatar">G</div>
                </div>
            </header>

            <div class="content-area" id="content-area">
                <!-- Dynamic Content Injected Here -->
            </div>
        </main>
    </div>

    <!-- Modal Template -->
    <div class="modal-overlay" id="shop-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">Add New Shop</h3>
                <button class="btn btn-secondary btn-sm btn-icon" onclick="app.modals.close()"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <form id="shop-form">
                    <input type="hidden" id="shop-id">
                    <input type="hidden" id="shop-sha"> <!-- For Git updates -->
                    
                    <div class="grid-2">
                        <div class="form-group">
                            <label class="form-label">Shop Name *</label>
                            <input type="text" id="s-name" class="form-input" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Country *</label>
                            <input type="text" id="s-country" class="form-input" required>
                        </div>
                    </div>
                    
                    <div class="grid-2">
                        <div class="form-group">
                            <label class="form-label">City</label>
                            <input type="text" id="s-city" class="form-input">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Address</label>
                            <input type="text" id="s-address" class="form-input">
                        </div>
                    </div>

                    <div class="grid-2">
                        <div class="form-group">
                            <label class="form-label">Latitude</label>
                            <input type="number" step="any" id="s-lat" class="form-input" placeholder="Auto-detect if empty">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Longitude</label>
                            <input type="number" step="any" id="s-lng" class="form-input" placeholder="Auto-detect if empty">
                        </div>
                    </div>

                    <div class="grid-2">
                        <div class="form-group">
                            <label class="form-label">Price 24k (USD)</label>
                            <input type="number" step="0.01" id="s-24k" class="form-input">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Price 22k (USD)</label>
                            <input type="number" step="0.01" id="s-22k" class="form-input">
                        </div>
                    </div>

                    <div class="grid-2">
                        <div class="form-group">
                            <label class="form-label">Confidence Score (0-100)</label>
                            <input type="number" id="s-conf" class="form-input" value="90" min="0" max="100">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Verification Status</label>
                            <select id="s-verified" class="form-input">
                                <option value="false">Pending Verification</option>
                                <option value="true">Verified</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Contact Info / Notes</label>
                        <textarea id="s-contact" class="form-input" rows="3"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="app.modals.close()">Cancel</button>
                <button class="btn btn-primary" onclick="app.handlers.saveShop()">
                    <i class="fas fa-save"></i> Save Changes
                </button>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container"></div>

    <script>
        /**
         * GOLD PRICES ADMIN CONSOLE - PRODUCTION READY
         * 
         * Architecture:
         * 1. State Management: Centralized store for shops, user, config.
         * 2. GitHub API Layer: Handles auth, fetching, and committing to repos.
         * 3. UI Renderer: Pure JS DOM manipulation for performance.
         * 4. Modules: Dashboard, Shops, Map, Analytics, Audit.
         */

        const CONFIG = {
            FILE_PATH: 'data/shops.js', // Default path
            FALLBACK_PATH: 'shops.js',   // Fallback if data folder missing
            COMMIT_MESSAGE_PREFIX: '[Admin] Update shops data'
        };

        const STATE = {
            user: null,
            shops: [],
            rawContent: '',
            sha: '',
            view: 'dashboard',
            auditLog: []
        };

        // --------------------------------------------------------------------------
        //                              UTILITIES
        // --------------------------------------------------------------------------
        const Utils = {
            toast: (msg, type = 'success') => {
                const container = document.getElementById('toast-container');
                const el = document.createElement('div');
                el.className = `toast ${type}`;
                el.innerHTML = `
                    <i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-exclamation-triangle'}"></i>
                    <span>${msg}</span>
                `;
                container.appendChild(el);
                setTimeout(() => el.classList.add('show'), 10);
                setTimeout(() => {
                    el.classList.remove('show');
                    setTimeout(() => el.remove(), 300);
                }, 3000);
            },
            
            decodeBase64: (str) => {
                try {
                    return decodeURIComponent(atob(str).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join(''));
                } catch (e) { return null; }
            },

            encodeBase64: (str) => {
                return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g, (match, p1) => String.fromCharCode('0x' + p1)));
            },

            parseShopsFile: (content) => {
                try {
                    // Extract array from "const SHOPS_DATA = [...];"
                    const match = content.match(/const\s+SHOPS_DATA\s*=\s*(\[.*\]);?/s);
                    if (match && match[1]) {
                        return JSON.parse(match[1]);
                    }
                    // Try parsing raw JSON if no wrapper
                    return JSON.parse(content);
                } catch (e) {
                    console.error("Parse error:", e);
                    throw new Error("Invalid shops.js format");
                }
            },

            generateShopsFile: (data) => {
                return `// AUTO-GENERATED BY ADMIN CONSOLE - DO NOT EDIT MANUALLY\n// Last Updated: ${new Date().toISOString()}\nconst SHOPS_DATA = ${JSON.stringify(data, null, 2)};\n\nif (typeof module !== 'undefined' && module.exports) { module.exports = SHOPS_DATA; }`;
            },

            formatDate: (dateStr) => new Date(dateStr).toLocaleDateString(),
            
            randomId: () => Math.random().toString(36).substr(2, 9)
        };

        // --------------------------------------------------------------------------
        //                              GITHUB API LAYER
        // --------------------------------------------------------------------------
        const GitHubAPI = {
            async fetchFile(owner, repo, path, token) {
                const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
                const res = await fetch(url, {
                    headers: {
                        'Authorization': `token ${token}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });
                
                if (res.status === 404) return null;
                if (!res.ok) throw new Error(`GitHub API Error: ${res.statusText}`);
                
                const data = await res.json();
                return {
                    content: Utils.decodeBase64(data.content),
                    sha: data.sha,
                    path: data.path
                };
            },

            async updateFile(owner, repo, path, content, sha, token, message) {
                const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
                const body = {
                    message: `${message} - ${new Date().toISOString()}`,
                    content: Utils.encodeBase64(content),
                    sha: sha,
                    branch: 'main' // Assumes main branch
                };

                const res = await fetch(url, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${token}`,
                        'Accept': 'application/vnd.github.v3+json'
                    },
                    body: JSON.stringify(body)
                });

                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.message || 'Failed to commit changes');
                }
                return await res.json();
            }
        };

        // --------------------------------------------------------------------------
        //                              APP LOGIC
        // --------------------------------------------------------------------------
        const app = {
            init: () => {
                // Check session
                const savedUser = localStorage.getItem('gold_admin_user');
                if (savedUser) {
                    STATE.user = JSON.parse(savedUser);
                    app.loadDashboard();
                } else {
                    document.getElementById('login-screen').style.display = 'flex';
                }

                // Event Listeners
                document.getElementById('login-form').addEventListener('submit', app.handlers.login);
                
                // Mobile menu
                if(window.innerWidth <= 768) {
                    document.getElementById('menu-toggle').style.display = 'block';
                }
            },

            handlers: {
                login: async (e) => {
                    e.preventDefault();
                    const btn = document.getElementById('login-btn');
                    const err = document.getElementById('login-error');
                    const user = document.getElementById('gh-user').value;
                    const token = document.getElementById('gh-token').value;
                    const repo = document.getElementById('gh-repo').value;

                    btn.disabled = true;
                    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Authenticating...';
                    err.style.display = 'none';

                    try {
                        // Verify credentials by fetching user info
                        const res = await fetch('https://api.github.com/user', {
                            headers: { 'Authorization': `token ${token}` }
                        });
                        
                        if (!res.ok) throw new Error('Invalid Token or User');
                        
                        const profile = await res.json();
                        
                        STATE.user = {
                            username: user,
                            token: token,
                            repo: repo,
                            name: profile.name || user
                        };
                        
                        localStorage.setItem('gold_admin_user', JSON.stringify(STATE.user));
                        Utils.toast('Authentication successful', 'success');
                        app.loadDashboard();
                    } catch (error) {
                        err.textContent = error.message;
                        err.style.display = 'block';
                        btn.disabled = false;
                        btn.innerHTML = '<span>Secure Login</span> <i class="fas fa-arrow-right"></i>';
                    }
                },

                saveShop: async () => {
                    const id = document.getElementById('shop-id').value;
                    const isEdit = !!id;
                    
                    const newShop = {
                        id: id || Utils.randomId(),
                        name: document.getElementById('s-name').value,
                        country: document.getElementById('s-country').value,
                        city: document.getElementById('s-city').value,
                        address: document.getElementById('s-address').value,
                        latitude: parseFloat(document.getElementById('s-lat').value) || null,
                        longitude: parseFloat(document.getElementById('s-lng').value) || null,
                        price_24k: parseFloat(document.getElementById('s-24k').value) || 0,
                        price_22k: parseFloat(document.getElementById('s-22k').value) || 0,
                        confidence_score: parseInt(document.getElementById('s-conf').value),
                        is_verified: document.getElementById('s-verified').value === 'true',
                        contact_info: document.getElementById('s-contact').value,
                        updated_at: new Date().toISOString()
                    };

                    // Optimistic UI update
                    let shopsCopy = [...STATE.shops];
                    if (isEdit) {
                        const idx = shopsCopy.findIndex(s => s.id === id);
                        if (idx !== -1) shopsCopy[idx] = { ...shopsCopy[idx], ...newShop };
                    } else {
                        shopsCopy.push(newShop);
                    }

                    try {
                        Utils.toast('Committing changes to GitHub...', 'warning');
                        
                        const fileContent = Utils.generateShopsFile(shopsCopy);
                        
                        await GitHubAPI.updateFile(
                            STATE.user.username,
                            STATE.user.repo,
                            STATE.currentPath, // The path we successfully fetched from
                            fileContent,
                            STATE.sha,
                            STATE.user.token,
                            `${CONFIG.COMMIT_MESSAGE_PREFIX} (${isEdit ? 'Edit' : 'Add'}: ${newShop.name})`
                        );

                        // Update State
                        STATE.shops = shopsCopy;
                        STATE.rawContent = fileContent;
                        // Note: SHA changes after commit, need to refetch or trust API response. 
                        // For simplicity in this flow, we'll just refresh data to get new SHA.
                        await app.data.refresh(); 

                        app.modals.close();
                        Utils.toast(isEdit ? 'Shop updated successfully!' : 'Shop added successfully!', 'success');
                        app.render.currentView();
                        
                        // Log Audit
                        app.audit.log(isEdit ? 'UPDATE_SHOP' : 'CREATE_SHOP', newShop.name);

                    } catch (error) {
                        console.error(error);
                        Utils.toast(`Failed to save: ${error.message}`, 'error');
                    }
                },

                deleteShop: async (id) => {
                    if(!confirm('Are you sure? This will delete the shop from the live site.')) return;

                    const shop = STATE.shops.find(s => s.id === id);
                    const shopsCopy = STATE.shops.filter(s => s.id !== id);

                    try {
                        Utils.toast('Deleting shop...', 'warning');
                        const fileContent = Utils.generateShopsFile(shopsCopy);
                        
                        await GitHubAPI.updateFile(
                            STATE.user.username,
                            STATE.user.repo,
                            STATE.currentPath,
                            fileContent,
                            STATE.sha,
                            STATE.user.token,
                            `${CONFIG.COMMIT_MESSAGE_PREFIX} (Delete: ${shop.name})`
                        );

                        await app.data.refresh();
                        Utils.toast('Shop deleted successfully', 'success');
                        app.render.currentView();
                        app.audit.log('DELETE_SHOP', shop.name);

                    } catch (error) {
                        Utils.toast(`Delete failed: ${error.message}`, 'error');
                    }
                }
            },

            data: {
                refresh: async () => {
                    if (!STATE.user) return;
                    
                    try {
                        // Try primary path
                        let result = await GitHubAPI.fetchFile(STATE.user.username, STATE.user.repo, CONFIG.FILE_PATH, STATE.user.token);
                        let pathUsed = CONFIG.FILE_PATH;

                        // Fallback to root if not found
                        if (!result) {
                            result = await GitHubAPI.fetchFile(STATE.user.username, STATE.user.repo, CONFIG.FALLBACK_PATH, STATE.user.token);
                            pathUsed = CONFIG.FALLBACK_PATH;
                        }

                        if (!result) throw new Error("shops.js not found in repo (checked data/ and root)");

                        STATE.shops = Utils.parseShopsFile(result.content);
                        STATE.rawContent = result.content;
                        STATE.sha = result.sha;
                        STATE.currentPath = pathUsed;
                        
                        return true;
                    } catch (error) {
                        console.error(error);
                        Utils.toast(error.message, 'error');
                        return false;
                    }
                }
            },

            navigate: (view) => {
                STATE.view = view;
                
                // Update Sidebar
                document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
                const activeLink = document.querySelector(`.nav-item[onclick="app.navigate('${view}')"]`);
                if(activeLink) activeLink.classList.add('active');

                // Close mobile menu
                document.getElementById('sidebar').classList.remove('open');

                // Render
                app.render.currentView();
            },

            loadDashboard: async () => {
                document.getElementById('login-screen').style.display = 'none';
                const appContainer = document.getElementById('app-container');
                appContainer.classList.add('active');
                
                document.getElementById('user-display').textContent = STATE.user.name;
                document.getElementById('user-avatar').textContent = STATE.user.name.charAt(0).toUpperCase();

                // Initial Data Load
                Utils.toast('Syncing with GitHub...', 'info');
                const success = await app.data.refresh();
                
                if (success) {
                    Utils.toast(`Loaded ${STATE.shops.length} shops`, 'success');
                    app.navigate('dashboard');
                } else {
                    Utils.toast('Failed to load data. Check console.', 'error');
                }
            },

            logout: () => {
                localStorage.removeItem('gold_admin_user');
                location.reload();
            },

            audit: {
                log: (action, details) => {
                    const entry = {
                        id: Utils.randomId(),
                        timestamp: new Date().toISOString(),
                        action,
                        details,
                        user: STATE.user.username
                    };
                    STATE.auditLog.unshift(entry);
                    // Keep last 50 in memory
                    if (STATE.auditLog.length > 50) STATE.auditLog.pop();
                }
            },

            modals: {
                open: (shop = null) => {
                    const modal = document.getElementById('shop-modal');
                    const title = document.getElementById('modal-title');
                    const form = document.getElementById('shop-form');
                    
                    form.reset();
                    
                    if (shop) {
                        title.textContent = 'Edit Shop';
                        document.getElementById('shop-id').value = shop.id;
                        document.getElementById('shop-sha').value = shop.sha || ''; // Not used in this flat structure but good practice
                        document.getElementById('s-name').value = shop.name;
                        document.getElementById('s-country').value = shop.country;
                        document.getElementById('s-city').value = shop.city || '';
                        document.getElementById('s-address').value = shop.address || '';
                        document.getElementById('s-lat').value = shop.latitude || '';
                        document.getElementById('s-lng').value = shop.longitude || '';
                        document.getElementById('s-24k').value = shop.price_24k || '';
                        document.getElementById('s-22k').value = shop.price_22k || '';
                        document.getElementById('s-conf').value = shop.confidence_score || 90;
                        document.getElementById('s-verified').value = shop.is_verified.toString();
                        document.getElementById('s-contact').value = shop.contact_info || '';
                    } else {
                        title.textContent = 'Add New Shop';
                        document.getElementById('shop-id').value = '';
                    }
                    
                    modal.classList.add('active');
                },
                close: () => {
                    document.getElementById('shop-modal').classList.remove('active');
                }
            },

            render: {
                currentView: () => {
                    const container = document.getElementById('content-area');
                    const title = document.getElementById('page-title');
                    container.innerHTML = '';

                    switch (STATE.view) {
                        case 'dashboard':
                            title.textContent = 'Executive Dashboard';
                            app.render.dashboard(container);
                            break;
                        case 'shops':
                            title.textContent = 'Shops Directory';
                            app.render.shops(container);
                            break;
                        case 'map':
                            title.textContent = 'Global Shop Map';
                            app.render.map(container);
                            break;
                        case 'analytics':
                            title.textContent = 'Market Analytics';
                            app.render.analytics(container);
                            break;
                        case 'audit':
                            title.textContent = 'System Audit Log';
                            app.render.audit(container);
                            break;
                    }
                },

                dashboard: (container) => {
                    const total = STATE.shops.length;
                    const verified = STATE.shops.filter(s => s.is_verified).length;
                    const countries = new Set(STATE.shops.map(s => s.country)).size;
                    const avgConf = Math.round(STATE.shops.reduce((acc, s) => acc + (s.confidence_score || 0), 0) / (total || 1));

                    container.innerHTML = `
                        <div class="stats-grid">
                            <div class="stat-card">
                                <div class="stat-label">Total Shops</div>
                                <div class="stat-value">${total}</div>
                                <div class="stat-trend trend-up"><i class="fas fa-arrow-up"></i> Live Data</div>
                            </div>
                            <div class="stat-card success">
                                <div class="stat-label">Verified Shops</div>
                                <div class="stat-value">${verified}</div>
                                <div class="stat-trend">${Math.round((verified/total)*100)}% Verification Rate</div>
                            </div>
                            <div class="stat-card warning">
                                <div class="stat-label">Countries Covered</div>
                                <div class="stat-value">${countries}</div>
                                <div class="stat-trend">Global Reach</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-label">Avg. Confidence</div>
                                <div class="stat-value">${avgConf}%</div>
                                <div class="stat-trend">Data Quality Score</div>
                            </div>
                        </div>

                        <div class="grid-2">
                            <div class="chart-container">
                                <canvas id="chart-country"></canvas>
                            </div>
                            <div class="chart-container">
                                <canvas id="chart-confidence"></canvas>
                            </div>
                        </div>
                    `;

                    // Init Charts
                    setTimeout(() => {
                        const countryCounts = {};
                        STATE.shops.forEach(s => { countryCounts[s.country] = (countryCounts[s.country] || 0) + 1; });
                        
                        new Chart(document.getElementById('chart-country'), {
                            type: 'doughnut',
                            data: {
                                labels: Object.keys(countryCounts),
                                datasets: [{
                                    data: Object.values(countryCounts),
                                    backgroundColor: ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899'],
                                    borderWidth: 0
                                }]
                            },
                            options: {
                                responsive: true,
                                maintainAspectRatio: false,
                                plugins: { legend: { position: 'right', labels: { color: '#94a3b8' } } },
                                layout: { padding: 20 }
                            }
                        });

                        new Chart(document.getElementById('chart-confidence'), {
                            type: 'bar',
                            data: {
                                labels: ['High (>90)', 'Med (70-90)', 'Low (<70)'],
                                datasets: [{
                                    label: 'Shops by Confidence',
                                    data: [
                                        STATE.shops.filter(s => s.confidence_score > 90).length,
                                        STATE.shops.filter(s => s.confidence_score >= 70 && s.confidence_score <= 90).length,
                                        STATE.shops.filter(s => s.confidence_score < 70).length
                                    ],
                                    backgroundColor: ['#10b981', '#f59e0b', '#ef4444'],
                                    borderRadius: 6
                                }]
                            },
                            options: {
                                responsive: true,
                                maintainAspectRatio: false,
                                scales: {
                                    y: { beginAtZero: true, grid: { color: '#334155' }, ticks: { color: '#94a3b8' } },
                                    x: { grid: { display: false }, ticks: { color: '#94a3b8' } }
                                },
                                plugins: { legend: { display: false } }
                            }
                        });
                    }, 100);
                },

                shops: (container) => {
                    container.innerHTML = `
                        <div class="table-controls">
                            <div class="search-box">
                                <i class="fas fa-search"></i>
                                <input type="text" id="shop-search" class="form-input" placeholder="Search shops, cities..." onkeyup="app.render.filterShops(this.value)">
                            </div>
                            <button class="btn btn-primary" onclick="app.modals.open()">
                                <i class="fas fa-plus"></i> Add Shop
                            </button>
                        </div>
                        <div class="data-table-wrapper">
                            <table class="data-table">
                                <thead>
                                    <tr>
                                        <th>Name</th>
                                        <th>Location</th>
                                        <th>Price (24k)</th>
                                        <th>Confidence</th>
                                        <th>Status</th>
                                        <th style="text-align:right">Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="shops-table-body">
                                    ${app.render.buildShopRows(STATE.shops)}
                                </tbody>
                            </table>
                        </div>
                    `;
                },

                buildShopRows: (shops) => {
                    if (shops.length === 0) return '<tr><td colspan="6" style="text-align:center; padding: 2rem;">No shops found.</td></tr>';
                    
                    return shops.map(s => `
                        <tr>
                            <td>
                                <div class="font-bold">${s.name}</div>
                                <div class="text-xs text-secondary">${s.updated_at ? 'Updated: ' + Utils.formatDate(s.updated_at) : ''}</div>
                            </td>
                            <td>
                                <div>${s.city || 'N/A'}, ${s.country}</div>
                            </td>
                            <td>$${s.price_24k || '0.00'}</td>
                            <td>
                                <div style="display:flex; align-items:center; gap:0.5rem;">
                                    <div style="flex:1; height:6px; background:#334155; border-radius:3px; width: 60px;">
                                        <div style="width:${s.confidence_score}%; height:100%; background:${s.confidence_score > 80 ? 'var(--success)' : s.confidence_score > 50 ? 'var(--warning)' : 'var(--danger)'}; border-radius:3px;"></div>
                                    </div>
                                    <span class="text-xs">${s.confidence_score}%</span>
                                </div>
                            </td>
                            <td>
                                <span class="badge ${s.is_verified ? 'badge-verified' : 'badge-pending'}">
                                    ${s.is_verified ? 'Verified' : 'Pending'}
                                </span>
                            </td>
                            <td style="text-align:right">
                                <button class="btn btn-secondary btn-sm" onclick="app.modals.open(STATE.shops.find(s=>s.id='${s.id}'))">
                                    <i class="fas fa-edit"></i>
                                </button>
                                <button class="btn btn-danger btn-sm" onclick="app.handlers.deleteShop('${s.id}')">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </td>
                        </tr>
                    `).join('');
                },

                filterShops: (query) => {
                    const term = query.toLowerCase();
                    const filtered = STATE.shops.filter(s => 
                        s.name.toLowerCase().includes(term) || 
                        s.country.toLowerCase().includes(term) ||
                        (s.city && s.city.toLowerCase().includes(term))
                    );
                    document.getElementById('shops-table-body').innerHTML = app.render.buildShopRows(filtered);
                },

                map: (container) => {
                    container.innerHTML = `<div id="map-container"></div>`;
                    
                    setTimeout(() => {
                        const map = L.map('map-container').setView([20, 0], 2);
                        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                            attribution: '&copy; OpenStreetMap &copy; CARTO',
                            subdomains: 'abcd',
                            maxZoom: 19
                        }).addTo(map);

                        const validShops = STATE.shops.filter(s => s.latitude && s.longitude);
                        
                        if (validShops.length === 0) {
                            Utils.toast('No geolocated shops found', 'warning');
                            return;
                        }

                        validShops.forEach(s => {
                            const marker = L.marker([s.latitude, s.longitude]).addTo(map);
                            marker.bindPopup(`
                                <div class="popup-content">
                                    <h3>${s.name}</h3>
                                    <p><i class="fas fa-map-marker-alt"></i> ${s.city}, ${s.country}</p>
                                    <p class="price">$${s.price_24k} (24k)</p>
                                    <p class="text-xs text-secondary">Confidence: ${s.confidence_score}%</p>
                                    <button class="btn btn-primary btn-sm" style="margin-top:5px; width:100%" onclick="app.modals.open(STATE.shops.find(x=>x.id='${s.id}'))">Edit</button>
                                </div>
                            `);
                        });

                        // Fit bounds
                        const group = new L.featureGroup(validShops.map(s => L.marker([s.latitude, s.longitude])));
                        map.fitBounds(group.getBounds(), { padding: [50, 50] });
                    }, 100);
                },

                analytics: (container) => {
                    // Reuse dashboard charts but bigger or different metrics
                    container.innerHTML = `
                        <div class="stats-grid">
                             <div class="stat-card">
                                <div class="stat-label">Average Price (24k)</div>
                                <div class="stat-value">$${(STATE.shops.reduce((a,b)=>a+(b.price_24k||0),0)/STATE.shops.length).toFixed(2)}</div>
                            </div>
                        </div>
                        <div class="chart-container" style="height: 500px;">
                            <canvas id="chart-price-dist"></canvas>
                        </div>
                    `;
                    
                    setTimeout(() => {
                        const prices = STATE.shops.map(s => s.price_24k || 0).sort((a,b)=>a-b);
                        new Chart(document.getElementById('chart-price-dist'), {
                            type: 'line',
                            data: {
                                labels: prices.map((_, i) => `Shop ${i+1}`),
                                datasets: [{
                                    label: '24k Price Distribution',
                                    data: prices,
                                    borderColor: '#3b82f6',
                                    backgroundColor: 'rgba(59, 130, 246, 0.1)',
                                    fill: true,
                                    tension: 0.4
                                }]
                            },
                            options: {
                                responsive: true,
                                maintainAspectRatio: false,
                                scales: {
                                    y: { grid: { color: '#334155' }, ticks: { color: '#94a3b8' } },
                                    x: { display: false }
                                }
                            }
                        });
                    }, 100);
                },

                audit: (container) => {
                    if (STATE.auditLog.length === 0) {
                        container.innerHTML = '<div style="text-align:center; color:var(--text-secondary); padding:2rem;">No recent activity logged in this session.</div>';
                        return;
                    }
                    container.innerHTML = `
                        <div class="data-table-wrapper">
                            <table class="data-table">
                                <thead>
                                    <tr>
                                        <th>Time</th>
                                        <th>Action</th>
                                        <th>Details</th>
                                        <th>User</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${STATE.auditLog.map(log => `
                                        <tr>
                                            <td>${new Date(log.timestamp).toLocaleString()}</td>
                                            <td><span class="badge badge-pending">${log.action}</span></td>
                                            <td>${log.details}</td>
                                            <td>${log.user}</td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    `;
                }
            }
        };

        // Initialize App
        window.addEventListener('DOMContentLoaded', app.init);
    </script>
</body>
</html>
