<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gold Prices | Enterprise Admin Suite</title>
    
    <!-- External Libraries (CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-panel: #1e293b;
            --bg-hover: #334155;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --border: #334155;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* --- Utilities --- */
        .hidden { display: none !important; }
        .flex { display: flex; }
        .flex-col { flex-direction: column; }
        .items-center { align-items: center; }
        .justify-between { justify-content: space-between; }
        .gap-2 { gap: 0.5rem; }
        .gap-4 { gap: 1rem; }
        .p-4 { padding: 1rem; }
        .p-6 { padding: 1.5rem; }
        .mt-4 { margin-top: 1rem; }
        .mb-4 { margin-bottom: 1rem; }
        .text-sm { font-size: 0.875rem; }
        .text-xs { font-size: 0.75rem; }
        .font-bold { font-weight: 700; }
        .text-danger { color: var(--danger); }
        .text-success { color: var(--success); }
        .text-muted { color: var(--text-muted); }
        .w-full { width: 100%; }

        /* --- Login Screen --- */
        #login-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(10px);
            padding: 2.5rem;
            border-radius: 16px;
            border: 1px solid var(--border);
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        }

        .login-header { text-align: center; margin-bottom: 2rem; }
        .login-header h1 { font-size: 1.5rem; margin-bottom: 0.5rem; color: white; }
        .login-header p { color: var(--text-muted); font-size: 0.9rem; }

        .form-group { margin-bottom: 1.25rem; }
        .form-label { display: block; margin-bottom: 0.5rem; color: var(--text-muted); font-size: 0.875rem; font-weight: 500; }
        .form-input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: #0f172a;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: white;
            font-size: 0.95rem;
            transition: all 0.2s;
        }
        .form-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2); }
        
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            font-size: 0.95rem;
        }
        .btn-primary { background: var(--primary); color: white; width: 100%; }
        .btn-primary:hover { background: var(--primary-hover); transform: translateY(-1px); }
        .btn-primary:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
        
        .btn-secondary { background: var(--bg-hover); color: white; }
        .btn-secondary:hover { background: var(--border); }

        .btn-danger { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.2); }
        .btn-danger:hover { background: rgba(239, 68, 68, 0.2); }

        .error-box {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.875rem;
            display: none;
        }

        /* --- Main Layout --- */
        #app-layout {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: var(--bg-panel);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
        }

        .brand {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .brand i { color: var(--warning); font-size: 1.5rem; }
        .brand span { font-size: 1.25rem; font-weight: 700; color: white; }

        .nav-menu { flex: 1; padding: 1rem; overflow-y: auto; }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            color: var(--text-muted);
            text-decoration: none;
            border-radius: 8px;
            margin-bottom: 0.5rem;
            transition: all 0.2s;
            cursor: pointer;
        }
        .nav-item:hover { background: var(--bg-hover); color: white; }
        .nav-item.active { background: var(--primary); color: white; }
        .nav-item i { width: 20px; text-align: center; }

        .user-profile {
            padding: 1rem;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .avatar {
            width: 36px; height: 36px;
            border-radius: 50%;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            overflow-y: auto;
            background: var(--bg-dark);
            position: relative;
        }

        .top-bar {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .content-area { padding: 2rem; }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: var(--bg-panel);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }
        .stat-label { color: var(--text-muted); font-size: 0.875rem; margin-bottom: 0.5rem; }
        .stat-value { font-size: 2rem; font-weight: 700; color: white; }
        .stat-trend { font-size: 0.875rem; margin-top: 0.5rem; display: flex; align-items: center; gap: 0.25rem; }
        .trend-up { color: var(--success); }
        .trend-down { color: var(--danger); }

        /* Data Table */
        .table-container {
            background: var(--bg-panel);
            border-radius: 12px;
            border: 1px solid var(--border);
            overflow: hidden;
        }
        .table-header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 1rem 1.5rem; text-align: left; border-bottom: 1px solid var(--border); }
        th { background: rgba(0,0,0,0.2); color: var(--text-muted); font-weight: 600; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; }
        tr:hover { background: rgba(255,255,255,0.02); }
        td { font-size: 0.9rem; }
        
        .badge {
            padding: 0.25rem 0.75rem;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-block;
        }
        .badge-success { background: rgba(16, 185, 129, 0.1); color: var(--success); }
        .badge-warning { background: rgba(245, 158, 11, 0.1); color: var(--warning); }
        .badge-info { background: rgba(59, 130, 246, 0.1); color: var(--primary); }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }
        .modal-overlay.open { opacity: 1; visibility: visible; }
        .modal-content {
            background: var(--bg-panel);
            width: 100%;
            max-width: 600px;
            border-radius: 16px;
            border: 1px solid var(--border);
            transform: translateY(20px);
            transition: transform 0.3s;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-overlay.open .modal-content { transform: translateY(0); }
        .modal-header { padding: 1.5rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .modal-body { padding: 1.5rem; }
        .modal-footer { padding: 1.5rem; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 1rem; }

        /* Map & Charts */
        #map-container { height: 500px; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }
        .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
        .chart-card { background: var(--bg-panel); padding: 1.5rem; border-radius: 12px; border: 1px solid var(--border); height: 300px; }

        /* Toast Notifications */
        #toast-container {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .toast {
            background: var(--bg-panel);
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 8px;
            border-left: 4px solid var(--primary);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            animation: slideIn 0.3s ease-out;
            min-width: 300px;
        }
        .toast.success { border-left-color: var(--success); }
        .toast.error { border-left-color: var(--danger); }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar { position: fixed; left: -260px; height: 100%; z-index: 100; }
            .sidebar.open { left: 0; }
            .chart-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <!-- LOGIN SCREEN -->
    <div id="login-screen">
        <div class="login-card">
            <div class="login-header">
                <i class="fas fa-coins fa-3x" style="color: var(--warning); margin-bottom: 1rem;"></i>
                <h1>Gold Prices Admin</h1>
                <p>Enterprise Management Suite</p>
            </div>
            
            <div id="login-error" class="error-box"></div>

            <form id="login-form">
                <div class="form-group">
                    <label class="form-label">GitHub Username</label>
                    <input type="text" id="gh-user" class="form-input" placeholder="e.g., vctb12" required>
                    <small class="text-muted text-xs mt-2">⚠️ Use username, NOT email address</small>
                </div>
                <div class="form-group">
                    <label class="form-label">Personal Access Token (Classic)</label>
                    <input type="password" id="gh-token" class="form-input" placeholder="ghp_..." required>
                    <small class="text-muted text-xs mt-2">Requires 'repo' scope</small>
                </div>
                <div class="form-group">
                    <label class="form-label">Repository Name</label>
                    <input type="text" id="gh-repo" class="form-input" value="Gold-Prices" required>
                </div>
                <button type="submit" class="btn btn-primary" id="login-btn">
                    <i class="fas fa-shield-alt mr-2"></i> Secure Login
                </button>
            </form>
        </div>
    </div>

    <!-- APP LAYOUT -->
    <div id="app-layout" class="hidden">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="brand">
                <i class="fas fa-coins"></i>
                <span>GoldAdmin</span>
            </div>
            <nav class="nav-menu">
                <a class="nav-item active" onclick="app.navigate('dashboard')">
                    <i class="fas fa-chart-line"></i> Dashboard
                </a>
                <a class="nav-item" onclick="app.navigate('shops')">
                    <i class="fas fa-store"></i> Shops Directory
                </a>
                <a class="nav-item" onclick="app.navigate('analytics')">
                    <i class="fas fa-chart-pie"></i> Analytics
                </a>
                <a class="nav-item" onclick="app.navigate('map')">
                    <i class="fas fa-map-marked-alt"></i> Map View
                </a>
                <a class="nav-item" onclick="app.navigate('git')">
                    <i class="fab fa-git-alt"></i> Git History
                </a>
            </nav>
            <div class="user-profile">
                <div class="avatar" id="user-avatar">U</div>
                <div style="flex:1; overflow:hidden;">
                    <div class="text-sm font-bold" id="user-name-display">User</div>
                    <div class="text-xs text-muted" id="repo-display">Repo</div>
                </div>
                <button class="btn btn-secondary" style="padding: 0.5rem;" onclick="app.logout()" title="Logout">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="top-bar">
                <div class="flex items-center gap-4">
                    <button class="btn btn-secondary" style="display:none;" id="menu-toggle" onclick="app.toggleSidebar()">
                        <i class="fas fa-bars"></i>
                    </button>
                    <h2 id="page-title">Dashboard</h2>
                </div>
                <div class="flex items-center gap-2">
                    <span class="text-xs text-muted" id="connection-status"><i class="fas fa-circle text-success"></i> Connected</span>
                </div>
            </div>

            <div class="content-area" id="content-area">
                <!-- Dynamic Content Injected Here -->
            </div>
        </main>
    </div>

    <!-- SHOP MODAL -->
    <div class="modal-overlay" id="shop-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">Add New Shop</h3>
                <button class="btn btn-secondary" style="padding: 0.25rem 0.5rem;" onclick="app.closeModal()">×</button>
            </div>
            <div class="modal-body">
                <form id="shop-form">
                    <input type="hidden" id="edit-sha">
                    <input type="hidden" id="edit-path">
                    
                    <div class="form-group">
                        <label class="form-label">Shop Name</label>
                        <input type="text" id="s-name" class="form-input" required>
                    </div>
                    
                    <div class="chart-grid" style="grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem;">
                        <div class="form-group">
                            <label class="form-label">Country</label>
                            <input type="text" id="s-country" class="form-input" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">City</label>
                            <input type="text" id="s-city" class="form-input">
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Address / Location Details</label>
                        <input type="text" id="s-address" class="form-input">
                    </div>

                    <div class="chart-grid" style="grid-template-columns: 1fr 1fr 1fr 1fr; gap: 0.5rem; margin-bottom: 1rem;">
                        <div class="form-group">
                            <label class="form-label">24k Price</label>
                            <input type="number" step="0.01" id="s-24k" class="form-input">
                        </div>
                        <div class="form-group">
                            <label class="form-label">22k Price</label>
                            <input type="number" step="0.01" id="s-22k" class="form-input">
                        </div>
                        <div class="form-group">
                            <label class="form-label">21k Price</label>
                            <input type="number" step="0.01" id="s-21k" class="form-input">
                        </div>
                        <div class="form-group">
                            <label class="form-label">18k Price</label>
                            <input type="number" step="0.01" id="s-18k" class="form-input">
                        </div>
                    </div>

                    <div class="chart-grid" style="grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <div class="form-group">
                            <label class="form-label">Confidence Score (0-100)</label>
                            <input type="number" id="s-conf" class="form-input" value="90">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Verified?</label>
                            <select id="s-verified" class="form-input">
                                <option value="false">No</option>
                                <option value="true">Yes</option>
                            </select>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="app.closeModal()">Cancel</button>
                <button class="btn btn-primary" onclick="app.saveShop()">
                    <i class="fas fa-save mr-2"></i> Save & Commit to GitHub
                </button>
            </div>
        </div>
    </div>

    <!-- TOAST CONTAINER -->
    <div id="toast-container"></div>

    <script>
        /**
         * GOLD PRICES ADMIN SUITE
         * Production Ready Single Page Application
         * Handles GitHub API, Data Parsing, UI Rendering, and Git Commits
         */

        const CONFIG = {
            basePath: 'data', // Default path to search
            fileName: 'shops.js',
            branch: 'main'
        };

        const STATE = {
            user: null,
            token: null,
            repo: null,
            shops: [],
            rawContent: '',
            sha: '',
            mapInstance: null,
            charts: {}
        };

        // --- Core API Handler ---
        const GitHubAPI = {
            async request(endpoint, method = 'GET', body = null) {
                const headers = {
                    'Authorization': `token ${STATE.token}`,
                    'Accept': 'application/vnd.github.v3+json',
                    'Content-Type': 'application/json'
                };

                const response = await fetch(`https://api.github.com${endpoint}`, {
                    method,
                    headers,
                    body: body ? JSON.stringify(body) : null
                });

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.message || `HTTP ${response.status}`);
                }
                return response.json();
            },

            async getFileContent(path) {
                try {
                    // Try primary path
                    const data = await this.request(`/repos/${STATE.user}/${STATE.repo}/contents/${path}?ref=${CONFIG.branch}`);
                    return data;
                } catch (e) {
                    // Fallback: Try root if data/ fails
                    if (path.includes('data/')) {
                        console.warn('Primary path failed, trying root...');
                        try {
                            const data = await this.request(`/repos/${STATE.user}/${STATE.repo}/contents/${CONFIG.fileName}?ref=${CONFIG.branch}`);
                            CONFIG.basePath = ''; // Update config for future saves
                            return data;
                        } catch (e2) {
                            throw new Error(`File '${CONFIG.fileName}' not found in 'data/' or root directory.`);
                        }
                    }
                    throw e;
                }
            },

            async updateFile(path, content, sha, message) {
                const encodedContent = btoa(unescape(encodeURIComponent(content)));
                return this.request(`/repos/${STATE.user}/${STATE.repo}/contents/${path}`, 'PUT', {
                    message: message || 'chore: update shops data via Admin Panel',
                    content: encodedContent,
                    sha: sha,
                    branch: CONFIG.branch
                });
            }
        };

        // --- Application Logic ---
        const app = {
            init() {
                // Check session
                const saved = localStorage.getItem('gp_admin_session');
                if (saved) {
                    const session = JSON.parse(saved);
                    document.getElementById('gh-user').value = session.user;
                    document.getElementById('gh-token').value = session.token;
                    document.getElementById('gh-repo').value = session.repo;
                }

                document.getElementById('login-form').addEventListener('submit', (e) => this.handleLogin(e));
            },

            async handleLogin(e) {
                e.preventDefault();
                const btn = document.getElementById('login-btn');
                const errBox = document.getElementById('login-error');
                
                const user = document.getElementById('gh-user').value.trim();
                const token = document.getElementById('gh-token').value.trim();
                const repo = document.getElementById('gh-repo').value.trim();

                // Validation: Check for email format in username
                if (user.includes('@')) {
                    errBox.textContent = "❌ Invalid Username: Please enter your GitHub USERNAME (e.g., 'vctb12'), not your email address.";
                    errBox.style.display = 'block';
                    return;
                }

                btn.disabled = true;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Authenticating...';
                errBox.style.display = 'none';

                try {
                    // Verify credentials by fetching user info
                    await GitHubAPI.request('/user');
                    
                    STATE.user = user;
                    STATE.token = token;
                    STATE.repo = repo;

                    // Save session
                    localStorage.setItem('gp_admin_session', JSON.stringify({ user, token, repo }));

                    // Load Data
                    await this.loadShopsData();
                    
                    // Switch UI
                    document.getElementById('login-screen').classList.add('hidden');
                    document.getElementById('app-layout').classList.remove('hidden');
                    
                    this.updateUserInfo();
                    this.navigate('dashboard');
                    this.showToast('Welcome back, ' + user, 'success');

                } catch (err) {
                    errBox.textContent = `Authentication Failed: ${err.message}. Check token scope (repo) and username.`;
                    errBox.style.display = 'block';
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-shield-alt mr-2"></i> Secure Login';
                }
            },

            logout() {
                localStorage.removeItem('gp_admin_session');
                location.reload();
            },

            updateUserInfo() {
                document.getElementById('user-name-display').textContent = STATE.user;
                document.getElementById('repo-display').textContent = STATE.repo;
                document.getElementById('user-avatar').textContent = STATE.user.substring(0, 2).toUpperCase();
            },

            async loadShopsData() {
                this.showToast('Fetching live data from GitHub...', 'info');
                try {
                    const fileData = await GitHubAPI.getFileContent(`${CONFIG.basePath}/${CONFIG.fileName}`);
                    STATE.sha = fileData.sha;
                    
                    // Decode and Parse
                    const raw = atob(fileData.content);
                    STATE.rawContent = raw;
                    
                    // Extract array from JS file (handle "const SHOPS = [...]")
                    const match = raw.match(/=\s*(\[.*\])/s);
                    if (!match) throw new Error("Invalid file format: Could not find array in shops.js");
                    
                    STATE.shops = JSON.parse(match[1]);
                    this.showToast(`Loaded ${STATE.shops.length} shops successfully`, 'success');
                } catch (err) {
                    this.showToast('Error loading data: ' + err.message, 'error');
                    console.error(err);
                }
            },

            navigate(view) {
                // Update Nav
                document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
                const activeNav = document.querySelector(`.nav-item[onclick="app.navigate('${view}')"]`);
                if(activeNav) activeNav.classList.add('active');

                const content = document.getElementById('content-area');
                const title = document.getElementById('page-title');
                
                // Scroll top
                document.querySelector('.main-content').scrollTop = 0;

                switch(view) {
                    case 'dashboard':
                        title.textContent = 'Dashboard Overview';
                        content.innerHTML = this.renderDashboard();
                        this.initCharts();
                        break;
                    case 'shops':
                        title.textContent = 'Shops Directory';
                        content.innerHTML = this.renderShopsTable();
                        break;
                    case 'analytics':
                        title.textContent = 'Market Analytics';
                        content.innerHTML = this.renderAnalytics();
                        setTimeout(() => this.initCharts(), 100);
                        break;
                    case 'map':
                        title.textContent = 'Global Shop Map';
                        content.innerHTML = '<div id="map-container"></div>';
                        setTimeout(() => this.initMap(), 100);
                        break;
                    case 'git':
                        title.textContent = 'Git Commit History';
                        content.innerHTML = '<div class="text-center p-6">Loading history...</div>';
                        this.loadGitHistory();
                        break;
                }
            },

            // --- Renderers ---

            renderDashboard() {
                const total = STATE.shops.length;
                const verified = STATE.shops.filter(s => s.is_verified || s.confidence_score > 90).length;
                const countries = new Set(STATE.shops.map(s => s.country)).size;
                const avgPrice = STATE.shops.reduce((acc, s) => acc + (parseFloat(s.price_24k)||0), 0) / total;

                return `
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-label">Total Shops</div>
                            <div class="stat-value">${total}</div>
                            <div class="stat-trend trend-up"><i class="fas fa-arrow-up"></i> Active Directory</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">Verified / High Confidence</div>
                            <div class="stat-value" style="color:var(--success)">${verified}</div>
                            <div class="stat-trend">${Math.round((verified/total)*100)}% Trust Rate</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">Countries Covered</div>
                            <div class="stat-value" style="color:var(--warning)">${countries}</div>
                            <div class="stat-trend">Global Reach</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">Avg 24k Price (USD)</div>
                            <div class="stat-value">$${avgPrice.toFixed(2)}</div>
                            <div class="stat-trend text-muted">Market Baseline</div>
                        </div>
                    </div>

                    <div class="chart-grid">
                        <div class="chart-card">
                            <canvas id="chart-countries"></canvas>
                        </div>
                        <div class="chart-card">
                            <canvas id="chart-confidence"></canvas>
                        </div>
                    </div>
                `;
            },

            renderShopsTable() {
                let rows = STATE.shops.map((shop, index) => `
                    <tr>
                        <td>
                            <div class="font-bold">${shop.name}</div>
                            <div class="text-xs text-muted">ID: ${index}</div>
                        </td>
                        <td>${shop.city || 'N/A'}, ${shop.country}</td>
                        <td>$${shop.price_24k || '-'}</td>
                        <td>
                            <span class="badge ${shop.confidence_score > 80 ? 'badge-success' : 'badge-warning'}">
                                ${shop.confidence_score}%
                            </span>
                        </td>
                        <td>
                            ${shop.is_verified 
                                ? '<span class="badge badge-info"><i class="fas fa-check"></i> Verified</span>' 
                                : '<span class="text-muted text-xs">Unverified</span>'}
                        </td>
                        <td>
                            <button class="btn btn-secondary" style="padding:0.25rem 0.5rem; font-size:0.8rem;" 
                                onclick="app.editShop(${index})">
                                <i class="fas fa-edit"></i> Edit
                            </button>
                        </td>
                    </tr>
                `).join('');

                return `
                    <div class="table-container">
                        <div class="table-header">
                            <h3>All Shops (${STATE.shops.length})</h3>
                            <button class="btn btn-primary" onclick="app.openModal()">
                                <i class="fas fa-plus"></i> Add New Shop
                            </button>
                        </div>
                        <div class="table-wrapper">
                            <table>
                                <thead>
                                    <tr>
                                        <th>Name</th>
                                        <th>Location</th>
                                        <th>Price (24k)</th>
                                        <th>Confidence</th>
                                        <th>Status</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody>${rows}</tbody>
                            </table>
                        </div>
                    </div>
                `;
            },

            renderAnalytics() {
                return `
                    <div class="chart-grid" style="grid-template-columns: 1fr;">
                        <div class="chart-card" style="height: 400px;">
                            <canvas id="chart-price-dist"></canvas>
                        </div>
                    </div>
                    <div class="mt-4 p-4" style="background:var(--bg-panel); border-radius:12px; border:1px solid var(--border);">
                        <h4 class="mb-4">Data Health Metrics</h4>
                        <div class="flex justify-between" style="border-bottom:1px solid var(--border); padding:0.5rem 0;">
                            <span class="text-muted">Missing Prices</span>
                            <span class="text-danger">${STATE.shops.filter(s => !s.price_24k).length} Shops</span>
                        </div>
                        <div class="flex justify-between" style="padding:0.5rem 0;">
                            <span class="text-muted">Low Confidence (<80%)</span>
                            <span class="text-warning">${STATE.shops.filter(s => s.confidence_score < 80).length} Shops</span>
                        </div>
                    </div>
                `;
            },

            // --- Actions ---

            openModal() {
                document.getElementById('shop-form').reset();
                document.getElementById('edit-sha').value = '';
                document.getElementById('edit-path').value = '';
                document.getElementById('modal-title').textContent = 'Add New Shop';
                document.getElementById('shop-modal').classList.add('open');
            },

            closeModal() {
                document.getElementById('shop-modal').classList.remove('open');
            },

            editShop(index) {
                const shop = STATE.shops[index];
                document.getElementById('edit-sha').value = index; // Using index as ID for edit
                document.getElementById('modal-title').textContent = 'Edit Shop';
                
                document.getElementById('s-name').value = shop.name || '';
                document.getElementById('s-country').value = shop.country || '';
                document.getElementById('s-city').value = shop.city || '';
                document.getElementById('s-address').value = shop.address || '';
                document.getElementById('s-24k').value = shop.price_24k || '';
                document.getElementById('s-22k').value = shop.price_22k || '';
                document.getElementById('s-21k').value = shop.price_21k || '';
                document.getElementById('s-18k').value = shop.price_18k || '';
                document.getElementById('s-conf').value = shop.confidence_score || 90;
                document.getElementById('s-verified').value = shop.is_verified ? 'true' : 'false';

                document.getElementById('shop-modal').classList.add('open');
            },

            async saveShop() {
                const btn = document.querySelector('#shop-modal .btn-primary');
                const originalText = btn.innerHTML;
                btn.disabled = true;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';

                try {
                    const idx = document.getElementById('edit-sha').value;
                    const newData = {
                        name: document.getElementById('s-name').value,
                        country: document.getElementById('s-country').value,
                        city: document.getElementById('s-city').value,
                        address: document.getElementById('s-address').value,
                        price_24k: parseFloat(document.getElementById('s-24k').value) || 0,
                        price_22k: parseFloat(document.getElementById('s-22k').value) || 0,
                        price_21k: parseFloat(document.getElementById('s-21k').value) || 0,
                        price_18k: parseFloat(document.getElementById('s-18k').value) || 0,
                        confidence_score: parseInt(document.getElementById('s-conf').value),
                        is_verified: document.getElementById('s-verified').value === 'true'
                    };

                    if (idx === '') {
                        // Add New
                        STATE.shops.push(newData);
                    } else {
                        // Update Existing
                        STATE.shops[parseInt(idx)] = newData;
                    }

                    // Reconstruct File Content
                    // Preserve the "const SHOPS_DATA = " part if it existed, otherwise wrap
                    let prefix = "const SHOPS_DATA = ";
                    if (STATE.rawContent.includes('=')) {
                        prefix = STATE.rawContent.split('=')[0] + '= ';
                    }
                    
                    const newContent = `${prefix}${JSON.stringify(STATE.shops, null, 2)};\n\nif (typeof module !== 'undefined') module.exports = SHOPS_DATA;`;

                    // Commit to GitHub
                    await GitHubAPI.updateFile(
                        `${CONFIG.basePath}/${CONFIG.fileName}`, 
                        newContent, 
                        STATE.sha, 
                        `feat: ${idx === '' ? 'added' : 'updated'} shop: ${newData.name}`
                    );

                    this.closeModal();
                    this.showToast('Changes committed to GitHub successfully!', 'success');
                    
                    // Refresh
                    STATE.rawContent = newContent;
                    // Need to fetch new SHA for next edit
                    const updatedFile = await GitHubAPI.getFileContent(`${CONFIG.basePath}/${CONFIG.fileName}`);
                    STATE.sha = updatedFile.sha;
                    
                    this.navigate('shops');

                } catch (err) {
                    this.showToast('Save Failed: ' + err.message, 'error');
                    console.error(err);
                } finally {
                    btn.disabled = false;
                    btn.innerHTML = originalText;
                }
            },

            async loadGitHistory() {
                try {
                    const commits = await GitHubAPI.request(
                        `/repos/${STATE.user}/${STATE.repo}/commits?path=${CONFIG.basePath}/${CONFIG.fileName}&per_page=10`
                    );
                    
                    let html = `<div class="table-container"><table><thead><tr><th>Message</th><th>Author</th><th>Date</th></tr></thead><tbody>`;
                    commits.forEach(c => {
                        html += `
                            <tr>
                                <td><span class="badge badge-info">commit</span> ${c.commit.message}</td>
                                <td>${c.commit.author.name}</td>
                                <td class="text-muted text-xs">${new Date(c.commit.date).toLocaleString()}</td>
                            </tr>
                        `;
                    });
                    html += `</tbody></table></div>`;
                    document.getElementById('content-area').innerHTML = html;
                } catch (e) {
                    document.getElementById('content-area').innerHTML = `<div class="error-box" style="display:block">Failed to load history: ${e.message}</div>`;
                }
            },

            // --- Visualizations ---

            initCharts() {
                // Destroy existing
                Object.values(STATE.charts).forEach(c => c.destroy());
                STATE.charts = {};

                // Country Distribution
                const countries = {};
                STATE.shops.forEach(s => { countries[s.country] = (countries[s.country] || 0) + 1; });
                
                const ctx1 = document.getElementById('chart-countries');
                if(ctx1) {
                    STATE.charts.countries = new Chart(ctx1, {
                        type: 'doughnut',
                        data: {
                            labels: Object.keys(countries),
                            datasets: [{
                                data: Object.values(countries),
                                backgroundColor: ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899']
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: { legend: { position: 'right', labels: { color: '#94a3b8' } } },
                            scales: { x: { ticks: { color: '#94a3b8' } }, y: { ticks: { color: '#94a3b8' } } }
                        }
                    });
                }

                // Confidence
                const scores = [0,0,0,0,0];
                STATE.shops.forEach(s => {
                    const bucket = Math.floor(s.confidence_score / 20);
                    if(bucket < 5) scores[bucket]++;
                });

                const ctx2 = document.getElementById('chart-confidence');
                if(ctx2) {
                    STATE.charts.confidence = new Chart(ctx2, {
                        type: 'bar',
                        data: {
                            labels: ['0-20', '20-40', '40-60', '60-80', '80-100'],
                            datasets: [{
                                label: 'Shops by Confidence',
                                data: scores,
                                backgroundColor: '#3b82f6'
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: { legend: { display: false } },
                            scales: { x: { ticks: { color: '#94a3b8' } }, y: { ticks: { color: '#94a3b8' } } }
                        }
                    });
                }
            },

            initMap() {
                if (STATE.mapInstance) STATE.mapInstance.remove();
                
                const container = document.getElementById('map-container');
                if(!container) return;

                STATE.mapInstance = Leaflet.map('map-container').setView([20, 0], 2);
                Leaflet.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                    attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
                    subdomains: 'abcd',
                    maxZoom: 19
                }).addTo(STATE.mapInstance);

                // Simple geocoding simulation (since we don't have coords in data yet)
                // In a real app, you'd add lat/lng fields to the form
                STATE.shops.forEach(shop => {
                    // Placeholder logic: Just randomizing slightly around country centers for demo
                    // TODO: Add Lat/Lng inputs to the modal
                    const lat = (Math.random() * 40) + 20; 
                    const lng = (Math.random() * 60) - 30;
                    
                    Leaflet.marker([lat, lng])
                        .addTo(STATE.mapInstance)
                        .bindPopup(`<b>${shop.name}</b><br>${shop.city}, ${shop.country}`);
                });
            },

            toggleSidebar() {
                document.getElementById('sidebar').classList.toggle('open');
            },

            showToast(msg, type = 'info') {
                const container = document.getElementById('toast-container');
                const toast = document.createElement('div');
                toast.className = `toast ${type}`;
                toast.innerHTML = `
                    <i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle'}"></i>
                    <span>${msg}</span>
                `;
                container.appendChild(toast);
                setTimeout(() => {
                    toast.style.opacity = '0';
                    setTimeout(() => toast.remove(), 300);
                }, 3000);
            }
        };

        // Start App
        app.init();
    </script>
</body>
</html>
