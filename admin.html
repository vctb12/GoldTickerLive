<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gold Prices | Master Admin</title>
    <script type="module" src="lib/supabase-client.js"></script>
    <style>
        :root { --bg: #0f172a; --panel: #1e293b; --text: #f8fafc; --accent: #3b82f6; --success: #10b981; --danger: #ef4444; }
        body { margin: 0; font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); }
        
        /* Login Screen */
        #login-view { height: 100vh; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%); }
        .login-box { background: rgba(255,255,255,0.05); padding: 2rem; border-radius: 12px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); width: 100%; max-width: 400px; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: rgba(0,0,0,0.3); border: 1px solid #334155; color: white; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }

        /* Dashboard */
        #admin-view { display: none; min-height: 100vh; }
        .sidebar { width: 260px; background: var(--panel); position: fixed; height: 100%; padding: 20px; border-right: 1px solid #334155; }
        .main { margin-left: 260px; padding: 40px; }
        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: var(--panel); padding: 20px; border-radius: 10px; border: 1px solid #334155; }
        .stat-val { font-size: 2.5rem; font-weight: bold; color: var(--accent); }
        
        .table-container { background: var(--panel); border-radius: 10px; overflow: hidden; border: 1px solid #334155; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 16px; text-align: left; border-bottom: 1px solid #334155; }
        th { background: rgba(0,0,0,0.2); font-weight: 600; color: #94a3b8; }
        tr:hover { background: rgba(255,255,255,0.02); }
        
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; font-weight: 600; }
        .badge-verified { background: rgba(16, 185, 129, 0.2); color: var(--success); }
        .badge-pending { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; }
        .modal-content { background: var(--panel); padding: 30px; border-radius: 12px; width: 100%; max-width: 600px; max-height: 90vh; overflow-y: auto; }
        .form-group { margin-bottom: 15px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        .loading { text-align: center; padding: 50px; color: #94a3b8; }
        .error { color: var(--danger); background: rgba(239, 68, 68, 0.1); padding: 10px; border-radius: 6px; margin-bottom: 10px; display: none; }
    </style>
</head>
<body>

    <!-- LOGIN VIEW -->
    <div id="login-view">
        <div class="login-box">
            <h2 style="text-align:center; margin-top:0;">Admin Access</h2>
            <div id="login-error" class="error"></div>
            <input type="email" id="email" placeholder="admin@goldprices.com" value="admin@goldprices.com">
            <input type="password" id="password" placeholder="Password" value="admin123">
            <button onclick="handleLogin()" id="login-btn">Sign In</button>
            <p style="font-size:0.8rem; color:#64748b; text-align:center; margin-top:15px;">
                Powered by Supabase • Secure Connection
            </p>
        </div>
    </div>

    <!-- DASHBOARD VIEW -->
    <div id="admin-view">
        <div class="sidebar">
            <h3 style="color:white; margin-bottom:30px;">Gold Admin</h3>
            <nav>
                <div style="padding:10px; background:rgba(255,255,255,0.1); border-radius:6px; margin-bottom:10px; cursor:pointer;" onclick="showSection('shops')">📦 Shops Directory</div>
                <div style="padding:10px; border-radius:6px; margin-bottom:10px; cursor:pointer; color:#94a3b8;" onclick="alert('Analytics Module Coming Soon')">📈 Analytics</div>
                <div style="padding:10px; border-radius:6px; margin-bottom:10px; cursor:pointer; color:#94a3b8;" onclick="alert('User Management Coming Soon')">👥 Users</div>
                <div style="margin-top:50px; padding:10px; color:var(--danger); cursor:pointer;" onclick="handleLogout()">🚪 Logout</div>
            </nav>
        </div>

        <div class="main">
            <header style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
                <h1>Shops Directory</h1>
                <button style="width:auto;" onclick="openModal()">+ Add New Shop</button>
            </header>

            <div class="stat-grid">
                <div class="stat-card">
                    <div class="stat-val" id="stat-total">0</div>
                    <div>Total Shops</div>
                </div>
                <div class="stat-card">
                    <div class="stat-val" id="stat-verified" style="color:var(--success)">0</div>
                    <div>Verified</div>
                </div>
                <div class="stat-card">
                    <div class="stat-val" id="stat-countries">0</div>
                    <div>Countries</div>
                </div>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Location</th>
                            <th>Price (24k)</th>
                            <th>Confidence</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="shops-table">
                        <tr><td colspan="6" class="loading">Loading data from cloud...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- EDIT MODAL -->
    <div id="shop-modal" class="modal">
        <div class="modal-content">
            <h2 id="modal-title" style="margin-top:0">Add Shop</h2>
            <div id="modal-error" class="error"></div>
            <form id="shop-form" onsubmit="handleSave(event)">
                <input type="hidden" id="shop-id">
                <div class="form-row">
                    <div class="form-group"><label>Shop Name</label><input type="text" id="s-name" required></div>
                    <div class="form-group"><label>Country</label><input type="text" id="s-country" required></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>City</label><input type="text" id="s-city"></div>
                    <div class="form-group"><label>Address</label><input type="text" id="s-address"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>Price 24k</label><input type="number" step="0.01" id="s-24k"></div>
                    <div class="form-group"><label>Price 22k</label><input type="number" step="0.01" id="s-22k"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>Confidence (0-100)</label><input type="number" id="s-conf" value="90"></div>
                    <div class="form-group">
                        <label>Verified?</label>
                        <select id="s-verified" style="width:100%; padding:12px; background:rgba(0,0,0,0.3); color:white; border:1px solid #334155; border-radius:6px;">
                            <option value="false">No</option>
                            <option value="true">Yes</option>
                        </select>
                    </div>
                </div>
                <div style="display:flex; gap:10px; margin-top:20px;">
                    <button type="submit">Save Changes</button>
                    <button type="button" onclick="closeModal()" style="background:#334155">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { supabase, Auth, ShopAPI } from './lib/supabase-client.js';

        // Expose functions to window for HTML onclick handlers
        window.handleLogin = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const btn = document.getElementById('login-btn');
            const err = document.getElementById('login-error');
            
            btn.textContent = 'Authenticating...';
            btn.disabled = true;
            err.style.display = 'none';

            try {
                // NOTE: In a real scenario, you must create this user in Supabase Auth dashboard first
                // Or enable "Sign up" temporarily. For now, we assume user exists.
                await Auth.signIn(email, pass);
                loadDashboard();
            } catch (e) {
                err.textContent = "Login failed: " + e.message;
                err.style.display = 'block';
                btn.textContent = 'Sign In';
                btn.disabled = false;
            }
        };

        window.handleLogout = async () => {
            await Auth.signOut();
            location.reload();
        };

        window.loadDashboard = async () => {
            const session = await Auth.getSession();
            if (!session) {
                document.getElementById('login-view').style.display = 'flex';
                document.getElementById('admin-view').style.display = 'none';
                return;
            }

            document.getElementById('login-view').style.display = 'none';
            document.getElementById('admin-view').style.display = 'block';
            
            renderShops();
        };

        async function renderShops() {
            const tbody = document.getElementById('shops-table');
            tbody.innerHTML = '<tr><td colspan="6" class="loading">Fetching live data...</td></tr>';

            try {
                const shops = await ShopAPI.getAll();
                
                // Update Stats
                document.getElementById('stat-total').textContent = shops.length;
                document.getElementById('stat-verified').textContent = shops.filter(s => s.is_verified).length;
                const countries = new Set(shops.map(s => s.country));
                document.getElementById('stat-countries').textContent = countries.size;

                // Render Table
                tbody.innerHTML = '';
                if (shops.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center">No shops found. Add one!</td></tr>';
                    return;
                }

                shops.forEach(shop => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td><strong>${shop.name}</strong></td>
                        <td>${shop.city}, ${shop.country}</td>
                        <td>$${shop.price_24k || 'N/A'}</td>
                        <td>${shop.confidence_score}%</td>
                        <td><span class="badge ${shop.is_verified ? 'badge-verified' : 'badge-pending'}">${shop.is_verified ? 'Verified' : 'Pending'}</span></td>
                        <td>
                            <button onclick="editShop('${shop.id}')" style="width:auto; padding:4px 8px; font-size:0.8rem; background:#3b82f6;">Edit</button>
                            <button onclick="deleteShop('${shop.id}')" style="width:auto; padding:4px 8px; font-size:0.8rem; background:#ef4444; margin-left:5px;">Delete</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (e) {
                tbody.innerHTML = `<tr><td colspan="6" style="color:red">Error loading data: ${e.message}. Check Console & Supabase Keys.</td></tr>`;
                console.error(e);
            }
        }

        window.editShop = async (id) => {
            const shops = await ShopAPI.getAll();
            const shop = shops.find(s => s.id === id);
            if (!shop) return;

            document.getElementById('shop-id').value = shop.id;
            document.getElementById('s-name').value = shop.name;
            document.getElementById('s-country').value = shop.country;
            document.getElementById('s-city').value = shop.city || '';
            document.getElementById('s-address').value = shop.address || '';
            document.getElementById('s-24k').value = shop.price_24k || '';
            document.getElementById('s-22k').value = shop.price_22k || '';
            document.getElementById('s-conf').value = shop.confidence_score;
            document.getElementById('s-verified').value = shop.is_verified.toString();
            
            document.getElementById('modal-title').textContent = 'Edit Shop';
            document.getElementById('shop-modal').style.display = 'flex';
        };

        window.handleSave = async (e) => {
            e.preventDefault();
            const id = document.getElementById('shop-id').value;
            const data = {
                name: document.getElementById('s-name').value,
                country: document.getElementById('s-country').value,
                city: document.getElementById('s-city').value,
                address: document.getElementById('s-address').value,
                price_24k: parseFloat(document.getElementById('s-24k').value),
                price_22k: parseFloat(document.getElementById('s-22k').value),
                confidence_score: parseInt(document.getElementById('s-conf').value),
                is_verified: document.getElementById('s-verified').value === 'true'
            };

            try {
                if (id) {
                    await ShopAPI.update(id, data);
                } else {
                    await ShopAPI.create(data);
                }
                closeModal();
                renderShops();
                // Trigger GitHub Sync
                // ShopAPI.triggerSync(); // Uncomment once GH Token is configured
                alert('Saved! Changes are live in the database.');
            } catch (err) {
                document.getElementById('modal-error').textContent = err.message;
                document.getElementById('modal-error').style.display = 'block';
            }
        };

        window.deleteShop = async (id) => {
            if(confirm('Are you sure? This cannot be undone.')) {
                await ShopAPI.delete(id);
                renderShops();
            }
        };

        window.openModal = () => {
            document.getElementById('shop-form').reset();
            document.getElementById('shop-id').value = '';
            document.getElementById('modal-title').textContent = 'Add New Shop';
            document.getElementById('modal-error').style.display = 'none';
            document.getElementById('shop-modal').style.display = 'flex';
        };

        window.closeModal = () => {
            document.getElementById('shop-modal').style.display = 'none';
        };

        // Init
        window.addEventListener('load', loadDashboard);
        
        // Make helpers global
        window.renderShops = renderShops;
        window.closeModal = closeModal;
    </script>
</body>
</html>
